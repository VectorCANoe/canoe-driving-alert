<svg xmlns="http://www.w3.org/2000/svg" width="1580" height="1100" viewBox="0 0 1580 1100">
  <style>
    .title { font: 700 28px 'Segoe UI', sans-serif; fill: #111827; }
    .label { font: 700 19px 'Segoe UI', sans-serif; fill: #0f172a; }
    .small { font: 500 14px 'Segoe UI', sans-serif; fill: #475569; }
    .node { font: 600 15px 'Segoe UI', sans-serif; fill: #1f2937; }
    .box { rx: 18; ry: 18; stroke: #475569; stroke-width: 2; }
    .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
  </defs>
  <text x="36" y="44" class="title">Group 04 - Body / Comfort / Ambient</text>
  <text x="36" y="72" class="small">This group applies the selected warning state to body,</text>
  <text x="36" y="94" class="small">comfort, and ambient surfaces.</text>

  <rect x="40" y="120" width="300" height="186" class="box" fill="#e0f2fe"/>
  <text x="62" y="156" class="label">Command surface</text>
  <text x="62" y="184" class="node">access, ambient, climate,</text>
  <text x="62" y="208" class="node">lighting, and body commands</text>
  <text x="62" y="236" class="small">top-level cabin and body</text>
  <text x="62" y="258" class="small">interaction surface</text>

  <rect x="410" y="120" width="280" height="202" class="box" fill="#dbeafe"/>
  <text x="432" y="156" class="label">BCM</text>
  <text x="432" y="184" class="node">body, comfort, and</text>
  <text x="432" y="206" class="node">ambient owner</text>
  <text x="432" y="232" class="small">ambient, blink, wiper,</text>
  <text x="432" y="254" class="small">and body state</text>
  <text x="432" y="278" class="small">coordinates body leaves</text>
  <text x="432" y="300" class="small">and comfort outputs</text>

  <rect x="760" y="70" width="320" height="330" class="box" fill="#ffffff"/>
  <text x="782" y="106" class="label">Body leaves</text>
  <text x="782" y="136" class="node">DATC, WIP, DOOR_FL,</text>
  <text x="782" y="160" class="node">DOOR_FR, DOOR_RL, DOOR_RR</text>
  <text x="782" y="186" class="node">SEAT_DRV, SEAT_PASS, SRF,</text>
  <text x="782" y="210" class="node">TGM, AFLS, AHLS</text>
  <text x="782" y="236" class="node">SMK, MIR, MSC, RATC, HLM,</text>
  <text x="782" y="260" class="node">ADM, BIO, BSEC, CSM, PTG</text>
  <text x="782" y="292" class="small">body state, cabin comfort,</text>
  <text x="782" y="314" class="small">access, lighting, and wiper</text>
  <text x="782" y="338" class="small">supports cabin-side readback and response</text>

  <rect x="1150" y="120" width="350" height="180" class="box" fill="#fde68a"/>
  <text x="1172" y="156" class="label">Output readers</text>
  <text x="1172" y="184" class="node">IVI, CLU, and body-linked readback</text>
  <text x="1172" y="208" class="small">cabin-level consistency with warning state</text>

  <rect x="240" y="420" width="320" height="206" class="box" fill="#fef3c7"/>
  <text x="262" y="456" class="label">Why it matters</text>
  <text x="262" y="484" class="node">body context shapes</text>
  <text x="262" y="508" class="node">perceived cabin behavior</text>
  <text x="262" y="534" class="node">ambient policy should reinforce</text>
  <text x="262" y="558" class="node">the selected warning state</text>

  <rect x="650" y="420" width="320" height="206" class="box" fill="#f8fafc"/>
  <text x="672" y="456" class="label">Reading focus</text>
  <text x="672" y="484" class="node">body breadth is wider than</text>
  <text x="672" y="508" class="node">the core driver-input surface</text>
  <text x="672" y="534" class="node">not every leaf needs a</text>
  <text x="672" y="558" class="node">dedicated front-page control</text>

  <rect x="1060" y="420" width="380" height="196" class="box" fill="#fff7ed"/>
  <text x="1082" y="456" class="label">Ownership rule</text>
  <text x="1082" y="484" class="node">keep product ownership in BCM and leaf ECUs</text>
  <text x="1082" y="508" class="node">use focused readback instead of</text>
  <text x="1082" y="532" class="node">mirroring every local detail</text>

  <rect x="40" y="706" width="1460" height="162" class="box" fill="#ffffff"/>
  <text x="62" y="726" class="label">Priority</text>
  <text x="62" y="756" class="node">Use this group to close comfort and context consistency</text>
  <text x="62" y="780" class="node">once motion and intervention remain stable.</text>
  <text x="62" y="808" class="node">Ambient mode belongs here and should stay aligned with BCM ownership.</text>

  <rect x="40" y="896" width="1460" height="144" class="box" fill="#f8fafc"/>
  <text x="62" y="932" class="label">ECU</text>
  <text x="62" y="964" class="node">BCM</text>
  <text x="132" y="964" class="node">DATC</text>
  <text x="212" y="964" class="node">WIP</text>
  <text x="272" y="964" class="node">DOOR_FL</text>
  <text x="382" y="964" class="node">DOOR_FR</text>
  <text x="492" y="964" class="node">DOOR_RL</text>
  <text x="602" y="964" class="node">DOOR_RR</text>
  <text x="712" y="964" class="node">SEAT_DRV</text>
  <text x="832" y="964" class="node">SEAT_PASS</text>
  <text x="962" y="964" class="node">SRF</text>
  <text x="1022" y="964" class="node">AHLS</text>
  <text x="1102" y="964" class="node">AFLS</text>
  <text x="62" y="996" class="small">Other comfort leaves: SMK, MIR, MSC, RATC, HLM, ADM, BIO, BSEC, CSM, PTG, TGM</text>

  <path class="arrow" d="M340 200 L410 200"/>
  <path class="arrow" d="M690 210 L760 210"/>
  <path class="arrow" d="M1080 210 L1150 210"/>
  <path class="arrow" d="M550 300 L400 420"/>
  <path class="arrow" d="M550 300 L810 420"/>
  <path class="arrow" d="M550 300 L1240 420"/>
</svg>
