<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="980" viewBox="0 0 1320 980">
  <style>
    .title { font: 700 28px 'Segoe UI', sans-serif; fill: #111827; }
    .label { font: 700 18px 'Segoe UI', sans-serif; fill: #0f172a; }
    .node { font: 600 15px 'Segoe UI', sans-serif; fill: #1f2937; }
    .small { font: 500 14px 'Segoe UI', sans-serif; fill: #475569; }
    .box { rx: 18; ry: 18; stroke: #475569; stroke-width: 2; }
  </style>
  <text x="34" y="42" class="title">Group 06 - Backbone / Gateway / Diagnostics</text>
  <text x="34" y="70" class="small">Runtime backbone, gateway, diagnostics, and service-facing nodes that do not fit the display/body/dynamics groups.</text>

  <rect x="30" y="110" width="1260" height="130" class="box" fill="#fce7f3"/>
  <text x="52" y="146" class="label">Primary nodes</text>
  <text x="52" y="176" class="node">CGW, DCM, EDR, ETHB, EXT_DIAG, IBOX, SGW, V2X</text>
  <text x="52" y="204" class="small">Validation nodes stay in Group 05. This group focuses on backbone routing, diagnostics, and service surfaces.</text>

  <rect x="30" y="270" width="1260" height="90" class="box" fill="#ede9fe"/>
  <text x="52" y="306" class="label">Main path</text>
  <text x="52" y="336" class="node">domain state / service requests -> CGW / ETHB / DCM / SGW / IBOX -> routed gateway, diagnostic, and external service surfaces</text>

  <rect x="30" y="380" width="1260" height="520" class="box" fill="#ffffff"/>
  <text x="52" y="416" class="label">ECU roster</text>
  <rect x="60" y="390" width="250" height="36" rx="12" ry="12" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/><text x="74" y="414" class="node">CGW</text><rect x="360" y="390" width="250" height="36" rx="12" ry="12" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/><text x="374" y="414" class="node">DCM</text><rect x="660" y="390" width="250" height="36" rx="12" ry="12" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/><text x="674" y="414" class="node">EDR</text><rect x="960" y="390" width="250" height="36" rx="12" ry="12" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/><text x="974" y="414" class="node">ETHB</text><rect x="60" y="442" width="250" height="36" rx="12" ry="12" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/><text x="74" y="466" class="node">EXT_DIAG</text><rect x="360" y="442" width="250" height="36" rx="12" ry="12" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/><text x="374" y="466" class="node">IBOX</text><rect x="660" y="442" width="250" height="36" rx="12" ry="12" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/><text x="674" y="466" class="node">SGW</text><rect x="960" y="442" width="250" height="36" rx="12" ry="12" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/><text x="974" y="466" class="node">V2X</text>

  <rect x="30" y="920" width="1260" height="40" class="box" fill="#f8fafc"/>
  <text x="52" y="946" class="small">Use the per-ECU card index for individual runtime details.</text>
</svg>
