<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1360" viewBox="0 0 1600 1360">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 30px 'Segoe UI', sans-serif; fill: #0f172a; }
    .sub { font: 500 15px 'Segoe UI', sans-serif; fill: #475569; }
    .label { font: 700 18px 'Segoe UI', sans-serif; fill: #0f172a; }
    .text { font: 600 15px 'Segoe UI', sans-serif; fill: #1f2937; }
    .small { font: 500 14px 'Segoe UI', sans-serif; fill: #475569; }
    .node { font: 700 16px 'Segoe UI', sans-serif; fill: #111827; }
    .box { rx: 20; ry: 20; stroke: #475569; stroke-width: 2; }
    .lane { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="0" y="0" width="1600" height="1360" class="bg"/>
  <text x="34" y="44" class="title">FLOW_13 - Alert Arbitration and Gate</text>
  <text x="34" y="72" class="sub">Display and Alert | generated canonical action-flow companion for the internal ECU master book</text>

  <rect x="30" y="100" width="1540" height="318" class="box" fill="#ede9fe"/>
  <text x="52" y="136" class="label">Flow overview</text>
  <text x="52" y="166" class="text">Multiple warning candidates are reduced into one selected alert with explicit gateway and display semantics.</text>
  <text x="52" y="202" class="small">Participants</text>
  <rect x="52" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="246" class="node">ADAS</text><rect x="292" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="310" y="246" class="node">CGW</text><rect x="532" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="550" y="246" class="node">IVI</text><rect x="772" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="790" y="246" class="node">CLU</text><rect x="52" y="298" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="330" class="node">AMP</text>

  <rect x="30" y="462" width="1540" height="472" class="box" fill="#ffffff"/>
  <text x="52" y="498" class="label">Action sequence</text>
  <rect x="52" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="554" class="small">ADAS</text><text x="72" y="582" class="label">Select alert candidate</text><text x="72" y="610" class="text">ADAS reduces zone, risk, and</text>
<text x="72" y="630" class="text">emergency inputs into selected</text>
<text x="72" y="650" class="text">alert type and level.</text><line x1="332" y1="590" x2="356" y2="590" class="lane"/><rect x="356" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="554" class="small">CGW</text><text x="376" y="582" class="label">Apply gate reason</text><text x="376" y="610" class="text">Gateway stores why the alert was</text>
<text x="376" y="630" class="text">allowed, blocked, or downgraded.</text><line x1="636" y1="590" x2="660" y2="590" class="lane"/><rect x="660" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="680" y="554" class="small">IVI</text><text x="680" y="582" class="label">Prepare HMI payload</text><text x="680" y="610" class="text">IVI converts the selected alert</text>
<text x="680" y="630" class="text">into display and audio-ready</text>
<text x="680" y="650" class="text">forms.</text><rect x="52" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="732" class="small">CLU</text><text x="72" y="760" class="label">Render cluster meaning</text><text x="72" y="788" class="text">Cluster uses the selected alert</text>
<text x="72" y="808" class="text">to show the final warning text</text>
<text x="72" y="828" class="text">and icon state.</text><line x1="332" y1="768" x2="356" y2="768" class="lane"/><rect x="356" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="732" class="small">AMP</text><text x="376" y="760" class="label">Render sound priority</text><text x="376" y="788" class="text">Audio lane follows the same</text>
<text x="376" y="808" class="text">selected alert and base-volume</text>
<text x="376" y="828" class="text">priority.</text>

  <rect x="30" y="958" width="500" height="320" class="box" fill="#eff6ff"/>
  <text x="52" y="994" class="label">Related ECU bank</text>
  <text x="52" y="1024" class="text">- AMP</text>
<text x="52" y="1044" class="text">- CGW</text>
<text x="52" y="1064" class="text">- CLU</text>
<text x="52" y="1084" class="text">- HUD</text>
<text x="52" y="1104" class="text">- IVI</text>
<text x="52" y="1124" class="text">- TMU</text>
<text x="52" y="1144" class="text">- V2X</text>
<text x="52" y="1164" class="text">- VCS</text>

  <rect x="550" y="958" width="500" height="320" class="box" fill="#ffffff"/>
  <text x="572" y="994" class="label">Key contracts</text>
  <text x="572" y="1024" class="text">- Core::selectedAlertType</text>
<text x="572" y="1044" class="text">- Core::selectedAlertLevel</text>
<text x="572" y="1064" class="text">- CoreState::selectedAlertGateReason</text>
<text x="572" y="1084" class="text">- Cluster::warningTextCode</text>

  <rect x="1070" y="958" width="500" height="320" class="box" fill="#fff7ed"/>
  <text x="1092" y="994" class="label">Files and user outcome</text>
  <text x="1092" y="1024" class="text">- ADAS.can</text>
<text x="1092" y="1044" class="text">- CGW.can</text>
<text x="1092" y="1064" class="text">- IVI.can</text>
<text x="1092" y="1084" class="text">- CLU.can</text>
<text x="1092" y="1104" class="text">- AMP.can</text>
<text x="1092" y="1124" class="text"></text>
<text x="1092" y="1144" class="text">Only one alert meaning survives to the</text>
<text x="1092" y="1164" class="text">user-facing surfaces, and the gate reason</text>
<text x="1092" y="1184" class="text">remains explainable.</text>
</svg>
