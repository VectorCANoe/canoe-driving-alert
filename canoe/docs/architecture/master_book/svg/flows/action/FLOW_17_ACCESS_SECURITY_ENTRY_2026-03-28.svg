<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1356" viewBox="0 0 1600 1356">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 30px 'Segoe UI', sans-serif; fill: #0f172a; }
    .sub { font: 500 15px 'Segoe UI', sans-serif; fill: #475569; }
    .label { font: 700 18px 'Segoe UI', sans-serif; fill: #0f172a; }
    .text { font: 600 15px 'Segoe UI', sans-serif; fill: #1f2937; }
    .small { font: 500 14px 'Segoe UI', sans-serif; fill: #475569; }
    .node { font: 700 16px 'Segoe UI', sans-serif; fill: #111827; }
    .box { rx: 20; ry: 20; stroke: #475569; stroke-width: 2; }
    .lane { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="0" y="0" width="1600" height="1356" class="bg"/>
  <text x="34" y="44" class="title">FLOW_17 - Access, Security, and Entry</text>
  <text x="34" y="72" class="sub">Body and Comfort | canonical action flow</text>

  <rect x="30" y="100" width="1540" height="318" class="box" fill="#dcfce7"/>
  <text x="52" y="136" class="label">Flow overview</text>
  <text x="52" y="166" class="text">Key, access, security, and door controllers are connected into one vehicle-entry behavior chain.</text>
  <text x="52" y="202" class="small">Participants</text>
  <rect x="52" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="246" class="node">DKEY / PAK / PGS</text><rect x="292" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="310" y="246" class="node">SMK / BSEC / CSM</text><rect x="532" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="550" y="246" class="node">DOOR_*</text><rect x="772" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="790" y="246" class="node">BCM</text><rect x="52" y="298" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="330" class="node">IVI / User</text>

  <rect x="30" y="462" width="1540" height="472" class="box" fill="#ffffff"/>
  <text x="52" y="498" class="label">Action sequence</text>
  <rect x="52" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="554" class="small">DKEY / PAK / PGS</text><text x="72" y="582" class="label">Raise access request</text><text x="72" y="610" class="text">Digital key and passive-entry</text>
<text x="72" y="630" class="text">surfaces publish vehicle-access</text>
<text x="72" y="650" class="text">context.</text><line x1="332" y1="590" x2="356" y2="590" class="lane"/><rect x="356" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="554" class="small">SMK / BSEC / CSM</text><text x="376" y="582" class="label">Validate access state</text><text x="376" y="610" class="text">Security owners determine</text>
<text x="376" y="630" class="text">whether the entry request is</text>
<text x="376" y="650" class="text">valid.</text><line x1="636" y1="590" x2="660" y2="590" class="lane"/><rect x="660" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="680" y="554" class="small">DOOR_*</text><text x="680" y="582" class="label">Apply door action</text><text x="680" y="610" class="text">Door controllers react to the</text>
<text x="680" y="630" class="text">accepted entry or lock state.</text><rect x="52" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="732" class="small">BCM</text><text x="72" y="760" class="label">Consolidate body status</text><text x="72" y="788" class="text">BCM reflects the resulting</text>
<text x="72" y="808" class="text">access and door state across</text>
<text x="72" y="828" class="text">body surfaces.</text><line x1="332" y1="768" x2="356" y2="768" class="lane"/><rect x="356" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="732" class="small">IVI / User</text><text x="376" y="760" class="label">Render entry result</text><text x="376" y="788" class="text">The user sees one coherent entry</text>
<text x="376" y="808" class="text">and lock result.</text>

  <rect x="30" y="958" width="500" height="316" class="box" fill="#eff6ff"/>
  <text x="52" y="994" class="label">Related ECU bank</text>
  <text x="52" y="1024" class="text">- BCM</text>
<text x="52" y="1044" class="text">- BSEC</text>
<text x="52" y="1064" class="text">- CSM</text>
<text x="52" y="1084" class="text">- DKEY</text>
<text x="52" y="1104" class="text">- DOOR_FL</text>
<text x="52" y="1124" class="text">- DOOR_FR</text>
<text x="52" y="1144" class="text">- DOOR_RL</text>
<text x="52" y="1164" class="text">- DOOR_RR</text>
<text x="52" y="1184" class="text">- PAK</text>
<text x="52" y="1204" class="text">- PGS</text>
<text x="52" y="1224" class="text">- SMK</text>

  <rect x="550" y="958" width="500" height="316" class="box" fill="#ffffff"/>
  <text x="572" y="994" class="label">Representative signals</text>
  <text x="572" y="1024" class="text">- Key Presence</text>
<text x="572" y="1044" class="text">- Door Lock State</text>
<text x="572" y="1064" class="text">- Entry Authorization</text>
<text x="572" y="1084" class="text">- Body Security State</text>

  <rect x="1070" y="958" width="500" height="316" class="box" fill="#fff7ed"/>
  <text x="1092" y="994" class="label">Why this flow matters</text>
  <text x="1092" y="1024" class="text">Entry, lock, and security behavior can be</text>
<text x="1092" y="1044" class="text">read as one access story from request to</text>
<text x="1092" y="1064" class="text">result.</text>
</svg>
