<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1436" viewBox="0 0 1600 1436">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 30px 'Segoe UI', sans-serif; fill: #0f172a; }
    .sub { font: 500 15px 'Segoe UI', sans-serif; fill: #475569; }
    .label { font: 700 18px 'Segoe UI', sans-serif; fill: #0f172a; }
    .text { font: 600 15px 'Segoe UI', sans-serif; fill: #1f2937; }
    .small { font: 500 14px 'Segoe UI', sans-serif; fill: #475569; }
    .node { font: 700 16px 'Segoe UI', sans-serif; fill: #111827; }
    .box { rx: 20; ry: 20; stroke: #475569; stroke-width: 2; }
    .lane { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="0" y="0" width="1600" height="1436" class="bg"/>
  <text x="34" y="44" class="title">FLOW_05 - Chassis Sensor Health</text>
  <text x="34" y="72" class="sub">Dynamics | canonical action flow</text>

  <rect x="30" y="100" width="1540" height="318" class="box" fill="#dbeafe"/>
  <text x="52" y="136" class="label">Flow overview</text>
  <text x="52" y="166" class="text">Wheel, angle, suspension, and chassis leaf signals are collected so downstream control and visibility stay health-aware.</text>
  <text x="52" y="202" class="small">Participants</text>
  <rect x="52" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="246" class="node">SAS / TPMS / RWS</text><rect x="292" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="310" y="246" class="node">ESC / MDPS</text><rect x="532" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="550" y="246" class="node">VCU / ADAS</text><rect x="772" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="790" y="246" class="node">CGW</text><rect x="52" y="298" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="330" class="node">CLU</text>

  <rect x="30" y="462" width="1540" height="472" class="box" fill="#ffffff"/>
  <text x="52" y="498" class="label">Action sequence</text>
  <rect x="52" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="554" class="small">SAS / TPMS / RWS</text><text x="72" y="582" class="label">Produce chassis leaf state</text><text x="72" y="610" class="text">Leaf chassis sensors publish</text>
<text x="72" y="630" class="text">angle, tire, and rear steer</text>
<text x="72" y="650" class="text">status.</text><line x1="332" y1="590" x2="356" y2="590" class="lane"/><rect x="356" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="554" class="small">ESC / MDPS</text><text x="376" y="582" class="label">Normalize control inputs</text><text x="376" y="610" class="text">Primary chassis controllers</text>
<text x="376" y="630" class="text">merge raw leaf state into</text>
<text x="376" y="650" class="text">central control state.</text><line x1="636" y1="590" x2="660" y2="590" class="lane"/><rect x="660" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="680" y="554" class="small">VCU / ADAS</text><text x="680" y="582" class="label">Consume for behavior</text><text x="680" y="610" class="text">Vehicle and ADAS logic use</text>
<text x="680" y="630" class="text">chassis state for stability and</text>
<text x="680" y="650" class="text">warning decisions.</text><rect x="52" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="732" class="small">CGW</text><text x="72" y="760" class="label">Merge health visibility</text><text x="72" y="788" class="text">Gateway tracks freshness and</text>
<text x="72" y="808" class="text">health across the chassis</text>
<text x="72" y="828" class="text">domain.</text><line x1="332" y1="768" x2="356" y2="768" class="lane"/><rect x="356" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="732" class="small">CLU</text><text x="376" y="760" class="label">Display chassis readiness</text><text x="376" y="788" class="text">Driver-visible status follows</text>
<text x="376" y="808" class="text">the normalized health and state</text>
<text x="376" y="828" class="text">lane.</text>

  <rect x="30" y="958" width="500" height="396" class="box" fill="#eff6ff"/>
  <text x="52" y="994" class="label">Related ECU bank</text>
  <text x="52" y="1024" class="text">- ABS</text>
<text x="52" y="1044" class="text">- ACU</text>
<text x="52" y="1064" class="text">- ASM</text>
<text x="52" y="1084" class="text">- CDC</text>
<text x="52" y="1104" class="text">- ECS</text>
<text x="52" y="1124" class="text">- EHB</text>
<text x="52" y="1144" class="text">- EPB</text>
<text x="52" y="1164" class="text">- ESC</text>
<text x="52" y="1184" class="text">- MDPS</text>
<text x="52" y="1204" class="text">- ODS</text>
<text x="52" y="1224" class="text">- RWS</text>
<text x="52" y="1244" class="text">- SAS</text>
<text x="52" y="1264" class="text">- TPMS</text>
<text x="52" y="1284" class="text">- VCU</text>
<text x="52" y="1304" class="text">- VSM</text>

  <rect x="550" y="958" width="500" height="396" class="box" fill="#ffffff"/>
  <text x="572" y="994" class="label">Representative signals</text>
  <text x="572" y="1024" class="text">- Steering Angle</text>
<text x="572" y="1044" class="text">- Wheel Speed</text>
<text x="572" y="1064" class="text">- Tire Pressure</text>
<text x="572" y="1084" class="text">- Suspension State</text>

  <rect x="1070" y="958" width="500" height="396" class="box" fill="#fff7ed"/>
  <text x="1092" y="994" class="label">Why this flow matters</text>
  <text x="1092" y="1024" class="text">Chassis sensing and readiness stay visible</text>
<text x="1092" y="1044" class="text">and synchronized across control and display</text>
<text x="1092" y="1064" class="text">surfaces.</text>
</svg>
