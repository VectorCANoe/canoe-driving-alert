  <text x="52" y="136" class="label">Flow overview</text>
  <text x="52" y="166" class="text">Body lighting, ambient, wiper, and exterior cues amplify the selected warning state in the comfort domain.</text>
  <text x="52" y="202" class="small">Participants</text>
  <rect x="52" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="246" class="node">CGW / BCM</text><rect x="292" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="310" y="246" class="node">AFLS / AHLS / HLM</text><rect x="532" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="550" y="246" class="node">WIP / MIR / SRF</text><rect x="772" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="790" y="246" class="node">IVI / CLU</text><rect x="52" y="298" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="330" class="node">User</text>

  <rect x="30" y="462" width="1540" height="472" class="box" fill="#ffffff"/>
  <text x="52" y="498" class="label">Action sequence</text>
  <rect x="52" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="554" class="small">CGW / BCM</text><text x="72" y="582" class="label">Route body-facing alert intent</text><text x="72" y="610" class="text">Gateway and BCM expose selected</text>
<text x="72" y="630" class="text">warning meaning into the body</text>
<text x="72" y="650" class="text">domain.</text><line x1="332" y1="590" x2="356" y2="590" class="lane"/><rect x="356" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="554" class="small">AFLS / AHLS / HLM</text><text x="376" y="582" class="label">Apply lighting response</text><text x="376" y="610" class="text">Lighting controllers react to</text>
<text x="376" y="630" class="text">the selected body-facing alert</text>
<text x="376" y="650" class="text">cue.</text><line x1="636" y1="590" x2="660" y2="590" class="lane"/><rect x="660" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="680" y="554" class="small">WIP / MIR / SRF</text><text x="680" y="582" class="label">Propagate exterior comfort state</text><text x="680" y="610" class="text">Exterior comfort ECUs keep the</text>
<text x="680" y="630" class="text">body context visible and</text>
<text x="680" y="650" class="text">synchronized.</text><rect x="52" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="732" class="small">IVI / CLU</text><text x="72" y="760" class="label">Mirror ambient warning status</text><text x="72" y="788" class="text">Display surfaces show the same</text>
<text x="72" y="808" class="text">ambient or body warning meaning.</text><line x1="332" y1="768" x2="356" y2="768" class="lane"/><rect x="356" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="732" class="small">User</text><text x="376" y="760" class="label">See ambient reinforcement</text><text x="376" y="788" class="text">Driver perceives a reinforced</text>
<text x="376" y="808" class="text">warning through body and</text>
<text x="376" y="828" class="text">lighting behavior.</text>

