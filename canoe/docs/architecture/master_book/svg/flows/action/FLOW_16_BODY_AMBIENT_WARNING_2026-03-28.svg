  <rect x="0" y="0" width="1600" height="1376" class="bg"/>
  <text x="34" y="44" class="title">FLOW_16 - Body Ambient Warning Output</text>
  <text x="34" y="72" class="sub">Body and Comfort | canonical action flow</text>

