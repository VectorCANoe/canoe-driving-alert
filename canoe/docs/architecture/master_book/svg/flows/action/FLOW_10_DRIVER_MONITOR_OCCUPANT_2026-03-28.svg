<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1340" viewBox="0 0 1600 1340">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 30px 'Segoe UI', sans-serif; fill: #0f172a; }
    .sub { font: 500 15px 'Segoe UI', sans-serif; fill: #475569; }
    .label { font: 700 18px 'Segoe UI', sans-serif; fill: #0f172a; }
    .text { font: 600 15px 'Segoe UI', sans-serif; fill: #1f2937; }
    .small { font: 500 14px 'Segoe UI', sans-serif; fill: #475569; }
    .node { font: 700 16px 'Segoe UI', sans-serif; fill: #111827; }
    .box { rx: 20; ry: 20; stroke: #475569; stroke-width: 2; }
    .lane { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="0" y="0" width="1600" height="1340" class="bg"/>
  <text x="34" y="44" class="title">FLOW_10 - Driver Monitor and Occupant Risk</text>
  <text x="34" y="72" class="sub">ADAS | canonical action flow</text>

  <rect x="30" y="100" width="1540" height="318" class="box" fill="#fee2e2"/>
  <text x="52" y="136" class="label">Flow overview</text>
  <text x="52" y="166" class="text">Driver state and occupant perception are fed into the warning lane before output arbitration happens.</text>
  <text x="52" y="202" class="small">Participants</text>
  <rect x="52" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="246" class="node">DMS / OMS</text><rect x="292" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="310" y="246" class="node">ADAS</text><rect x="532" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="550" y="246" class="node">CGW</text><rect x="772" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="790" y="246" class="node">CLU / IVI</text><rect x="52" y="298" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="330" class="node">AMP</text>

  <rect x="30" y="462" width="1540" height="472" class="box" fill="#ffffff"/>
  <text x="52" y="498" class="label">Action sequence</text>
  <rect x="52" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="554" class="small">DMS / OMS</text><text x="72" y="582" class="label">Publish human-state context</text><text x="72" y="610" class="text">Driver and occupant monitoring</text>
<text x="72" y="630" class="text">raise attention and occupancy</text>
<text x="72" y="650" class="text">context.</text><line x1="332" y1="590" x2="356" y2="590" class="lane"/><rect x="356" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="554" class="small">ADAS</text><text x="376" y="582" class="label">Merge human-state risk</text><text x="376" y="610" class="text">ADAS combines human-state</text>
<text x="376" y="630" class="text">signals with the active warning</text>
<text x="376" y="650" class="text">picture.</text><line x1="636" y1="590" x2="660" y2="590" class="lane"/><rect x="660" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="680" y="554" class="small">CGW</text><text x="680" y="582" class="label">Route selected human-state cue</text><text x="680" y="610" class="text">Gateway exposes the chosen</text>
<text x="680" y="630" class="text">occupant-related warning state.</text><rect x="52" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="732" class="small">CLU / IVI</text><text x="72" y="760" class="label">Render warning cue</text><text x="72" y="788" class="text">Visual surfaces show the driver</text>
<text x="72" y="808" class="text">or occupant-related warning</text>
<text x="72" y="828" class="text">meaning.</text><line x1="332" y1="768" x2="356" y2="768" class="lane"/><rect x="356" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="732" class="small">AMP</text><text x="376" y="760" class="label">Render audio cue</text><text x="376" y="788" class="text">Audio alert follows the selected</text>
<text x="376" y="808" class="text">human-state warning severity.</text>

  <rect x="30" y="958" width="500" height="300" class="box" fill="#eff6ff"/>
  <text x="52" y="994" class="label">Related ECU bank</text>
  <text x="52" y="1024" class="text">- DMS</text>
<text x="52" y="1044" class="text">- OMS</text>

  <rect x="550" y="958" width="500" height="300" class="box" fill="#ffffff"/>
  <text x="572" y="994" class="label">Representative signals</text>
  <text x="572" y="1024" class="text">- Driver State</text>
<text x="572" y="1044" class="text">- Occupant State</text>
<text x="572" y="1064" class="text">- Alert Type</text>
<text x="572" y="1084" class="text">- Base Volume</text>

  <rect x="1070" y="958" width="500" height="300" class="box" fill="#fff7ed"/>
  <text x="1092" y="994" class="label">Why this flow matters</text>
  <text x="1092" y="1024" class="text">Driver-state and occupant warnings are</text>
<text x="1092" y="1044" class="text">visible, audible, and consistent with the</text>
<text x="1092" y="1064" class="text">active context.</text>
</svg>
