<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1656" viewBox="0 0 1600 1656">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 30px 'Segoe UI', sans-serif; fill: #0f172a; }
    .sub { font: 500 15px 'Segoe UI', sans-serif; fill: #475569; }
    .label { font: 700 18px 'Segoe UI', sans-serif; fill: #0f172a; }
    .text { font: 600 15px 'Segoe UI', sans-serif; fill: #1f2937; }
    .small { font: 500 14px 'Segoe UI', sans-serif; fill: #475569; }
    .node { font: 700 16px 'Segoe UI', sans-serif; fill: #111827; }
    .box { rx: 20; ry: 20; stroke: #475569; stroke-width: 2; }
    .lane { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="0" y="0" width="1600" height="1656" class="bg"/>
  <text x="34" y="44" class="title">FLOW_06 - Object Risk Fusion</text>
  <text x="34" y="72" class="sub">ADAS | canonical action flow</text>

  <rect x="30" y="100" width="1540" height="318" class="box" fill="#fee2e2"/>
  <text x="52" y="136" class="label">Flow overview</text>
  <text x="52" y="166" class="text">Radar, camera, lidar, and perception nodes are fused into one object-risk lane for ADAS warning and assist decisions.</text>
  <text x="52" y="202" class="small">Participants</text>
  <rect x="52" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="246" class="node">FCAM / FRADAR / LDR</text><rect x="292" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="310" y="246" class="node">SRR_* / OMS</text><rect x="532" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="550" y="246" class="node">ADAS</text><rect x="772" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="790" y="246" class="node">CGW</text><rect x="52" y="298" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="330" class="node">CLU / IVI</text>

  <rect x="30" y="462" width="1540" height="472" class="box" fill="#ffffff"/>
  <text x="52" y="498" class="label">Action sequence</text>
  <rect x="52" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="554" class="small">FCAM / FRADAR / LDR</text><text x="72" y="582" class="label">Publish scene primitives</text><text x="72" y="610" class="text">Front sensing ECUs emit object,</text>
<text x="72" y="630" class="text">lane, and range context.</text><line x1="332" y1="590" x2="356" y2="590" class="lane"/><rect x="356" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="554" class="small">SRR_* / OMS</text><text x="376" y="582" class="label">Add side and occupant context</text><text x="376" y="610" class="text">Side radar and occupant</text>
<text x="376" y="630" class="text">perception enrich the risk</text>
<text x="376" y="650" class="text">picture.</text><line x1="636" y1="590" x2="660" y2="590" class="lane"/><rect x="660" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="680" y="554" class="small">ADAS</text><text x="680" y="582" class="label">Fuse object risk</text><text x="680" y="610" class="text">ADAS turns multi-sensor state</text>
<text x="680" y="630" class="text">into warning, release, and</text>
<text x="680" y="650" class="text">assist candidates.</text><rect x="52" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="732" class="small">CGW</text><text x="72" y="760" class="label">Route selected risk state</text><text x="72" y="788" class="text">Gateway distributes the fused</text>
<text x="72" y="808" class="text">ADAS state toward HMI surfaces.</text><line x1="332" y1="768" x2="356" y2="768" class="lane"/><rect x="356" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="732" class="small">CLU / IVI</text><text x="376" y="760" class="label">Expose warning context</text><text x="376" y="788" class="text">Display surfaces show the</text>
<text x="376" y="808" class="text">selected risk interpretation.</text>

  <rect x="30" y="958" width="500" height="616" class="box" fill="#eff6ff"/>
  <text x="52" y="994" class="label">Related ECU bank</text>
  <text x="52" y="1024" class="text">- ADAS</text>
<text x="52" y="1044" class="text">- AEB</text>
<text x="52" y="1064" class="text">- AVM</text>
<text x="52" y="1084" class="text">- BCW</text>
<text x="52" y="1104" class="text">- DMS</text>
<text x="52" y="1124" class="text">- FCA</text>
<text x="52" y="1144" class="text">- FCAM</text>
<text x="52" y="1164" class="text">- FRADAR</text>
<text x="52" y="1184" class="text">- HWP</text>
<text x="52" y="1204" class="text">- LCA</text>
<text x="52" y="1224" class="text">- LDR</text>
<text x="52" y="1244" class="text">- LDWS_LKAS</text>
<text x="52" y="1264" class="text">- OMS</text>
<text x="52" y="1284" class="text">- PKM</text>
<text x="52" y="1304" class="text">- PUS</text>
<text x="52" y="1324" class="text">- RPC</text>
<text x="52" y="1344" class="text">- RRM</text>
<text x="52" y="1364" class="text">- RSPA</text>
<text x="52" y="1384" class="text">- SCC</text>
<text x="52" y="1404" class="text">- SPAS</text>
<text x="52" y="1424" class="text">- SPM</text>
<text x="52" y="1444" class="text">- SRR_FL</text>
<text x="52" y="1464" class="text">- SRR_FR</text>
<text x="52" y="1484" class="text">- SRR_RL</text>
<text x="52" y="1504" class="text">- SRR_RR</text>
<text x="52" y="1524" class="text">- TRM</text>

  <rect x="550" y="958" width="500" height="616" class="box" fill="#ffffff"/>
  <text x="572" y="994" class="label">Representative signals</text>
  <text x="572" y="1024" class="text">- Object Risk</text>
<text x="572" y="1044" class="text">- Lane State</text>
<text x="572" y="1064" class="text">- ADAS Domain State</text>
<text x="572" y="1084" class="text">- Alert Level</text>

  <rect x="1070" y="958" width="500" height="616" class="box" fill="#fff7ed"/>
  <text x="1092" y="994" class="label">Why this flow matters</text>
  <text x="1092" y="1024" class="text">Object-risk interpretation is unified before</text>
<text x="1092" y="1044" class="text">any warning or assist output is shown to the</text>
<text x="1092" y="1064" class="text">driver.</text>
</svg>
