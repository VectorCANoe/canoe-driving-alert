<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1436" viewBox="0 0 1600 1436">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 30px 'Segoe UI', sans-serif; fill: #0f172a; }
    .sub { font: 500 15px 'Segoe UI', sans-serif; fill: #475569; }
    .label { font: 700 18px 'Segoe UI', sans-serif; fill: #0f172a; }
    .text { font: 600 15px 'Segoe UI', sans-serif; fill: #1f2937; }
    .small { font: 500 14px 'Segoe UI', sans-serif; fill: #475569; }
    .node { font: 700 16px 'Segoe UI', sans-serif; fill: #111827; }
    .box { rx: 20; ry: 20; stroke: #475569; stroke-width: 2; }
    .lane { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="0" y="0" width="1600" height="1436" class="bg"/>
  <text x="34" y="44" class="title">FLOW_03 - Propulsion Energy Status</text>
  <text x="34" y="72" class="sub">Dynamics | canonical action flow</text>

  <rect x="30" y="100" width="1540" height="318" class="box" fill="#dbeafe"/>
  <text x="52" y="136" class="label">Flow overview</text>
  <text x="52" y="166" class="text">Powertrain and energy ECUs consolidate drive, torque, battery, and charging state into the central propulsion state lane.</text>
  <text x="52" y="202" class="small">Participants</text>
  <rect x="52" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="246" class="node">BAT_BMS / EMS</text><rect x="292" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="310" y="246" class="node">VCU</text><rect x="532" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="550" y="246" class="node">TCU / TRM</text><rect x="772" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="790" y="246" class="node">CGW / ADAS</text><rect x="52" y="298" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="330" class="node">CLU / IVI</text>

  <rect x="30" y="462" width="1540" height="472" class="box" fill="#ffffff"/>
  <text x="52" y="498" class="label">Action sequence</text>
  <rect x="52" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="554" class="small">BAT_BMS / EMS</text><text x="72" y="582" class="label">Publish energy inputs</text><text x="72" y="610" class="text">Battery, engine, and power</text>
<text x="72" y="630" class="text">limits are produced into the</text>
<text x="72" y="650" class="text">propulsion lane.</text><line x1="332" y1="590" x2="356" y2="590" class="lane"/><rect x="356" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="554" class="small">VCU</text><text x="376" y="582" class="label">Fuse drive state</text><text x="376" y="610" class="text">Vehicle controller merges speed,</text>
<text x="376" y="630" class="text">drive, throttle, and energy</text>
<text x="376" y="650" class="text">conditions.</text><line x1="636" y1="590" x2="660" y2="590" class="lane"/><rect x="660" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="680" y="554" class="small">TCU / TRM</text><text x="680" y="582" class="label">Propagate support state</text><text x="680" y="610" class="text">Transmission and thermal support</text>
<text x="680" y="630" class="text">readers react to the central</text>
<text x="680" y="650" class="text">propulsion state.</text><rect x="52" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="732" class="small">CGW / ADAS</text><text x="72" y="760" class="label">Expose runtime state</text><text x="72" y="788" class="text">Gateway and ADAS consume</text>
<text x="72" y="808" class="text">propulsion status for visibility</text>
<text x="72" y="828" class="text">and control adaptation.</text><line x1="332" y1="768" x2="356" y2="768" class="lane"/><rect x="356" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="732" class="small">CLU / IVI</text><text x="376" y="760" class="label">Render vehicle status</text><text x="376" y="788" class="text">Display surfaces show mode,</text>
<text x="376" y="808" class="text">vehicle state, and support</text>
<text x="376" y="828" class="text">context.</text>

  <rect x="30" y="958" width="500" height="396" class="box" fill="#eff6ff"/>
  <text x="52" y="994" class="label">Related ECU bank</text>
  <text x="52" y="1024" class="text">- BAT_BMS</text>
<text x="52" y="1044" class="text">- CPC</text>
<text x="52" y="1064" class="text">- DCDC</text>
<text x="52" y="1084" class="text">- EMS</text>
<text x="52" y="1104" class="text">- EOP</text>
<text x="52" y="1124" class="text">- EWP</text>
<text x="52" y="1144" class="text">- FPCM</text>
<text x="52" y="1164" class="text">- INVERTER</text>
<text x="52" y="1184" class="text">- ISG</text>
<text x="52" y="1204" class="text">- LVR</text>
<text x="52" y="1224" class="text">- MCU</text>
<text x="52" y="1244" class="text">- OBC</text>
<text x="52" y="1264" class="text">- TCU</text>
<text x="52" y="1284" class="text">- VCU</text>
<text x="52" y="1304" class="text">- _4WD</text>

  <rect x="550" y="958" width="500" height="396" class="box" fill="#ffffff"/>
  <text x="572" y="994" class="label">Representative signals</text>
  <text x="572" y="1024" class="text">- Bat Bms State</text>
<text x="572" y="1044" class="text">- State Can</text>
<text x="572" y="1064" class="text">- Powertrain Gateway</text>
<text x="572" y="1084" class="text">- Speed</text>

  <rect x="1070" y="958" width="500" height="396" class="box" fill="#fff7ed"/>
  <text x="1092" y="994" class="label">Why this flow matters</text>
  <text x="1092" y="1024" class="text">Vehicle mode, energy state, and propulsion</text>
<text x="1092" y="1044" class="text">readiness appear as one coherent status</text>
<text x="1092" y="1064" class="text">surface.</text>
</svg>
