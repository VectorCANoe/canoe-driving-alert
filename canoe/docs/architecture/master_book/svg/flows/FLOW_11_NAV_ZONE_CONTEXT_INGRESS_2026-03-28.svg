<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1360" viewBox="0 0 1600 1360">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 30px 'Segoe UI', sans-serif; fill: #0f172a; }
    .sub { font: 500 15px 'Segoe UI', sans-serif; fill: #475569; }
    .label { font: 700 18px 'Segoe UI', sans-serif; fill: #0f172a; }
    .text { font: 600 15px 'Segoe UI', sans-serif; fill: #1f2937; }
    .small { font: 500 14px 'Segoe UI', sans-serif; fill: #475569; }
    .node { font: 700 16px 'Segoe UI', sans-serif; fill: #111827; }
    .box { rx: 20; ry: 20; stroke: #475569; stroke-width: 2; }
    .lane { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="0" y="0" width="1600" height="1360" class="bg"/>
  <text x="34" y="44" class="title">FLOW_11 - Navigation Zone Context Ingress</text>
  <text x="34" y="72" class="sub">Display and Alert | generated canonical action-flow companion for the internal ECU master book</text>

  <rect x="30" y="100" width="1540" height="318" class="box" fill="#ede9fe"/>
  <text x="52" y="136" class="label">Flow overview</text>
  <text x="52" y="166" class="text">Map and telematics context enters the runtime and becomes zone-aware alert context for downstream selection and HMI.</text>
  <text x="52" y="202" class="small">Participants</text>
  <rect x="52" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="246" class="node">NAV / TMU</text><rect x="292" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="310" y="246" class="node">IVI</text><rect x="532" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="550" y="246" class="node">CGW</text><rect x="772" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="790" y="246" class="node">ADAS</text><rect x="52" y="298" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="330" class="node">CLU / AMP</text>

  <rect x="30" y="462" width="1540" height="472" class="box" fill="#ffffff"/>
  <text x="52" y="498" class="label">Action sequence</text>
  <rect x="52" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="554" class="small">NAV / TMU</text><text x="72" y="582" class="label">Publish route and zone context</text><text x="72" y="610" class="text">Navigation and telematics layers</text>
<text x="72" y="630" class="text">raise school-zone, highway, and</text>
<text x="72" y="650" class="text">route context.</text><line x1="332" y1="590" x2="356" y2="590" class="lane"/><rect x="356" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="554" class="small">IVI</text><text x="376" y="582" class="label">Normalize HMI context</text><text x="376" y="610" class="text">IVI converts map context into</text>
<text x="376" y="630" class="text">one runtime-visible navigation</text>
<text x="376" y="650" class="text">state lane.</text><line x1="636" y1="590" x2="660" y2="590" class="lane"/><rect x="660" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="680" y="554" class="small">CGW</text><text x="680" y="582" class="label">Expose context to domain readers</text><text x="680" y="610" class="text">Gateway forwards the selected</text>
<text x="680" y="630" class="text">navigation context to downstream</text>
<text x="680" y="650" class="text">domains.</text><rect x="52" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="732" class="small">ADAS</text><text x="72" y="760" class="label">Blend zone context into alerts</text><text x="72" y="788" class="text">ADAS uses zone context for</text>
<text x="72" y="808" class="text">warning prioritization and speed</text>
<text x="72" y="828" class="text">adjustment.</text><line x1="332" y1="768" x2="356" y2="768" class="lane"/><rect x="356" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="732" class="small">CLU / AMP</text><text x="376" y="760" class="label">Render zone-aware warning</text><text x="376" y="788" class="text">Cluster and audio surfaces</text>
<text x="376" y="808" class="text">express the selected zone-aware</text>
<text x="376" y="828" class="text">alert.</text>

  <rect x="30" y="958" width="500" height="320" class="box" fill="#eff6ff"/>
  <text x="52" y="994" class="label">Related ECU bank</text>
  <text x="52" y="1024" class="text">- AMP</text>
<text x="52" y="1044" class="text">- CLU</text>
<text x="52" y="1064" class="text">- HUD</text>
<text x="52" y="1084" class="text">- IVI</text>
<text x="52" y="1104" class="text">- NAV</text>
<text x="52" y="1124" class="text">- RSE</text>
<text x="52" y="1144" class="text">- TMU</text>
<text x="52" y="1164" class="text">- VCS</text>

  <rect x="550" y="958" width="500" height="320" class="box" fill="#ffffff"/>
  <text x="572" y="994" class="label">Key contracts</text>
  <text x="572" y="1024" class="text">- frmNavContextCanMsg</text>
<text x="572" y="1044" class="text">- frmNavModuleStateMsg</text>
<text x="572" y="1064" class="text">- frmRoadZoneStateMsg</text>
<text x="572" y="1084" class="text">- selected alert type</text>

  <rect x="1070" y="958" width="500" height="320" class="box" fill="#fff7ed"/>
  <text x="1092" y="994" class="label">Files and user outcome</text>
  <text x="1092" y="1024" class="text">- NAV.can</text>
<text x="1092" y="1044" class="text">- TMU.can</text>
<text x="1092" y="1064" class="text">- IVI.can</text>
<text x="1092" y="1084" class="text">- CGW.can</text>
<text x="1092" y="1104" class="text">- ADAS.can</text>
<text x="1092" y="1124" class="text"></text>
<text x="1092" y="1144" class="text">Zone-aware warning behavior is traceable from</text>
<text x="1092" y="1164" class="text">map context ingress to the final driver cue.</text>
</svg>
