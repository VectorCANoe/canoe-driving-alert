rs / longitudinal users</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="763.8198" x="25.0999" y="146.218"/><line style="stroke:#000000;stroke-width:0.5;" x1="25.0999" x2="788.9197" y1="146.218" y2="146.218"/><line style="stroke:#000000;stroke-width:0.5;" x1="25.0999" x2="788.9197" y1="149.218" y2="149.218"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="87.3423" x="363.3386" y="136.8936"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="70.2861" x="369.3386" y="151.3914">Cruise Inputs</text><polygon fill="#000000" points="200.5212,245.436,210.5212,249.436,200.5212,253.436,204.5212,249.436" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="96.1975" x2="206.5212" y1="249.436" y2="249.436"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="53.1953" x="127.7617" y="182.0403">speedLimit</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="43.4038" x="132.6575" y="194.6892">riskLevel</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="64.2061" x="122.2563" y="207.3381">failSafeMode</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="92.3237" x="108.1975" y="219.9871">emergencyContext</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="89.8853" x="109.4167" y="232.636">selectedAlertLevel</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="66.0483" x="121.3352" y="245.2849">vehicleSpeed</text><line style="stroke:#000000;stroke-width:1;" x1="212.5212" x2="254.5212" y1="276.085" y2="276.085"/><line style="stroke:#000000;stroke-width:1;" x1="254.5212" x2="254.5212" y1="276.085" y2="289.085"/><line style="stroke:#000000;stroke-width:1;" x1="213.521