 users</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="911.3562" x="5" y="146.218"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="916.3562" y1="146.218" y2="146.218"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="916.3562" y1="149.218" y2="149.218"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="95.8931" x="412.7316" y="136.8936"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="78.8369" x="418.7316" y="151.3914">Stability Inputs</text><polygon fill="#000000" points="334.4165,207.4893,344.4165,211.4893,334.4165,215.4893,338.4165,211.4893" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="77.8384" x2="340.4165" y1="211.4893" y2="211.4893"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="143.6768" x="140.2891" y="182.0403">escCtrlState / escIntervention</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="244.5781" x="89.8384" y="194.6892">aebArmed / stopReq / decelProfile / domainHealth</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="66.0483" x="179.1033" y="207.3381">vehicleSpeed</text><line style="stroke:#000000;stroke-width:1;" x1="346.4165" x2="388.4165" y1="250.7871" y2="250.7871"/><line style="stroke:#000000;stroke-width:1;" x1="388.4165" x2="388.4165" y1="250.7871" y2="263.7871"/><line style="stroke:#000000;stroke-width:1;" x1="347.4165" x2="388.4165" y1="263.7871" y2="263.7871"/><polygon fill="#000000" points="357.4165,259.7871,347.4165,263.7871,357.4165,267.7871,353.4165,263.7871" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="81.9307" x="373.7515" y="233.9871">if ESC stale then</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="122.6006" x="353.4165" y="246.636">esc state/intervention = 0</text><line style="stroke:#000000;stroke-width:1;" x1="346.4165" x2="388.4165" y1="303.085" y2="303.085"/><line style="stroke:#000000;stroke-width:1;" x1="388.4165" x2="388.4165" y1="303.085" y2="316.085"/><line style="stroke:#000000;stroke-width:1;" x1="347.4165" x2="388.4165" y1="316.085" y2="316.085"/><polygon fill="#000000" points="357.4165,312.085,347.4165,316.085,357.4165,320.085,353.4165,316.085" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="81.3237" x="462.5652" y="286.2849">if AEB stale then</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="299.6211" x="353.4165" y="298.9338">armed = 0 / stopReq = 0 / decelProfile = 0 / domainHealth = 1</text><line style="stroke:#000000;stroke-width:1;" x1="346.4165" x2="388.4165" y1="355.3828" y2="355.3828"/><line style="stroke:#000000;stroke-width:1;" x1="388.4165" x2="388.4165" y1="355.3828" y2="368.3828"/><line style="stroke:#000000;stroke-width:1;" x1="347.4165" x2="388.4165" y1="368.3828" y2="368.3828"/><polygon fill="#000000" points="357.4165,364.3828,347.4165,368.3828,357.4165,372.3828,353.4165,368.3828" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="217.6582" x="353.4165" y="338.5828">ctrlState escalates when stale or AEB armed</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="195.0781" x="364.7065" y="351.2317">and reaches 3 when domainHealth &lt;= 0</text><line style="stroke:#000000;stroke-width:1;" x1="346.4165" x2="388.4165" y1="407.6807" y2="407.6807"/><line style="stroke:#000000;stroke-width:1;" x1="388.4165" x2="388.4165" y1="407.6807" y2="420.6807"/><line style="stroke:#000000;stroke-width:1;" x1="347.4165" x2="388.4165" y1="420.6807" y2="420.6807"/><polygon fill