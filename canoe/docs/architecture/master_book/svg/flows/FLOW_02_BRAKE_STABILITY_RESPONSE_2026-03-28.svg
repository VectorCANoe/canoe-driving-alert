<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1360" viewBox="0 0 1600 1360">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 30px 'Segoe UI', sans-serif; fill: #0f172a; }
    .sub { font: 500 15px 'Segoe UI', sans-serif; fill: #475569; }
    .label { font: 700 18px 'Segoe UI', sans-serif; fill: #0f172a; }
    .text { font: 600 15px 'Segoe UI', sans-serif; fill: #1f2937; }
    .small { font: 500 14px 'Segoe UI', sans-serif; fill: #475569; }
    .node { font: 700 16px 'Segoe UI', sans-serif; fill: #111827; }
    .box { rx: 20; ry: 20; stroke: #475569; stroke-width: 2; }
    .lane { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="0" y="0" width="1600" height="1360" class="bg"/>
  <text x="34" y="44" class="title">FLOW_02 - Brake Stability Response</text>
  <text x="34" y="72" class="sub">Dynamics | generated canonical action-flow companion for the internal ECU master book</text>

  <rect x="30" y="100" width="1540" height="318" class="box" fill="#dbeafe"/>
  <text x="52" y="136" class="label">Flow overview</text>
  <text x="52" y="166" class="text">Brake request, AEB pressure intent, and stability outputs are synchronized across chassis brake owners and downstream readers.</text>
  <text x="52" y="202" class="small">Participants</text>
  <rect x="52" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="246" class="node">AEB / ADAS</text><rect x="292" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="310" y="246" class="node">ESC</text><rect x="532" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="550" y="246" class="node">ABS / EHB / VSM</text><rect x="772" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="790" y="246" class="node">VCU</text><rect x="52" y="298" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="330" class="node">CGW / CLU</text>

  <rect x="30" y="462" width="1540" height="472" class="box" fill="#ffffff"/>
  <text x="52" y="498" class="label">Action sequence</text>
  <rect x="52" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="554" class="small">AEB / ADAS</text><text x="72" y="582" class="label">Raise brake assist intent</text><text x="72" y="610" class="text">Decel profile and stop request</text>
<text x="72" y="630" class="text">are emitted for chassis</text>
<text x="72" y="650" class="text">actuation.</text><line x1="332" y1="590" x2="356" y2="590" class="lane"/><rect x="356" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="554" class="small">ESC</text><text x="376" y="582" class="label">Arbitrate brake pressure</text><text x="376" y="610" class="text">Brake controller merges manual</text>
<text x="376" y="630" class="text">state, assist pressure, and</text>
<text x="376" y="650" class="text">stability state.</text><line x1="636" y1="590" x2="660" y2="590" class="lane"/><rect x="660" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="680" y="554" class="small">ABS / EHB / VSM</text><text x="680" y="582" class="label">Reflect local intervention</text><text x="680" y="610" class="text">Leaf brake and stability ECUs</text>
<text x="680" y="630" class="text">consume the same intervention</text>
<text x="680" y="650" class="text">window.</text><rect x="52" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="732" class="small">VCU</text><text x="72" y="760" class="label">Consume vehicle state</text><text x="72" y="788" class="text">Powertrain side reacts to brake</text>
<text x="72" y="808" class="text">and wheel speed state</text>
<text x="72" y="828" class="text">transitions.</text><line x1="332" y1="768" x2="356" y2="768" class="lane"/><rect x="356" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="732" class="small">CGW / CLU</text><text x="376" y="760" class="label">Expose brake state</text><text x="376" y="788" class="text">Gateway and display surfaces</text>
<text x="376" y="808" class="text">publish brake, stability, and</text>
<text x="376" y="828" class="text">health readback.</text>

  <rect x="30" y="958" width="500" height="320" class="box" fill="#eff6ff"/>
  <text x="52" y="994" class="label">Related ECU bank</text>
  <text x="52" y="1024" class="text">- ABS</text>
<text x="52" y="1044" class="text">- AEB</text>
<text x="52" y="1064" class="text">- EHB</text>
<text x="52" y="1084" class="text">- EPB</text>
<text x="52" y="1104" class="text">- ESC</text>
<text x="52" y="1124" class="text">- FCA</text>
<text x="52" y="1144" class="text">- VCU</text>
<text x="52" y="1164" class="text">- VSM</text>

  <rect x="550" y="958" width="500" height="320" class="box" fill="#ffffff"/>
  <text x="572" y="994" class="label">Key contracts</text>
  <text x="572" y="1024" class="text">- frmAebDomainStateMsg</text>
<text x="572" y="1044" class="text">- frmBrakeStatusMsg</text>
<text x="572" y="1064" class="text">- frmBrakeTempMsg</text>
<text x="572" y="1084" class="text">- frmWheelSpeedMsg</text>
<text x="572" y="1104" class="text">- Chassis::brakePressure</text>

  <rect x="1070" y="958" width="500" height="320" class="box" fill="#fff7ed"/>
  <text x="1092" y="994" class="label">Files and user outcome</text>
  <text x="1092" y="1024" class="text">- AEB.can</text>
<text x="1092" y="1044" class="text">- ADAS.can</text>
<text x="1092" y="1064" class="text">- ESC.can</text>
<text x="1092" y="1084" class="text">- EHB.can</text>
<text x="1092" y="1104" class="text">- VSM.can</text>
<text x="1092" y="1124" class="text"></text>
<text x="1092" y="1144" class="text">Brake intervention feels coordinated and the</text>
<text x="1092" y="1164" class="text">driver sees consistent brake and stability state</text>
<text x="1092" y="1184" class="text">feedback.</text>
</svg>
