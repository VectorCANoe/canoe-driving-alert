2.5" style="stroke:#000000;stroke-width:1;" width="88.5884" x="693.2393" y="76.5957"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="56.8477" x="709.1096" y="94.0935">Observers /</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="74.5884" x="700.2393" y="106.7424">access readers</text><rect fill="#FCE8FF" height="39.2979" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="88.5884" x="693.2393" y="888.3081"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="56.8477" x="709.1096" y="905.8059">Observers /</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="74.5884" x="700.2393" y="918.4548">access readers</text><rect fill="#FFFFFF" height="549.9253" style="stroke:#000000;stroke-width:1;" width="10" x="322.6301" y="238.1382"/><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="791.8276" x="5" y="146.218"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="796.8276" y1="146.218" y2="146.218"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="796.8276" y1="149.218" y2="149.218"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="77.5508" x="362.1384" y="136.8936"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="60.4946" x="368.1384" y="151.3914">SMK Inputs</text><polygon fill="#000000" points="315.6301,194.8403,325.6301,198.8403,315.6301,202.8403,319.6301,198.8403" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="63.0696" x2="321.6301" y1="198.8403" y2="198.8403"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="111.8691" x="139.4153" y="182.0403">frmDigitalKeyStateMsg</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="171.8105" x="109.4446" y="194.6892">VehicleAccessState / KeyPresence</text><polygon fill="#000000" points="310.6301,234.1382,320.6301,238.1382,310.6301,242.1382,314.6301,238.1382" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="185.0256" x2="316.6301" y1="238.1382" y2="238.1382"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="118.6045" x="194.5256" y="221.3381">frmVehicleStateCanMsg</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="57.4707" x="225.0925" y="233.9871">gDriveState</text><line style="stroke:#000000;stroke-width:1;" x1="332.6301" x2="374.6301" y1="277.436" y2="277.436"/><line style="stroke:#000000;stroke-width:1;" x1="374.6301" x2="374.6301" y1="277.436" y2="290.436"/><line style="stroke:#000000;stroke-width:1;" x1="333.6301" x2="374.6301" y1="290.436" y2="290.436"/><polygon fill="#000000" points="343.6301,286.436,333.6301,290.436,343.6301,294.436,339.6301,290.436" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="165.7197" x="339.6301" y="260.636">dkeyInputStale / vehicleInputStale</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="63.5884" x="390.6958" y="273.2849">lease checks</text><line style="stroke:#000000;stroke-width:1;" x1="332.6301" x2="374.6301" y1="329.7339" y2="329.7339"/><line style="stroke:#000000;stroke-width:1;" x1="374.6301" x2="374.6301" y1="329.7339" y2="342.7339"/><line style="stroke:#000000;stroke-width:1;" x1="333.6301" x2="374.6301" y1="342.7339" y2="342.7339"/><polygon fill="#000000" points="343.6301,338.7339,333.6301,342.7339,343.6301,346.7339,339.6301,342.7339" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="93.5537" x="339.6301" y="312.9338">if vehicle stale then</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="68.1807" x="352.3167" y="325.5828">driveState = 3</text><line style="stroke:#000000;stroke-width:1;" x1="332.6301" x2="374.6301" y1="394.6807" y2="394.6807"/><line style="stroke:#000000;stroke-width:1;" x1="374.6301" x2="374.6301" y1="394.6807" y2="407.6807"/><line style="stroke:#000000;stroke-width:1;" x1="333.6301" x2="374.6301" y1="407.6807" y2="407.6807"/><polygon fill="#000000" points="343.6301,403.6807,333.6301,407.6807,343.6301,411.6807,339.6301,407.6807" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="96.3037" x="374.3354" y="365.2317">accessAuthorized =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="165.7144" x="339.6301" y="377.8806">dkey fresh and KeyPresence == 1</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="143.7036" x="350.6355" y="390.5295">and VehicleAccessState &gt;= 1</text><line style="stroke:#000000;stroke-width:1;" x1="332.6301" x2="374.6301" y1="446.9785" y2="446.9785"/><line style="stroke:#000000;stroke-width:1;" x1="374.6301" x2="374.6301" y1="446.9785" y2="459.9785"/><line style="stroke:#000000;stroke-width:1;" x1="333.6301" x2="374.6301" y1="459.9785" y2="459.9785"/><polygon fill="#000000" points="343.6301,455.9785,333.6301,459.9785,343.6301,463.9785,339.6301,459.9785" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="153.769" x="372.6624" y="430.1785">immobilizerState = 1 by default,</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="219.8335" x="339.6301" y="442.8274">0 when vehicle input fresh and driveState &gt; 0</text><line style="stroke:#000000;stroke-width:1;" x1="332.6301" x2="374.6301" y1="486.6274" y2="486.6274"/><line style="stroke:#000000;stroke-width:1;" x1="374.6301" x2="374.6301" y1="486.6274" y2="499.6274"/><line style="stroke:#000000;stroke-width:1;" x1="333.6301" x2="374.6301" y1="499.6274" y2="499.6274"/><polygon fill="#000000" points="343.6301,495.6274,333.6301,499.6274,343.6301,503.6274,339.6301,499.6274" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="164.7905" x="339.6301" y="482.4763">keyAuthState = accessAuthorized</text><path d="M337,512.6274 L337,572.6274 L497,572.6274 L497,522.6274 L487,512.6274 L337,512.6274 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M487,512.6274 L487,522.6274 L497,522.6274 L487,512.6274 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="139.4229" x="343" y="528.1252">Representative gating inputs</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="103.936" x="343" y="540.7742">- VehicleAccessState</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="72.1445" x="343" y="553.4231">- KeyPresence</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="64.1899" x="343" y="566.072">- gDriveState</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="791.8276" x="5" y="597.5476"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="796.8276" y1="597.5476" y2="597.5476"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="796.8276" y1="600.5476" y2="600.5476"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="84.2808" x="358.7734" y="588.2231"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="67.2246" x="364.7734" y="602.7209">SMK Publish</text><polygon fill="#000000" points="569.4636,646.1699,579.4636,650.1699,569.4636,654.1699,573.4636,650.1699" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="332.6301" x2="575.4636" y1="650.1699" y2="650.1699"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="118.5776" x="397.7581" y="633.3699">frmImmobilizerStateMsg</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="158.3506" x="377.8716" y="646.0188">ImmobilizerState / KeyAuthState</text><path d="M337,663.1699 L337,710.1699 L471,710.1699 L471,673.1699 L461,663.1699 L337,663.1699 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M461,663.1699 L461,673.1699 L471,673.1699 L461,663.1699 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="113.126" x="343" y="678.6677">Representative outputs</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="88.6338" x="343" y="691.3167">- ImmobilizerState</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="73.9868" x="343" y="703.9656">- KeyAuthState</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="791.8276" x="5" y="735.4412"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="796.8276" y1="735.4412" y2="735.4412"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="796.8276" y1="738.4412" y2="738.4412"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="131.3638" x="335.2319" y="726.1167"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="114.3076" x="341.2319" y="740.6145">Downstream Visibility</text><polygon fill="#000000" points="725.5334,784.0635,735.5334,788.0635,725.5334,792.0635,729.5334,788.0635" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="581.4636" x2="731.5334" y