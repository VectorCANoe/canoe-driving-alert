extLength="105.7837" x="154.9301" y="207.3381">Body::ambientPattern</text><path d="M115,224.4893 L115,259.4893 L322,259.4893 L322,234.4893 L312,224.4893 L115,224.4893 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M312,224.4893 L312,234.4893 L322,234.4893 L312,224.4893 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="144.2998" x="121" y="239.9871">Ambient base state is already</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="186.4683" x="121" y="252.636">resolved by BCM before IVI renders it.</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="799.0217" x="5" y="284.1116"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="804.0217" y1="284.1116" y2="284.1116"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="804.0217" y1="287.1116" y2="287.1116"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="138.7168" x="335.1525" y="274.7871"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="121.6606" x="341.1525" y="289.2849">Pulse Phase Derivation</text><line style="stroke:#000000;stroke-width:1;" x1="305.1824" x2="347.1824" y1="349.3828" y2="349.3828"/><line style="stroke:#000000;stroke-width:1;" x1="347.1824" x2="347.1824" y1="349.3828" y2="362.3828"/><line style="stroke:#000000;stroke-width:1;" x1="306.1824" x2="347.1824" y1="362.3828" y2="362.3828"/><polygon fill="#000000" points="316.1824,358.3828,306.1824,362.3828,316.1824,366.3828,312.1824,362.3828" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="79.4868" x="381.2869" y="319.9338">if alertType == 4</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="123.4976" x="359.2815" y="332.5828">or emergency alert active</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="217.6958" x="312.1824" y="345.2317">then gAmbientPulsePhase = (phase + 1) &amp; 3</text><line style="stroke:#000000;stroke-width:1;" x1="305.1824" x2="347.1824" y1="389.0317" y2="389.0317"/><line style="stroke:#000000;stroke-width:1;" x1="347.1824" x2="347.1824" y1="389.0317" y2="402.0317"/><line style="stroke:#000000;stroke-width:1;" x1="306.1824" x2="347.1824" y1="402.0317" y2="402.0317"/><polygon fill="#000000" points="316.1824,398.0317,306.1824,402.0317,316.1824,406.0317,312.1824,402.0317" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="147.0659" x="312.1824" y="384.8806">else gAmbientPulsePhase = 0</text><polygon fill="#000000" points="524.8782,424.6807,534.8782,428.6807,524.8782,432.6807,528.8782,428.6807" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="305.1824" x2="530.8782" y1="428.6807" y2="428.6807"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="150.4175" x="345.8215" y="424.5295">UiRender::ambientPulsePhase</text><path d="M310,441.6807 L310,488.6807 L499,488.6807 L499,451.6807 L489,441.6807 L310,441.6807 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M489,441.6807 L489,451.6807 L499,451.6807 L489,441.6807 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="149.1929" x="316" y="457.1785">Pulse phase is a renderer-side</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="168.7544" x="316" y="469.8274">animation state, not a BCM-owned</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="84.3745" x="316" y="482.4763">ambient contract.</text><rect fill="#FFFFFF" height="3" styl