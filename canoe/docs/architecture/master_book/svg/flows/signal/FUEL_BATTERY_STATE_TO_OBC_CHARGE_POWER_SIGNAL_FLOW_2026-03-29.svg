<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="998px" preserveAspectRatio="none" style="width:836px;height:998px;background:#FFFFFF;" version="1.1" viewBox="0 0 836 998" width="836px" zoomAndPan="magnify"><title>Fuel Battery State To OBC Charge Power Signal Flow</title><defs/><g><text fill="#000000" font-family="Arial" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="557.4229" x="137.9014" y="35.9956">Fuel Battery State To OBC Charge Power Signal Flow</text><text fill="#000000" font-family="Arial" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="803.2256" x="15" y="61.2935">(fuel/battery state + vehicle state -&gt; OBC state, plug state, and charge power)</text><rect fill="#FFFFFF" height="614.8721" style="stroke:#000000;stroke-width:1;" width="10" x="347.1735" y="238.1382"/><line style="stroke:#000000;stroke-width:1;" x1="81.8253" x2="81.8253" y1="116.8936" y2="954.2549"/><line style="stroke:#000000;stroke-width:1;" x1="206.6998" x2="206.6998" y1="116.8936" y2="954.2549"/><line style="stroke:#000000;stroke-width:1;" x1="351.4728" x2="351.4728" y1="116.8936" y2="954.2549"/><line style="stroke:#000000;stroke-width:1;" x1="588.4025" x2="588.4025" y1="116.8936" y2="954.2549"/><line style="stroke:#000000;stroke-width:1;" x1="753.4135" x2="753.4135" y1="116.8936" y2="954.2549"/><rect fill="#F4F7FB" height="26.6489" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="92.8745" x="35.8253" y="89.2446"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="78.8745" x="42.8253" y="106.7424">Fuel/battery bus</text><rect fill="#F4F7FB" height="26.6489" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="92.8745" x="35.8253" y="953.2549"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="78.8745" x="42.8253" y="970.7527">Fuel/battery bus</text><rect fill="#E8F0FE" heig