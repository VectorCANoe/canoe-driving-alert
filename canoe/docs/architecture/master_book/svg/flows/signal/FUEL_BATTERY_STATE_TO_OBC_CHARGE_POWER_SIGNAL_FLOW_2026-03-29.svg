ht="39.2979" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="87.9868" x="710.4135" y="76.5957"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="56.8477" x="725.983" y="94.0935">Observers /</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="73.9868" x="717.4135" y="106.7424">charge readers</text><rect fill="#FCE8FF" height="39.2979" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="87.9868" x="710.4135" y="953.2549"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="56.8477" x="725.983" y="970.7527">Observers /</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="73.9868" x="717.4135" y="983.4016">charge readers</text><rect fill="#FFFFFF" height="614.8721" style="stroke:#000000;stroke-width:1;" width="10" x="347.1735" y="238.1382"/><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="792.575" x="20.8253" y="146.218"/><line style="stroke:#000000;stroke-width:0.5;" x1="20.8253" x2="813.4003" y1="146.218" y2="146.218"/><line style="stroke:#000000;stroke-width:0.5;" x1="20.8253" x2="813.4003" y1="149.218" y2="149.218"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="77.5508" x="378.3374" y="136.8936"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="60.4946" x="384.3374" y="151.3914">OBC Inputs</text><polygon fill="#000000" points="340.1735,194.8403,350.1735,198.8403,340.1735,202.8403,344.1735,198.8403" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="82.2626" x2="346.1735" y1="198.8403" y2="198.8403"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="118.5938" x="157.9211" y="182.0403">frmFuelBatteryStateMsg</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="133.2944" x="150.5708" y="194.6892">BatterySoc / ChargingState</text><polygon fill="#000000" points="335.1735,234.1382,345.1735,238.1382,335.1735,242.1382,339.1735,238.1382" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="207.5863" x2="341.1735" y1="238.1382" y2="238.1382"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="118.6045" x="218.0776" y="221.3381">frmVehicleStateCanMsg</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="57.4707" x="248.6445" y="233.9871">gDriveState</text><line style="stroke:#000000;stroke-width:1;" x1="357.1735" x2="399.1735" y1="277.436" y2="277.436"/><line style="stroke:#000000;stroke-width:1;" x1="399.1735" x2="399.1735" y1="277.436" y2="290.436"/><line style="stroke:#000000;stroke-width:1;" x1="358.1735" x2="399.1735" y1="290.436" y2="290.436"/><polygon fill="#000000" points="368.1735,286.436,358.1735,290.436,368.1735,294.436,364.1735,290.436" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="141.8721" x="364.1735" y="260.636">inputStale / vehicleInputStale</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="63.5884" x="403.3153" y="273.2849">lease checks</text><line style="stroke:#000000;stroke-width:1;" x1="357.1735" x2="399.1735" y1="329.7339" y2="329.7339"/><line style="stroke:#000000;stroke-width:1;" x1="399.1735" x2="399.1735" y1="329.7339" y2="342.7339"/><line style="stroke:#000000;stroke-width:1;" x1="358.1735" x2="399.1735" y1="342.7339" y2="342.7339"/><polygon fill="#000000" points="368.1735,338.7339,358.1735,342.7339,368.1735,346.7339,364.1735,342.7339" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="56.2568" x="422.5734" y="312.9338">if stale then</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="173.0566" x="364.1735" y="325.5828">batterySoc = 50 / chargingState = 0</text><line style="stroke:#000000;stroke-width:1;" x1="357.1735" x2="399.1735" y1="382.0317" y2="382.0317"/><line style="stroke:#000000;stroke-width:1;" x1="399.1735" x2="399.1735" y1="382.0317" y2="395.0317"/><line style="stroke:#000000;stroke-width:1;" x1="358.1735" x2="399.1735" y1="395.0317" y2="395.0317"/><polygon fill="#000000" points="368.1735,391.0317,358.1735,395.0317,368.1735,399.0317,364.1735,395.0317" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="78.5737" x="420.7284" y="365.2317">vehicleParked =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="191.6836" x="364.1735" y="377.8806">(driveState == 0) or (chargingState &gt; 0)</text><line style="stroke:#000000;stroke-width:1;" x1="357.1735" x2="399.1735" y1="434.3296" y2="434.3296"/><line style="stroke:#000000;stroke-width:1;" x1="399.1735" x2="399.1735" y1="434.3296" y2="447.3296"/><line style="stroke:#000000;stroke-width:1;" x1="358.1735" x2="399.1735" y1="447.3296" y2="447.3296"/><polygon fill="#000000" points="368.1735,443.3296,358.1735,447.3296,368.1735,451.3296,364.1735,447.3296" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="68.7983" x="429.1503" y="417.5295">acPlugState =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="198.752" x="364.1735" y="430.1785">chargingState in {1,3} and vehicleParked</text><line style="stroke:#000000;stroke-width:1;" x1="357.1735" x2="399.1735" y1="486.6274" y2="486.6274"/><line style="stroke:#000000;stroke-width:1;" x1="399.1735" x2="399.1735" y1="486.6274" y2="499.6274"/><line style="stroke:#000000;stroke-width:1;" x1="358.1735" x2="399.1735" y1="499.6274" y2="499.6274"/><polygon fill="#000000" points="368.1735,495.6274,358.1735,499.6274,368.1735,503.6274,364.1735,499.6274" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="133.6274" x="376.2369" y="469.8274">obcState = 3 when paused,</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="157.7544" x="364.1735" y="482.4763">2 when active AC charge, else 0</text><line style="stroke:#000000;stroke-width:1;" x1="357.1735" x2="399.1735" y1="538.9253" y2="538.9253"/><line style="stroke:#000000;stroke-width:1;" x1="399.1735" x2="399.1735" y1="538.9253" y2="551.9253"/><line style="stroke:#000000;stroke-width:1;" x1="358.1735" x2="399.1735" y1="551.9253" y2="551.9253"/><polygon fill="#000000" points="368.1735,547.9253,358.1735,551.9253,368.1735,555.9253,364.1735,551.9253" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="89.5737" x="420.8842" y="522.1252">chargePowerKw =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="202.9951" x="364.1735" y="534.7742">(100 - batterySoc) / 2 under active charge</text><path d="M361.8253,564.9253 L361.8253,624.9253 L521.8253,624.9253 L521.8253,574.9253 L511.8253,564.9253 L361.8253,564.9253 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M511.8253,564.9253 L511.8253,574.9253 L521.8253,574.9253 L511.8253,564.9253 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="139.4229" x="367.8253" y="580.4231">Representative gating inputs</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="60.5215" x="367.8253" y="593.072">- BatterySoc</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="77.043" x="367.8253" y="605.7209">- ChargingState</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="64.1899" x="367.8253" y="618.3699">- gDriveState</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="792.575" x="20.8253" y="649.8455"/><line style="stroke:#000000;stroke-width:0.5;" x1="20.8253" x2="813.4003" y1="649.8455" y2="649.8455"/><line style="stroke:#000000;stroke-width:0.5;" x1="20.8253" x2="813.4003" y1="652.8455" y2="652.8455"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="84.2808" x="374.9724" y="640.521"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="67.2246" x="380.9724" y="655.0188">OBC Publish</text><polygon fill="#000000" points="577.1686,698.4678,587.1686,702.4678,577.1686,706.4678,581.1686,702.4678" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="357.1735" x2="583.1686" y1="702.4678" y2="702.4678"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="82.5215" x="431.9103" y="685.6677">frmObcStateMsg</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="207.2705" x="369.5358" y="698.3167">ObcState / AcPlugState / ChargePowerKw</text><path d="M361.8253,715.4678 L361.8253,775.4678 L495.8253,775.4678 L495.8253,725.4678 L485.8253,715.4678 L361.8253,715.4678 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M485.8253,715.4678 L485.8253,725.4678 L495.8253,725.4678 L485.8253,715.4678 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="113.126" x="367.8253" y="730.9656">Representative outputs</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="52.5776" x="367.8253" y="743.6145">- ObcState</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="67.2568" x="367.8253" y="756.2634">- AcPlugState</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="89.2568" x="367.8253" y="768.9124">- ChargePowerKw</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="792.575" x="20.8253" y="800.3879"/><line style="stroke:#000000;stroke-width:0.5;" x1="20.8253" x2="813.4003" y1="800.3879" y2="800.3879"/><line style="stroke:#000000;stroke-width:0.5;" x1="20.8253" x2="813.4003" y1="803.3879" y2="803.3879"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="131.3638" x="351.4309" y="791.0635"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="114.3076" x="357.4309" y="805.5613">Downstream Visibility</text><polygon fill="#000000" points="742.4069,849.0103,752.4069,853.0103,742.4069,857.0103,746.4069,853.0103" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="589.1686" x2="748.4069" y1="853.0103" y2="853.0103"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="70.8984" x="636.3385" y="836.2102">OBC visibility /</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="141.2383" x="601.1686" y="848.8591">CPC and charging observers</text><path d="M28.8253,866.0103 L28.8253,939.0103 L805.8253,939.0103 L805.8253,876.0103 L795.8253,866.0103 L28.8253,866.0103 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M795.8253,866.0103 L795.8253,876.0103 L805.8253,876.0103 L795.8253,866.0103 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="143.0752" x="246.2007" y="881.5081">Representative runtime chain</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLeng