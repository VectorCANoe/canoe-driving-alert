" lengthAdjust="spacing" textLength="166.9282" x="348.9658" y="325.5828">AFLS mode/pattern/level or speed</text><line style="stroke:#000000;stroke-width:1;" x1="341.9658" x2="383.9658" y1="369.3828" y2="369.3828"/><line style="stroke:#000000;stroke-width:1;" x1="383.9658" x2="383.9658" y1="369.3828" y2="382.3828"/><line style="stroke:#000000;stroke-width:1;" x1="342.9658" x2="383.9658" y1="382.3828" y2="382.3828"/><polygon fill="#000000" points="352.9658,378.3828,342.9658,382.3828,352.9658,386.3828,348.9658,382.3828" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="138.1714" x="348.9658" y="365.2317">assistState = (AflsMode &gt; 0)</text><line style="stroke:#000000;stroke-width:1;" x1="341.9658" x2="383.9658" y1="421.6807" y2="421.6807"/><line style="stroke:#000000;stroke-width:1;" x1="383.9658" x2="383.9658" y1="421.6807" y2="434.6807"/><line style="stroke:#000000;stroke-width:1;" x1="342.9658" x2="383.9658" y1="434.6807" y2="434.6807"/><polygon fill="#000000" points="352.9658,430.6807,342.9658,434.6807,352.9658,438.6807,348.9658,434.6807" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="90.793" x="394.6873" y="404.8806">highBeamPermit =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="182.2358" x="348.9658" y="417.5295">(speed &gt;= 50 and BeamPattern &lt;= 2)</text><line style="stroke:#000000;stroke-width:1;" x1="341.9658" x2="383.9658" y1="473.9785" y2="473.9785"/><line style="stroke:#000000;stroke-width:1;" x1="383.9658" x2="383.9658" y1="473.9785" y2="486.9785"/><line style="stroke:#000000;stroke-width:1;" x1="342.9658" x2="383.9658" y1="486.9785" y2="486.9785"/><polygon fill="#000000" points="352.9658,482.9785,342.9658,486.9785,352.9658,490.9785,348.9658,486.9785" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-si