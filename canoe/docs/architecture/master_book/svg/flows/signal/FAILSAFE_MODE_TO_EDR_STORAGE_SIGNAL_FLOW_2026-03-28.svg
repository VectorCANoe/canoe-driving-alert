7339"/><polygon fill="#000000" points="219.2729,297.7339,209.2729,301.7339,219.2729,305.7339,215.2729,301.7339" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="76.1245" x="244.9321" y="246.636">eventSeverity =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="64.2061" x="250.8914" y="259.2849">3 if alert &gt;= 4</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="135.4429" x="215.2729" y="271.9338">2 if alert &gt;= 3 or failSafe &gt; 0</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="57.7822" x="254.1033" y="284.5828">1 if alert &gt; 0</text><line style="stroke:#000000;stroke-width:1;" x1="208.2729" x2="250.2729" y1="328.3828" y2="328.3828"/><line style="stroke:#000000;stroke-width:1;" x1="250.2729" x2="250.2729" y1="328.3828" y2="341.3828"/><line style="stroke:#000000;stroke-width:1;" x1="209.2729" x2="250.2729" y1="341.3828" y2="341.3828"/><polygon fill="#000000" points="219.2729,337.3828,209.2729,341.3828,219.2729,345.3828,215.2729,341.3828" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="247.9565" x="215.2729" y="324.2317">storageState = high if failSafe == 2 or severity &gt;= 3</text><line style="stroke:#000000;stroke-width:1;" x1="208.2729" x2="250.2729" y1="368.0317" y2="368.0317"/><line style="stroke:#000000;stroke-width:1;" x1="250.2729" x2="250.2729" y1="368.0317" y2="381.0317"/><line style="stroke:#000000;stroke-width:1;" x1="209.2729" x2="250.2729" y1="381.0317" y2="381.0317"/><polygon fill="#000000" points="219.2729,377.0317,209.2729,381.0317,219.2729,385.0317,215.2729,381.0317" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="336.0371" x="215.2729" y="363.8806">storageLev