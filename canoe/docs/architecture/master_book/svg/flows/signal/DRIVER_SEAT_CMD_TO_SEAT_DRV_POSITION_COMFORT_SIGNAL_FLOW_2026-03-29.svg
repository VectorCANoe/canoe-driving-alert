="spacing" textLength="93.2583" x="441.5005" y="312.9338">vehicleInputStale =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="180.9575" x="397.6509" y="325.5828">ethIsRecentTick(gVehicleRxMs, 300)</text><line style="stroke:#000000;stroke-width:1;" x1="390.6509" x2="432.6509" y1="382.0317" y2="382.0317"/><line style="stroke:#000000;stroke-width:1;" x1="432.6509" x2="432.6509" y1="382.0317" y2="395.0317"/><line style="stroke:#000000;stroke-width:1;" x1="391.6509" x2="432.6509" y1="395.0317" y2="395.0317"/><polygon fill="#000000" points="401.6509,391.0317,391.6509,395.0317,401.6509,399.0317,397.6509,395.0317" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="116.7837" x="419.5166" y="365.2317">if seat-control stale then</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="160.5151" x="397.6509" y="377.8806">seatCmd = 0 / heat = 0 / vent = 0</text><line style="stroke:#000000;stroke-width:1;" x1="390.6509" x2="432.6509" y1="434.3296" y2="434.3296"/><line style="stroke:#000000;stroke-width:1;" x1="432.6509" x2="432.6509" y1="434.3296" y2="447.3296"/><line style="stroke:#000000;stroke-width:1;" x1="391.6509" x2="432.6509" y1="447.3296" y2="447.3296"/><polygon fill="#000000" points="401.6509,443.3296,391.6509,447.3296,401.6509,451.3296,397.6509,447.3296" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="93.5537" x="397.6509" y="417.5295">if vehicle stale then</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="68.1807" x="410.3374" y="430.1785">driveState = 3</text><line style="stroke:#000000;stroke-width:1;" x1="390.6509" x2="432.6509" y1="486.6274" y2="486.6274"/><line style="stroke:#000000;stroke-width:1;" x1="432.6509" x2="432.6509" y1="486.6274" y2="499.6274"/><line style="s