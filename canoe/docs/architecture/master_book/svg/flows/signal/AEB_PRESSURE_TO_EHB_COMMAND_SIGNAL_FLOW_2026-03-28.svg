ont-family="Arial" font-size="11" lengthAdjust="spacing" textLength="108.2168" x="291.26" y="106.7424">brake-hydraulic owner</text><rect fill="#E8F7E8" height="39.2979" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="122.2168" x="284.26" y="823.7124"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="22.6177" x="334.0596" y="841.2102">EHB</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="108.2168" x="291.26" y="853.8591">brake-hydraulic owner</text><rect fill="#FFF4CC" height="26.6489" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="84.313" x="717.9868" y="89.2446"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="70.313" x="724.9868" y="106.7424">EHB state bus</text><rect fill="#FFF4CC" height="26.6489" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="84.313" x="717.9868" y="823.7124"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="70.313" x="724.9868" y="841.2102">EHB state bus</text><rect fill="#E8F0FE" height="26.6489" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="131.3745" x="848.0767" y="89.2446"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="117.3745" x="855.0767" y="106.7424">Observers / brake users</text><rect fill="#E8F0FE" height="26.6489" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="131.3745" x="848.0767" y="823.7124"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="117.3745" x="855.0767" y="841.2102">Observers / brake users</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="989.4512" x="5" y="146.218"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="994.4512" y1="146.218" y2="146.218"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="994.4512" y1="149.218" y2="149.218"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="83.6846" x="457.8833" y="136.8936"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="66.6284" x="463.8833" y="151.3914">Brake Inputs</text><polygon fill="#000000" points="333.3684,194.8403,343.3684,198.8403,333.3684,202.8403,337.3684,198.8403" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="76.1619" x2="339.3684" y1="198.8403" y2="198.8403"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="71.5322" x="174.999" y="182.0403">brakePressure</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="245.2065" x="88.1619" y="194.6892">aebStopReq / aebDecelProfile / aebDomainHealth</text><line style="stroke:#000000;stroke-width:1;" x1="345.3684" x2="387.3684" y1="238.1382" y2="238.1382"/><line style="stroke:#000000;stroke-width:1;" x1="387.3684" x2="387.3684" y1="238.1382" y2="251.1382"/><line style="stroke:#000000;stroke-width:1;" x1="346.3684" x2="387.3684" y1="251.1382" y2="251.1382"/><polygon fill="#000000" points="356.3684,247.1382,346.3684,251.1382,356.3684,255.1382,352.3684,251.1382" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="86.8291" x="354.0469" y="221.3381">if brake stale then</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="90.186" x="352.3684" y="233.9871">brakePressure = 0</text><line style="stroke:#000000;stroke-width:1;" x1="345.3684" x2="387.3684" y1="290.436" y2="290.436"/><line style="stroke:#000000;stroke-width:1;" x1="387.3684" x2="387.3684" y1="290.436" y2="303.436"/><line style="stroke:#000000;stroke-width:1;" x1="346.3684" x2="387.3684" y1="303.436" y2="303.436"/><polygon fill="#000000" points="356.3684,299.436,346.3684,303.436,356.3684,307.436,352.3684,303.436" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="81.3237" x="432.0164" y="273.636">if AEB stale then</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="240.6196" x="352.3684" y="286.2849">stopReq = 0 / decelProfile = 0 / domainHealth = 0</text><line style="stroke:#000000;stroke-width:1;" x1="345.3684" x2="387.3684" y1="330.085" y2="330.085"/><line style="stroke:#000000;stroke-width:1;" x1="387.3684" x2="387.3684" y1="330.085" y2="343.085"/><line style="stroke:#000000;stroke-width:1;" x1="346.3684" x2="387.3684" y1="343.085" y2="343.085"/><polygon fill="#000000" points="356.3684,339.085,346.3684,343.085,356.3684,347.085,352.3684,343.085" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="400.7749" x="352.3684" y="325.9338">aebPressureCmd = deriveAebPressureCmd(stopReq, decelProfile, domainHealth)</text><line style="stroke:#000000;stroke-width:1;" x1="345.3684" x2="387.3684" y1="369.7339" y2="369.7339"/><line style="stroke:#000000;stroke-width:1;" x1="387.3684" x2="387.3684" y1="369.7339" y2="382.7339"/><line style="stroke:#000000;stroke-width:1;" x1="346.3684" x2="387.3684" y1="382.7339" y2="382.7339"/><polygon fill="#000000" points="356.3684,378.7339,346.3684,382.7339,356.3684,386.7339,352.3684,382.7339" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="269.9028" x="352.3684" y="365.5828">pressureCmd = max(brakePressure, aebPressureCmd)</text><line style="stroke:#000000;stroke-width:1;" x1="345.3684" x2="387.3684" y1="409.3828" y2="409.3828"/><line style="stroke:#000000;stroke-width:1;" x1="387.3684" x2="387.3684" y1="409.3828" y2="422.3828"/><line style="stroke:#000000;stroke-width:1;" x1="346.3684" x2="387.3684" y1="422.3828" y2="422.3828"/><polygon fill="#000000" points="356.3684,418.3828,346.3684,422.3828,356.3684,426.3828,352.3684,422.3828" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="336.9072" x="352.3684" y="405.2317">ctrlState = 2 when AEB overlay active, else 1 when manual brake &gt; 0</text><path d="M350,435.3828 L350,508.3828 L510,508.3828 L510,445.3828 L500,435.3828 L350,435.3828 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M500,435.3828 L500,445.3828 L510,445.3828 L500,435.3828 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="139.4229" x="356" y="450.8806">Representative gating inputs</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="78.2515" x="356" y="463.5295">- brakePressure</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="67.8799" x="356" y="476.1785">- aebStopReq</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="84.3745" x="356" y="488.8274">- aebDecelProfile</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="94.7729" x="356" y="501.4763">- aebDomainHealth</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="989.4512" x="5" y="532.9519"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="994.4512" y1="532.9519" y2="532.9519"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="994.4512" y1="535.9519" y2="535.9519"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="83.0615" x="458.1948" y="523.6274"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="66.0054" x="464.1948" y="538.1252">EHB Publish</text><polygon fill="#000000" points="748.1433,581.5742,758.1433,585.5742,748.1433,589.5742,752.1433,585.5742" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="345.3684" x2="754.1433" y1="585.5742" y2="585.5742"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="81.9199" x="511.7959" y="568.7742">frmEhbStateMsg</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="158.3452" x="473.5833" y="581.4231">EhbCtrlState / EhbPressureCmd</text><path d="M350,598.5742 L350,645.5742 L484,645.5742 L484,608.5742 L474,598.5742 L350,598.5742 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M474,598.5742 L474,608.5742 L484,608.5742 L474,598.5742 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="113.126" x="356" y="614.072">Representative outputs</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="69.083" x="356" y="626.7209">- EhbCtrlState</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="93.5322" x="356" y="639.3699">- EhbPressureCmd</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="989.4512" x="5" y="670.8455"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="994.4512" y1="670.8455" y2="670.8455"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="994.4512" y1="673.8455" y2="673.8455"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="131.3638" x="434.0437" y="661.521"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="114.3076" x="440.0437" y="676.0188">Downstream Visibility</text><polygon fill="#000000" points="901.7639,719.4678,911.7639,723.4678,901.7639,727.4678,905.7639,723.4678" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="760.1433" x2="907.7639" y1="723.4678" y2="723.4678"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="129.6206" x="772.1433" y="706.6677">hydraulic-brake readback /</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="123.4868" x="775.2102" y="719.3167">assist overlay consumers</text><path d="M10,736.4678 L10,809.4678 L981,809.4678 L981,746.4678 L971,736.4678 L10,736.4678 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M971,736.4678 L971,746.4678 L981,746.4678 L971,736.4678 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="143.0752" x="321.55" y="751.9656">Representative runtime chain</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="293.4927" x="321.55" y="764.6145">1. Manual brake pressure and AEB domain state reach EHB</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="339.3511" x="321.55" y="777.2634">2. EHB computes the stronger of manual and AEB pressure demands</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="309.9927" x="321.55" y="789.9124">3. EHB publishes control state and effective pressure command</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="319.7681" x="321.55" y="802.5613">4. Brake observers consume the final hydraulic command posture</text><!--SRC=[XLHBJzj04BxxLqpX0ch2gqWWf20b8H4zq29IzPJBsXxRAzQxPdTDeB- -imyRcrHgBixkpdpppUlxOYki4Hh1k4pCCvSDqwo6b6NFfLQjp9TAA0s7Q_yRMEHOi5ROjPBs1oE4kUPC_Fjzm_yWd9yF7Ws-j2WpV41ZM8bpmKi96KgBUc2bqJHAcivgWKBjvbgh7LZTOf9ORWK5NYtWaKnDgn5-ALZTBs2fwfh973Q4omIioN4hZrBDdYdLplQhTyrLJQc3iSmYJ6-zUqQajHBW87hpB60U9mcnippZ3PCM3XOUzDHZ4V7McWDW1lprqhvHvIxNL-l5s8c2RAMdCwtUSqs5uXcedKJjdHs7mzNr-cfrlUSNcQPjYBEgqaLhV7ykbyknzS_Ke7v5ROXUoBsbY-17Rpx4sNgL9BDPu0lVVG8mcoL9dq2ioKs0w2gzbGpJZLND4xuGF