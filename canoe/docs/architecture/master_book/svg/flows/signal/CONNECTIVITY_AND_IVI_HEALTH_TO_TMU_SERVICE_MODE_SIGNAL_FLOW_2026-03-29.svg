5295">serviceMode degraded when</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="218.2544" x="468.072" y="417.1785">IVI CPU/MEM load high or weak connectivity</text><line style="stroke:#000000;stroke-width:1;" x1="461.072" x2="503.072" y1="486.2764" y2="486.2764"/><line style="stroke:#000000;stroke-width:1;" x1="503.072" x2="503.072" y1="486.2764" y2="499.2764"/><line style="stroke:#000000;stroke-width:1;" x1="462.072" x2="503.072" y1="499.2764" y2="499.2764"/><polygon fill="#000000" points="472.072,495.2764,462.072,499.2764,472.072,503.2764,468.072,499.2764" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="144.2891" x="505.9919" y="456.8274">remoteClimateReq only when</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="169.9897" x="493.1416" y="469.4763">serviceMode == 1, connType == 1,</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="220.1289" x="468.072" y="482.1252">signalBars &gt;= 3, IVI load low, driveState == 0</text><path d="M465.6074,512.2764 L465.6074,585.2764 L671.6074,585.2764 L671.6074,522.2764 L661.6074,512.2764 L465.6074,512.2764 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M661.6074,512.2764 L661.6074,522.2764 L671.6074,522.2764 L661.6074,512.2764 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="139.4229" x="471.6074" y="527.7742">Representative gating inputs</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="185.856" x="471.6074" y="540.4231">- ConnectivityType / ConnectivityState</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="59.9146" x="471.6074" y="553.072">- SignalBars</text><text fill="#000000" font-family="Arial