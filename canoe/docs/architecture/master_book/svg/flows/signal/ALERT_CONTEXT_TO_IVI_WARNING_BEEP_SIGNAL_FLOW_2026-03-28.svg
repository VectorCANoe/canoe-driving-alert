ertLevel &gt; 0 and emergencyType &gt; 0)</text><line style="stroke:#000000;stroke-width:1;" x1="202.8733" x2="244.8733" y1="303.085" y2="303.085"/><line style="stroke:#000000;stroke-width:1;" x1="244.8733" x2="244.8733" y1="303.085" y2="316.085"/><line style="stroke:#000000;stroke-width:1;" x1="203.8733" x2="244.8733" y1="316.085" y2="316.085"/><polygon fill="#000000" points="213.8733,312.085,203.8733,316.085,213.8733,320.085,209.8733,316.085" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="82.2422" x="259.4055" y="286.2849">compatBeepIC =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="181.3066" x="209.8733" y="298.9338">(alertType in {5,6} and alertLevel &gt; 0)</text><line style="stroke:#000000;stroke-width:1;" x1="202.8733" x2="244.8733" y1="355.3828" y2="355.3828"/><line style="stroke:#000000;stroke-width:1;" x1="244.8733" x2="244.8733" y1="355.3828" y2="368.3828"/><line style="stroke:#000000;stroke-width:1;" x1="203.8733" x2="244.8733" y1="368.3828" y2="368.3828"/><polygon fill="#000000" points="213.8733,364.3828,203.8733,368.3828,213.8733,372.3828,209.8733,368.3828" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="103.0498" x="275.9109" y="338.5828">compatBeepSpeed =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="235.125" x="209.8733" y="351.2317">(roadZoneColorCode in {1,2} and alertLevel &gt; 0)</text><line style="stroke:#000000;stroke-width:1;" x1="202.8733" x2="244.8733" y1="407.6807" y2="407.6807"/><line style="stroke:#000000;stroke-width:1;" x1="244.8733" x2="244.8733" y1="407.6807" y2="420.6807"/><line style="stroke:#000000;stroke-width:1;" x1="203.8733" x2="244.8733" y1="420.6807" y2="420.6807"/><polygon fill="#000000" points="213.8733,416.6807,203.8733,420.6807,213.8733,424.6807,209.8733,42