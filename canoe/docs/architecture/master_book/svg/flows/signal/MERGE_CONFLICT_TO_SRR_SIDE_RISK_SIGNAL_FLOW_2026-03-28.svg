 x="231.4841" y="246.636">mergeConflict = 0 / riskClass = 0</text><line style="stroke:#000000;stroke-width:1;" x1="224.4841" x2="266.4841" y1="303.085" y2="303.085"/><line style="stroke:#000000;stroke-width:1;" x1="266.4841" x2="266.4841" y1="303.085" y2="316.085"/><line style="stroke:#000000;stroke-width:1;" x1="225.4841" x2="266.4841" y1="316.085" y2="316.085"/><polygon fill="#000000" points="235.4841,312.085,225.4841,316.085,235.4841,320.085,231.4841,316.085" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="83.1553" x="235.311" y="286.2849">if lamp stale then</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="90.8091" x="231.4841" y="298.9338">turnLampState = 0</text><line style="stroke:#000000;stroke-width:1;" x1="224.4841" x2="266.4841" y1="355.3828" y2="355.3828"/><line style="stroke:#000000;stroke-width:1;" x1="266.4841" x2="266.4841" y1="355.3828" y2="368.3828"/><line style="stroke:#000000;stroke-width:1;" x1="225.4841" x2="266.4841" y1="368.3828" y2="368.3828"/><polygon fill="#000000" points="235.4841,364.3828,225.4841,368.3828,235.4841,372.3828,231.4841,368.3828" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="51.6807" x="380.5186" y="338.5828">detected =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="349.7495" x="231.4841" y="351.2317">(mergeConflict == 1 and turnLampState == 1 and riskClass &gt;= 2) ? 1 : 0</text><line style="stroke:#000000;stroke-width:1;" x1="224.4841" x2="266.4841" y1="395.0317" y2="395.0317"/><line style="stroke:#000000;stroke-width:1;" x1="266.4841" x2="266.4841" y1="395.0317" y2="408.0317"/><line style="stroke:#000000;stroke-width:1;" x1="225.4841" x2="266.4841" y1="408.0317" y2="408.0317"/><polygon fill="#000000" points="235.4841,404.0317,225.4841,408.0317,235.4841,412.0317,