"/><line style="stroke:#000000;stroke-width:1;" x1="251.2009" x2="251.2009" y1="420.3296" y2="433.3296"/><line style="stroke:#000000;stroke-width:1;" x1="210.2009" x2="251.2009" y1="433.3296" y2="433.3296"/><polygon fill="#000000" points="220.2009,429.3296,210.2009,433.3296,220.2009,437.3296,216.2009,433.3296" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="261.7012" x="216.2009" y="416.1785">availabilityLevel reduced when driverMonitorReq == 1</text><path d="M214,446.3296 L214,519.3296 L381,519.3296 L381,456.3296 L371,446.3296 L214,446.3296 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M371,446.3296 L371,456.3296 L381,456.3296 L371,446.3296 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="139.4229" x="220" y="461.8274">Representative gating inputs</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="57.4546" x="220" y="474.4763">- dmsActive</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="75.2168" x="220" y="487.1252">- attentionLevel</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="146.749" x="220" y="499.7742">- cruiseState / laneGuideState</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="81.313" x="220" y="512.4231">- navRouteClass</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="769.5886" x="5" y="543.8987"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="774.5886" y1="543.8987" y2="543.8987"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="774.5886" y1="546.8987" y2="546.8987"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="83.6685" x="347.9601" y="534.5742"/><text fill="#000000" font-fa