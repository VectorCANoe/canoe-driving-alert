ight="20.6489" style="stroke:#000000;stroke-width:1;" width="76.3315" x="472.1677" y="136.8936"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="59.2754" x="478.1677" y="151.3914">CPC Inputs</text><polygon fill="#000000" points="481.8246,194.8403,491.8246,198.8403,481.8246,202.8403,485.8246,198.8403" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="86.5245" x2="487.8246" y1="198.8403" y2="198.8403"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="82.5215" x="248.9138" y="182.0403">frmObcStateMsg</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="115.5645" x="232.3923" y="194.6892">ObcState / AcPlugState</text><polygon fill="#000000" points="481.8246,234.1382,491.8246,238.1382,481.8246,242.1382,485.8246,238.1382" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="215.8121" x2="487.8246" y1="238.1382" y2="238.1382"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="100.8584" x="304.3892" y="221.3381">frmBatBmsStateMsg</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="162.0029" x="273.8169" y="233.9871">BmsState / PackSoc / PackTemp</text><polygon fill="#000000" points="476.8246,273.436,486.8246,277.436,476.8246,281.436,480.8246,277.436" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="351.2201" x2="482.8246" y1="277.436" y2="277.436"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="118.6045" x="360.7201" y="260.636">frmVehicleStateCanMsg</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="57.4707" x="391.287" y="273.2849">gDriveState</text><line style="stroke:#000000;stroke-width:1;" x1="498.8246" x2="540.8246" y1="304.085" y2="304.085"/><line style="stroke:#000000;stroke-width:1;" x1="540.8246" x2="540.8246" y1="304.085" y2="317.085"/><line style="stroke:#000000;stroke-width:1;" x1="499.8246" x2="540.8246" y1="317.085" y2="317.085"/><polygon fill="#000000" points="509.8246,313.085,499.8246,317.085,509.8246,321.085,505.8246,317.085" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="196.2598" x="505.8246" y="299.9338">obc/bms/vehicle freshness lease checks</text><line style="stroke:#000000;stroke-width:1;" x1="498.8246" x2="540.8246" y1="356.3828" y2="356.3828"/><line style="stroke:#000000;stroke-width:1;" x1="540.8246" x2="540.8246" y1="356.3828" y2="369.3828"/><line style="stroke:#000000;stroke-width:1;" x1="499.8246" x2="540.8246" y1="369.3828" y2="369.3828"/><polygon fill="#000000" points="509.8246,365.3828,499.8246,369.3828,509.8246,373.3828,505.8246,369.3828" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="83.1499" x="538.8568" y="339.5828">if OBC stale then</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="149.2144" x="505.8246" y="352.2317">obcState = 0 / acPlugState = 0</text><line style="stroke:#000000;stroke-width:1;" x1="498.8246" x2="540.8246" y1="408.6807" y2="408.6807"/><line style="stroke:#000000;stroke-width:1;" x1="540.8246" x2="540.8246" y1="408.6807" y2="421.6807"/><line style="stroke:#000000;stroke-width:1;" x1="499.8246" x2="540.8246" y1="421.6807" y2="421.6807"/><polygon fill="#000000" points="509.8246,417.6807,499.8246,421.6807,509.8246,425.6807,505.8246,421.6807" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="83.1499" x="577.5206" y="391.8806">if BMS stale then</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="226.542" x="505.8246" y="404.5295">bmsState = 7 / packSoc = 50 / packTemp = 28</text><line style="stroke:#000000;stroke-width:1;" x1="498.8246" x2="540.8246" y1="460.9785" y2="460.9785"/><line style="stroke:#000000;stroke-width:1;" x1="540.8246" x2="540.8246" y1="460.9785" y2="473.9785"/><line style="stroke:#000000;stroke-width:1;" x1="499.8246" x2="540.8246" y1="473.9785" y2="473.9785"/><polygon fill="#000000" points="509.8246,469.9785,499.8246,473.9785,509.8246,477.9785,505.8246,473.9785" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="77.3652" x="602.5929" y="444.1785">chargeEnable =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="270.9019" x="505.8246" y="456.8274">(obcState == 2 and bmsState &lt;= 2 and driveState == 0)</text><line style="stroke:#000000;stroke-width:1;" x1="498.8246" x2="540.8246" y1="513.2764" y2="513.2764"/><line style="stroke:#000000;stroke-width:1;" x1="540.8246" x2="540.8246" y1="513.2764" y2="526.2764"/><line style="stroke:#000000;stroke-width:1;" x1="499.8246" x2="540.8246" y1="526.2764" y2="526.2764"/><polygon fill="#000000" points="509.8246,522.2764,499.8246,526.2764,509.8246,530.2764,505.8246,526.2764" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="71.8438" x="583.026" y="496.4763">thermalState =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="226.2466" x="505.8246" y="509.1252">packTemp &gt;= 45 ? 2 : packTemp &gt;= 35 ? 1 : 0</text><line style="stroke:#000000;stroke-width:1;" x1="498.8246" x2="540.8246" y1="590.8721" y2="590.8721"/><line style="stroke:#000000;stroke-width:1;" x1="540.8246" x2="540.8246" y1="590.8721" y2="603.8721"/><line style="stroke:#000000;stroke-width:1;" x1="499.8246" x2="540.8246" y1="603.8721" y2="603.8721"/><polygon fill="#000000" points="509.8246,599.8721,499.8246,603.8721,509.8246,607.8721,505.8246,603.8721" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="93.8599" x="526.4657" y="548.7742">chargeTargetSoc =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="135.1421" x="505.8246" y="561.4231">80 when thermalState == 2,</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="121.0859" x="512.8527" y="574.072">90 when packSoc &gt;= 90,</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="116.1875" x="515.3019" y="586.7209">70 when bmsState &gt;= 3</text><path d="M503.7584,616.8721 L503.7584,676.8721 L692.7584,676.8721 L692.7584,626.8721 L682.7584,616.8721 L503.7584,616.8721 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M682.7584,616.8721 L682.7584,626.8721 L692.7584,626.8721 L682.7584,616.8721 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="139.4229" x="509.7584" y="632.3699">Representative gating inputs</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="122.2837" x="509.7584" y="645.0188">- ObcState / AcPlugState</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="168.7222" x="509.7584" y="657.6677">- BmsState / PackSoc / PackTemp</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="64.1899" x="509.7584" y="670.3167">- gDriveState</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="963.1501" x="28.7584" y="701.7922"/><line style="stroke:#000000;stroke-width:0.5;" x1="28.7584" x2="991.9086" y1="701.7922" y2="701.7922"/><line style="stroke:#000000;stroke-width:0.5;" x1="28.7584" x2="991.9086" y1="704.7922" y2="704.7922"/><rect fill="#FFFFFF"