</text><line style="stroke:#000000;stroke-width:1;" x1="431.8618" x2="473.8618" y1="382.0317" y2="382.0317"/><line style="stroke:#000000;stroke-width:1;" x1="473.8618" x2="473.8618" y1="382.0317" y2="395.0317"/><line style="stroke:#000000;stroke-width:1;" x1="432.8618" x2="473.8618" y1="395.0317" y2="395.0317"/><polygon fill="#000000" points="442.8618,391.0317,432.8618,395.0317,442.8618,399.0317,438.8618,395.0317" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="107.3037" x="505.0364" y="365.2317">gNavContextAgeMs =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="239.6528" x="438.8618" y="377.8806">pickFresherAgeMs(navSignalAgeMs, infoAgeMs)</text><line style="stroke:#000000;stroke-width:1;" x1="431.8618" x2="473.8618" y1="434.3296" y2="434.3296"/><line style="stroke:#000000;stroke-width:1;" x1="473.8618" x2="473.8618" y1="434.3296" y2="447.3296"/><line style="stroke:#000000;stroke-width:1;" x1="432.8618" x2="473.8618" y1="447.3296" y2="447.3296"/><polygon fill="#000000" points="442.8618,443.3296,432.8618,447.3296,442.8618,451.3296,438.8618,447.3296" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="140.9536" x="442.686" y="417.5295">boundaryAlive = 1 only when</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="148.6021" x="438.8618" y="430.1785">chassis/body/info ages &lt;= 300</text><line style="stroke:#000000;stroke-width:1;" x1="431.8618" x2="473.8618" y1="486.6274" y2="486.6274"/><line style="stroke:#000000;stroke-width:1;" x1="473.8618" x2="473.8618" y1="486.6274" y2="499.6274"/><line style="stroke:#000000;stroke-width:1;" x1="432.8618" x2="473.8618" y1="499.6274" y2="499.6274"/><polygon fill="#000000" points="442.8618,495.6274,432.8618,499.6274,442.8618,503.6274,438.8618,499.6274" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="144.0098" x="492.5137" y="469.8274">warningPathStatus = 0/1/2 by</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="251.3135" x="438.8618" y="482.4763">vehicle/nav/steering freshness and emergency path</text><line style="stroke:#000000;stroke-width:1;" x1="431.8618" x2="473.8618" y1="538.9253" y2="538.9253"/><line style="stroke:#000000;stroke-width:1;" x1="473.8618" x2="473.8618" y1="538.9253" y2="551.9253"/><line style="stroke:#000000;stroke-width:1;" x1="432.8618" x2="473.8618" y1="551.9253" y2="551.9253"/><polygon fill="#000000" points="442.8618,547.9253,432.8618,551.9253,442.8618,555.9253,438.8618,551.9253" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="184.6528" x="438.8618" y="522.1252">failSafeMode from warningPathStatus</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="129.0137" x="466.6814" y="534.7742">and forceFailSafe override</text><line style="stroke:#000000;stroke-width:1;" x1="431.8618" x2="473.8618" y1="591.2231" y2="591.2231"/><line style="stroke:#000000;stroke-width:1;" x1="473.8618" x2="473.8618" y1="591.2231" y2="604.2231"/><line style="stroke:#000000;stroke-width:1;" x1="432.8618" x2="473.8618" y1="604.2231" y2="604.2231"/><polygon fill="#000000" points="442.8618,600.2231,432.8618,604.2231,442.8618,608.2231,438.8618,604.2231" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="72.4561" x="491.2891" y="574.4231">routingPolicy =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="177.3105" x="438.8618" y="587.072">0 fail-safe / 2 emergency / 1 nominal</text><path d="M436,617.2231 L436,753.2231 L582,753.2231 L582,627.2231 L572,617.2231 L436,617.223