="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="843.5808" x="5" y="146.218"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="848.5808" y1="146.218" y2="146.218"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="848.5808" y1="149.218" y2="149.218"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="156.4199" x="348.5804" y="136.8936"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="139.3638" x="354.5804" y="151.3914">Highway Readiness Inputs</text><polygon fill="#000000" points="197.2009,232.7871,207.2009,236.7871,197.2009,240.7871,201.2009,236.7871" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="71.948" x2="203.2009" y1="236.7871" y2="236.7871"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="74.5938" x="103.2776" y="182.0403">navRouteClass</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="55.0269" x="113.061" y="194.6892">cruiseState</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="75.8345" x="102.6572" y="207.3381">laneGuideState</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="68.4976" x="106.3257" y="219.9871">attentionLevel</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="50.7354" x="115.2068" y="232.636">dmsActive</text><line style="stroke:#000000;stroke-width:1;" x1="209.2009" x2="251.2009" y1="276.085" y2="276.085"/><line style="stroke:#000000;stroke-width:1;" x1="251.2009" x2="251.2009" y1="276.085" y2="289.085"/><line style="stroke:#000000;stroke-width:1;" x1="210.2009" x2="251.2009" y1="289.085" y2="289.085"/><polygon fill="#000000" points="220.2009,285.085,210.2009,289.085,220.2009,293.085,216.2009,289.085" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="81.6353" x="340.1873" y="259.2849">highwayReady =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="329.6079" x="216.2009" y="271.9338">(navRouteClass == 2 and cruiseState &gt;= 1 and attentionLevel &lt;= 2)</text><line style="stroke:#000000;stroke-width:1;" x1="209.2009" x2="251.2009" y1="328.3828" y2="328.3828"/><line style="stroke:#000000;stroke-width:1;" x1="251.2009" x2="251.2009" y1="328.3828" y2="341.3828"/><line style="stroke:#000000;stroke-width:1;" x1="210.2009" x2="251.2009" y1="341.3828" y2="341.3828"/><polygon fill="#000000" points="220.2009,337.3828,210.2009,341.3828,220.2009,345.3828,216.2009,341.3828" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="77.3384" x="269.5574" y="311.5828">longCtrlActive =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="184.0513" x="216.2009" y="324.2317">(highwayReady and cruiseState == 2)</text><line style="stroke:#000000;stroke-width:1;" x1="209.2009" x2="251.2009" y1="380.6807" y2="380.6807"/><line style="stroke:#000000;stroke-width:1;" x1="251.2009" x2="251.2009" y1="380.6807" y2="393.6807"/><line style="stroke:#000000;stroke-width:1;" x1="210.2009" x2="251.2009" y1="393.6807" y2="393.6807"/><polygon fill="#000000" points="220.2009,389.6807,210.2009,393.6807,220.2009,397.6807,216.2009,393.6807" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="68.1592" x="284.5508" y="363.8806">latCtrlActive =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="204.8589" x="216.2009" y="376.5295">(highwayReady and laneGuideState &gt;= 2)</text><line style="stroke:#000000;stroke-width:1;" x1="209.2009" x2="251.2009" y1="432.9785" y2="432.9785"/><line style="stroke:#000000;stroke-width:1;" x1="251.2009" x2="251.2009" y1="432.9785" y2="445.9785"/><line style="stroke:#000000;stroke-width:1;" x1="210.2009" x2="251.2009" y1="445.9785" y2="445.9785"/><polygon fill="#000000" points="220.2009,441.9785,210.2009,445.9785,220.2009,449.9785,216.2009,445.9785" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="93.8438" x="269.8689" y="416.1785">driverMonitorReq =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="201.1797" x="216.2009" y="428.8274">(dmsActive == 1 and attentionLevel &gt;= 2)</text><path d="M214,458.9785 L214,531.9785 L390,531.9785 L390,468.9785 L380,458.9785 L214,458.9785 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M380,458.9785 L380,468.9785 L390,468.9785 L380,458.9785 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="155.9229" x="220" y="474.4763">Representative activation inputs</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="81.313" x="220" y="487.1252">- navRouteClass</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="61.7461" x="220" y="499.7742">- cruiseState</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="82.5537" x="220" y="512.4231">- laneGuideState</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="135.1206" x="220" y="525.072">- attentionLevel / dmsActive</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="843.5808" x="5" y="556.5476"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="848.5808" y1="556.5476" y2="556.5476"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="848.5808" y1="559.5476" y2="559.5476"/><rect fill="#