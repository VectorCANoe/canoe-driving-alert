</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="69.0723" x="220" y="702.2634">- LatCtrlActive</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="92.9092" x="220" y="714.9124">- DriverMonitorReq</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="843.5808" x="5" y="746.3879"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="848.5808" y1="746.3879" y2="746.3879"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="848.5808" y1="749.3879" y2="749.3879"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="131.3638" x="361.1085" y="737.0635"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="114.3076" x="367.1085" y="751.5613">Downstream Visibility</text><polygon fill="#000000" points="768.4216,782.3613,778.4216,786.3613,768.4216,790.3613,772.4216,786.3613" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="552.8088" x2="774.4216" y1="786.3613" y2="786.3613"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="203.6128" x="564.8088" y="782.2102">highway pilot / control activation readback</text><path d="M11,799.3613 L11,872.3613 L839,872.3613 L839,809.3613 L829,799.3613 L11,799.3613 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M829,799.3613 L829,809.3613 L839,809.3613 L829,799.3613 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="143.0752" x="256.3248" y="814.8591">Representative runtime chain</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="253.7466" x="256.3248" y="827.5081">1. Route, cruise, and lane-guide context reach HWP</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="236.6128" x="256.3248" y="840.157">2. HWP decides whether highway mode is ready</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="328.9312" x="256.3248" y="852.8059">3. HWP raises long/lat control activation when readiness is satisfied</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="292.8857" x="256.3248" y="865.4548">4. Observers expose pilot activation and monitoring demand</text><!--SRC=[XLLDJnin4BtlhvZ2fKY4RIWI23L8OI6b4b0KAdh9nTcTR2mSUx6z-UYlxzZURjOXAbpGZZtllNapddooSrmWL89ncPXNBYkcsGAcB7yjjQfbaIcXD1oE_5_dHe4pLWixKj8-Ca8OQix4_lDd_WUXt-yS6dohKURuWCQm4eU2bn9ob1PrvvP6Kobf_jswHg5MGwtL2gokCKaijmBXZfVp5Tl065cnWLyACgBKIi0mjtp9B5SIdWcV2HWHm4H-fheifhckkS5KC8cGKmgkBVIkuExta_idb2pfpFeZXyPQjACa8NsMvxnYqiB1u_05KWXma4waG-oLDIzQt0DW1fwuK3QpQ_BoR7G-kev1Y7OYvqqfbRiAQYLH-rIdwV3sOdH-Un5dUKmmbbc4QMssFDUryJqxox8uu-VKe5wYDYIP8YX24eKzmvVHRP8C1f6fN9B_y4DMjJKm62H9MqbZroL8jXmxKpF1Z9d8uCMpanNi-ExSQBwPjTHeyl4UboWcibWOtobC6ki3PED5wEg0kXPna0uu1IOBw731rG3wFXXpm3UwV1J3k_vcLej0xGaYnbtemHu8PZz2Y6jt-dP12at9-a59RfKUuvl7QIrnj7ih2aXI4QWcKXgMcGDCnbZHgw6RpATlXnQuxr_IYtj5tvqgwIjMJ84TuXIs_KBIvIJuYGcZ6EfyggU2cxaVbgRQTYelOQONpNZve4zvCEL4TgF1mnJkupvHeElw7lIRNKDTIjI55B9EoHzwI5urphtJHx5Odmj4-dhlzCIktT0ZDrOZRRiNRlYK2sutsqVcIgBotEjiNqIp7T8zcuas9YlSwav2MOgOsxrpx61sYzCrzPQsTpvt-xz_0duqZfkXE6w7EDvdZYUVUxDEJ_mW5vZJkO7L7Ea7HRTQ5ugokF72DidNS5apmZR_Mx4E9rGJbWyX63emCuv5SdO2sos6wqhHsWsUT02Sy4KmdSkIz2qeilN-Bm00]--></g></svg>