stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="97.2275" x="275.6233" y="233.9871">if manualMode == 0</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="96.0137" x="276.2302" y="246.636">and driveState == 0</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="119.2651" x="264.6045" y="259.2849">and paakAuthLevel &gt;= 1</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="141.249" x="253.6125" y="271.9338">and paakProximityState &gt;= 2</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="96.0244" x="276.2249" y="284.5828">and paakState &gt;= 1</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="123.8198" x="262.3271" y="297.2317">then doorControlCmd = 1</text><path d="M251,327.3828 L251,387.3828 L476,387.3828 L476,337.3828 L466,327.3828 L251,327.3828 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M466,327.3828 L466,337.3828 L476,337.3828 L466,327.3828 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="143.6875" x="257" y="342.8806">Representative access inputs</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="201.7651" x="257" y="355.5295">- gPaakState / AuthLevel / ProximityState</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="204.1821" x="257" y="368.1785">- gTmuServiceMode / RemoteClimateReq</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="64.1899" x="257" y="380.8274">- gDriveState</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="684.8167" x="5" y="412.303"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="689.8167" y1="412.303" y2="412.303"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="689.8167" y1="415.303" y2="415.303"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="159.4546" x="267.681" y="402.9785"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="142.3984" x="273.681" y="417.4763">Door Command Ownership</text><line style="stroke:#000000;stroke-width:1;" x1="246.6125" x2="288.6125" y1="464.9253" y2="464.9253"/><line style="stroke:#000000;stroke-width:1;" x1="288.6125" x2="288.6125" y1="464.9253" y2="477.9253"/><line style="stroke:#000000;stroke-width:1;" x1="247.6125" x2="288.6125" y1="477.9253" y2="477.9253"/><polygon fill="#000000" points="257.6125,473.9253,247.6125,477.9253,257.6125,481.9253,253.6125,477.9253" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="81.0229" x="324.2397" y="448.1252">childLockState =</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="222.2773" x="253.6125" y="460.7742">(manualMode == 0 and driveState &gt; 0) ? 1 : 0</text><polygon fill="#000000" points="470.8899,513.2231,480.8899,517.2231,470.8899,521.2231,474.8899,517.2231" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="246.6125" x2="476.8899" y1="517.2231" y2="517.2231"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="95.9653" x="316.7686" y="500.4231">frmDoorControlMsg</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="163.2222" x="283.1401" y="513.072">DoorControlCmd / ChildLockCmd</text><line style="stroke:#000000;stroke-width:1;" x1="246.6125" x2="288.6125" y1="543.8721" y2="543.8721"/><line style="stroke:#000000;stroke-width:1;" x1="288.6125" x2="288.6125" y1="543.8721" y2="556.8721"/><line style="stroke:#000000;stroke-width:1;" x1="247.6125" x2="288.6125" y1="556.8721" y2="556.8721"/><polygon fill="#000000" points="257.6125,552.8721,247.6125,556.8721,257.6125,560.8721,253.6125,556.8721" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="198.6982" x="253.6125" y="539.7209">command trace for access and child lock</text><path d="M251,569.8721 L251,629.8721 L385,629.8721 L385,579.8721 L375,569.8721 L251,569.8721 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M375,569.8721 L375,579.8721 L385,579.8721 L375,569.8721 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="113.126" x="257" y="585.3699">Representative outputs</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="102.6846" x="257" y="598.0188">- frmDoorControlMsg</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="89.2461" x="257" y="610.6677">- DoorControlCmd</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="78.2461" x="257" y="623.3167">- ChildLockCmd</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="684.8167" x="5" y="654.7922"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="689.8167" y1="654.7922" y2="654.7922"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="689.8167" y1="657.7922" y2="657.7922"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="131.3638" x="281.7264" y="645.4678"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="114.3076" x="287.7264" y="659.9656">Downstream Visibility</text><polygon fill="#000000" points="609.6575,703.4146,619.6575,707.4146,609.6575,711.4146,613.6575,707.4146" style="stroke: