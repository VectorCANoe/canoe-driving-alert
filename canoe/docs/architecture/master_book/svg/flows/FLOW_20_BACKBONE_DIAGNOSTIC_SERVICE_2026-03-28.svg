<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1360" viewBox="0 0 1600 1360">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fafc; }
    .title { font: 700 30px 'Segoe UI', sans-serif; fill: #0f172a; }
    .sub { font: 500 15px 'Segoe UI', sans-serif; fill: #475569; }
    .label { font: 700 18px 'Segoe UI', sans-serif; fill: #0f172a; }
    .text { font: 600 15px 'Segoe UI', sans-serif; fill: #1f2937; }
    .small { font: 500 14px 'Segoe UI', sans-serif; fill: #475569; }
    .node { font: 700 16px 'Segoe UI', sans-serif; fill: #111827; }
    .box { rx: 20; ry: 20; stroke: #475569; stroke-width: 2; }
    .lane { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <rect x="0" y="0" width="1600" height="1360" class="bg"/>
  <text x="34" y="44" class="title">FLOW_20 - Backbone, Diagnostic, and Service Routing</text>
  <text x="34" y="72" class="sub">Backbone | generated canonical action-flow companion for the internal ECU master book</text>

  <rect x="30" y="100" width="1540" height="318" class="box" fill="#fce7f3"/>
  <text x="52" y="136" class="label">Flow overview</text>
  <text x="52" y="166" class="text">Gateway, backbone, diagnostics, and service-facing surfaces route runtime state without becoming hidden feature owners.</text>
  <text x="52" y="202" class="small">Participants</text>
  <rect x="52" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="246" class="node">ETHB / IBOX</text><rect x="292" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="310" y="246" class="node">CGW / SGW</text><rect x="532" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="550" y="246" class="node">DCM / EXT_DIAG / EDR</text><rect x="772" y="214" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="790" y="246" class="node">IVI / service surfaces</text><rect x="52" y="298" width="220" height="54" rx="16" ry="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/><text x="70" y="330" class="node">Engineer / tool</text>

  <rect x="30" y="462" width="1540" height="472" class="box" fill="#ffffff"/>
  <text x="52" y="498" class="label">Action sequence</text>
  <rect x="52" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="554" class="small">ETHB / IBOX</text><text x="72" y="582" class="label">Bridge backbone state</text><text x="72" y="610" class="text">Backbone owners surface</text>
<text x="72" y="630" class="text">transport-level service and</text>
<text x="72" y="650" class="text">routing state.</text><line x1="332" y1="590" x2="356" y2="590" class="lane"/><rect x="356" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="554" class="small">CGW / SGW</text><text x="376" y="582" class="label">Route feature visibility</text><text x="376" y="610" class="text">Gateway lanes expose</text>
<text x="376" y="630" class="text">cross-domain runtime state to</text>
<text x="376" y="650" class="text">the right consumers.</text><line x1="636" y1="590" x2="660" y2="590" class="lane"/><rect x="660" y="526" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="680" y="554" class="small">DCM / EXT_DIAG / EDR</text><text x="680" y="582" class="label">Handle diagnostic path</text><text x="680" y="610" class="text">Diagnostic and recorder surfaces</text>
<text x="680" y="630" class="text">maintain the service and</text>
<text x="680" y="650" class="text">evidence chain.</text><rect x="52" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="72" y="732" class="small">IVI / service surfaces</text><text x="72" y="760" class="label">Render service result</text><text x="72" y="788" class="text">User-facing service surfaces</text>
<text x="72" y="808" class="text">show the routed service outcome.</text><line x1="332" y1="768" x2="356" y2="768" class="lane"/><rect x="356" y="704" width="280" height="128" rx="18" ry="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/><text x="376" y="732" class="small">Engineer / tool</text><text x="376" y="760" class="label">Read diagnostic evidence</text><text x="376" y="788" class="text">Service and diagnostic paths</text>
<text x="376" y="808" class="text">remain explainable from request</text>
<text x="376" y="828" class="text">to readback.</text>

  <rect x="30" y="958" width="500" height="320" class="box" fill="#eff6ff"/>
  <text x="52" y="994" class="label">Related ECU bank</text>
  <text x="52" y="1024" class="text">- CGW</text>
<text x="52" y="1044" class="text">- DCM</text>
<text x="52" y="1064" class="text">- EDR</text>
<text x="52" y="1084" class="text">- ETHB</text>
<text x="52" y="1104" class="text">- EXT_DIAG</text>
<text x="52" y="1124" class="text">- IBOX</text>
<text x="52" y="1144" class="text">- SGW</text>
<text x="52" y="1164" class="text">- TEST_BAS</text>
<text x="52" y="1184" class="text">- TEST_SCN</text>
<text x="52" y="1204" class="text">- V2X</text>

  <rect x="550" y="958" width="500" height="320" class="box" fill="#ffffff"/>
  <text x="572" y="994" class="label">Key contracts</text>
  <text x="572" y="1024" class="text">- diagnostic request</text>
<text x="572" y="1044" class="text">- diagnostic response</text>
<text x="572" y="1064" class="text">- gateway state</text>
<text x="572" y="1084" class="text">- service routing state</text>

  <rect x="1070" y="958" width="500" height="320" class="box" fill="#fff7ed"/>
  <text x="1092" y="994" class="label">Files and user outcome</text>
  <text x="1092" y="1024" class="text">- ETHB.can</text>
<text x="1092" y="1044" class="text">- IBOX.can</text>
<text x="1092" y="1064" class="text">- CGW.can</text>
<text x="1092" y="1084" class="text">- DCM.can</text>
<text x="1092" y="1104" class="text">- EXT_DIAG.can</text>
<text x="1092" y="1124" class="text"></text>
<text x="1092" y="1144" class="text">Backbone and diagnostic behavior is readable as</text>
<text x="1092" y="1164" class="text">one routing story instead of scattered support</text>
<text x="1092" y="1184" class="text">nodes.</text>
</svg>
