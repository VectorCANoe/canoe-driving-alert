rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="700.9131" x="5" y="146.218"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="705.9131" y1="146.218" y2="146.218"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="705.9131" y1="149.218" y2="149.218"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="100.813" x="305.05" y="136.8936"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="83.7568" x="311.05" y="151.3914">Freshness Loss</text><polygon fill="#000000" points="220.8706,182.1914,230.8706,186.1914,220.8706,190.1914,224.8706,186.1914" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="70.103" x2="226.8706" y1="186.1914" y2="186.1914"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="138.7676" x="82.103" y="182.0403">gPaakRxMs / gVehicleRxMs</text><line style="stroke:#000000;stroke-width:1;" x1="232.8706" x2="274.8706" y1="212.8403" y2="212.8403"/><line style="stroke:#000000;stroke-width:1;" x1="274.8706" x2="274.8706" y1="212.8403" y2="225.8403"/><line style="stroke:#000000;stroke-width:1;" x1="233.8706" x2="274.8706" y1="225.8403" y2="225.8403"/><polygon fill="#000000" points="243.8706,221.8403,233.8706,225.8403,243.8706,229.8403,239.8706,225.8403" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="206.9697" x="239.8706" y="208.6892">paakInputStale = recentTick(PAAK) ? 0 : 1</text><line style="stroke:#000000;stroke-width:1;" x1="232.8706" x2="274.8706" y1="265.1382" y2="265.1382"/><line style="stroke:#000000;stroke-width:1;" x1="274.8706" x2="274.8706" y1="265.1382" y2="278.1382"/><line style="stroke:#000000;stroke-width:1;" x1="233.8706" x2="274.8706" y1="278.1382" y2="278.1382"/><polygon fill="#000000" points="243.8706,274.1382,233.8706,278.1382,243.8706,282.1382,239.8706,278.1382" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="107.0244" x="291.8333" y="248.3381">if paakInputStale == 1</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="210.9497" x="239.8706" y="260.9871">then clear paakState / authLevel / proximity</text><path d="M237,291.1382 L237,338.1382 L539,338.1382 L539,301.1382 L529,291.1382 L237,291.1382 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M529,291.1382 L529,301.1382 L539,301.1382 L529,291.1382 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="169.9844" x="243" y="306.636">Representative freshness behavior</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="250.4058" x="243" y="319.2849">- paakInputStale = 1 when PAAK input is not recent</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="281.8589" x="243" y="331.9338">- access-related state is zeroed before command decision</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="700.9131" x="5" y="363.4094"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="705.9131" y1="363.4094" y2="363.4094"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="705.9131" y1="366.4094" y2="366.4094"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="88.5991" x="311.157" y="354.085"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="71.543" x="317.157" y="368.5828">Access Block</text><line style="stroke:#000000;stroke-width:1;" x1="232.8706" x2="274.8706" y1="403.3828" y2="403.3828"/><line style="stroke:#000000;stroke-width:1;" x1="274.8706" x2="274.8706" y1="403.3828" y2="416.3828"/><line style="stroke:#000000;stroke-width:1;" x1="233.8706" x2="274.8706" y1="416.3828" y2="416.3828"/><polygon fill="#000000" points="243.8706,412.3828,233.8706,416.3828,243.8706,420.3828,239.8706,416.3828" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="215.8105" x="239.8706" y="399.2317">recompute DoorControlCmd after stale clear</text><line style="stroke:#000000;stroke-width:1;" x1="232.8706" x2="274.8706" y1="443.0317" y2="443.0317"/><line style="stroke:#000000;stroke-width:1;" x1="274.8706" x2="274.8706" y1="443.0317" y2="456.0317"/><line style="stroke:#000000;stroke-width:1;" x1="233.8706" x2="274.8706" y1="456.0317" y2="456.0317"/><polygon fill="#000000" points="243.8706,452.0317,233.8706,456.0317,243.8706,460.0317,239.8706,456.0317" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="231.1396" x="239.8706" y="438.8806">stale path prevents valid access-open condition</text><polygon fill="#000000" points="466.0103,491.3296,476.0103,495.3296,466.0103,499.3296,470.0103,495.3296" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="232.8706" x2="472.0103" y1="495.3296" y2="495.3296"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="95.9653" x="307.4578" y="478.5295">frmDoorControlMsg</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="101.1807" x="304.8501" y="491.1785">DoorControlCmd = 0</text><path d="M237,508.3296 L237,555.3296 L487,555.3296 L487,518.3296 L477,508.3296 L237,508.3296 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M477,508.3296 L477,518.3296 L487,518.3296 L477,508.3296 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="148.5967" x="243" y="523.8274">Representative blocked output</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="185.2383" x="243" y="536.4763">- DoorControlCmd falls back to closed</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="229.8989" x="243" y="549.1252">- no access-driven open command is published</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="700.9131" x="5" y="580.6008"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="705.9131" y1="580.6008" y2="580.6008"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="705.9131" y1="583.6008" y2="583.6008"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="62.2915" x="324.3108" y="571.2764"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="45.2354" x="330.3108" y="585.7742">Visibility</text><polygon fill="#000000" points="625.7539,629.2231,635.7539,633.2231,625.7539,637.2231,629.7539,633.2231" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="478.0103" x2="631.7539" y1="633.2231" y2="633.2231"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="129.626" x="493.0691" y="616.4231">blocked access readback /</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="135.7437" x="490.0103" y="629.072">body command health trace</text><path d="M10,646.2231 L10,719.2231 L695,719.2231 L695,656.2231 L685,646.2231 L10,646.2231 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M685,646.2231 L685,656.2231 L695,656.2231 L685,646.2231 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="143.0752" x="196.8118" y="661.7209">Representative runtime chain</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacin