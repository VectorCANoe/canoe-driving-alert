Adjust="spacing" textLength="185.8882" x="291.8467" y="246.636">if driveState == 0 and key auth is valid</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="129.9429" x="319.8193" y="259.2849">then accessAuthorized = 1</text><line style="stroke:#000000;stroke-width:1;" x1="284.8467" x2="326.8467" y1="303.085" y2="303.085"/><line style="stroke:#000000;stroke-width:1;" x1="326.8467" x2="326.8467" y1="303.085" y2="316.085"/><line style="stroke:#000000;stroke-width:1;" x1="285.8467" x2="326.8467" y1="316.085" y2="316.085"/><polygon fill="#000000" points="295.8467,312.085,285.8467,316.085,295.8467,320.085,291.8467,316.085" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="199.9282" x="291.8467" y="298.9338">unlockRequest = (gDoorControlCmd &gt; 0)</text><line style="stroke:#000000;stroke-width:1;" x1="284.8467" x2="326.8467" y1="342.7339" y2="342.7339"/><line style="stroke:#000000;stroke-width:1;" x1="326.8467" x2="326.8467" y1="342.7339" y2="355.7339"/><line style="stroke:#000000;stroke-width:1;" x1="285.8467" x2="326.8467" y1="355.7339" y2="355.7339"/><polygon fill="#000000" points="295.8467,351.7339,285.8467,355.7339,295.8467,359.7339,291.8467,355.7339" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="191.9736" x="291.8467" y="338.5828">childLockActive = (gChildLockCmd &gt; 0)</text><path d="M289,368.7339 L289,441.7339 L460,441.7339 L460,378.7339 L450,368.7339 L289,368.7339 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M450,368.7339 L450,378.7339 L460,378.7339 L450,368.7339 " fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="139.4229" x="295" y="384.2317">Representative gating inputs</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="89.2461" x="295" y="396.8806">- DoorControlCmd</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="78.2461" x="295" y="409.5295">- ChildLockCmd</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="150.3799" x="295" y="422.1785">- key access / immobilizer auth</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="56.2461" x="295" y="434.8274">- driveState</text><rect fill="#FFFFFF" height="3" style="stroke:#FFFFFF;stroke-width:1;" width="850.6675" x="5" y="466.303"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="855.6675" y1="466.303" y2="466.303"/><line style="stroke:#000000;stroke-width:0.5;" x1="5" x2="855.6675" y1="469.303" y2="469.303"/><rect fill="#FFFFFF" height="20.6489" style="stroke:#000000;stroke-width:1;" width="114.853" x="372.9072" y="456.9785"/><text fill="#000000" font-family="Arial" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="97.7969" x="378.9072" y="471.4763">Lock-state Publish</text><line style="stroke:#000000;stroke-width:1;" x1="284.8467" x2="326.8467" y1="518.9253" y2="518.9253"/><line style="stroke:#000000;stroke-width:1;" x1="326.8467" x2="326.8467" y1="518.9253" y2="531.9253"/><line style="stroke:#000000;stroke-width:1;" x1="285.8467" x2="326.8467" y1="531.9253" y2="531.9253"/><polygon fill="#000000" points="295.8467,527.9253,285.8467,531.9253,295.8467,535.9253,291.8467,531.9253" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="317.9688" x="291.8467" y="502.1252">if accessAuthorized and unlockRequest and childLockActive == 0</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="178.5566" x="361.5527" y="514.7742">then lockState = 0 else lockState = 1</text><polygon fill="#000000" points="604.8154,567.2231,614.8154,571.2231,60