<?xml version="1.0" encoding="utf-8"?>
<CANoeConfiguration Version="19.0">
  <General>
    <Name>Driving Situation Linked Real-Time Warning System</Name>
    <Author>CANoe-IVI-OTA Team</Author>
    <Description>
      Scope:
      - Navigation zone context (school zone, highway, IC guide)
      - V2V emergency alert (police, ambulance)
      - Ambient arbitration (Emergency > Zone, Ambulance > Police)
      Environment:
      - CANoe SIL only
      - CAN + Ethernet simulated via system variables
    </Description>
    <Version>2.0.0</Version>
    <Date>2026-02-25</Date>
  </General>

  <Databases>
    <Database>
      <Path>..\databases\emergency_system.dbc</Path>
      <Type>CAN</Type>
      <Enabled>1</Enabled>
    </Database>
  </Databases>

  <Simulation>
    <Networks>
      <Network>
        <Name>CAN1</Name>
        <Type>CAN</Type>
        <Baudrate>500000</Baudrate>
        <Channel>1</Channel>
        <Description>Main CAN bus for all simulated nodes</Description>
        <FDEnabled>0</FDEnabled>
      </Network>
    </Networks>

    <Nodes>
      <Node>
        <Name>Context_Manager</Name>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\Context_Manager.can</CAPLFile>
        <Description>Zone recognition and Vehicle_Context publisher</Description>
      </Node>

      <Node>
        <Name>Police_Node</Name>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\Police_Node.can</CAPLFile>
        <Description>Police emergency broadcaster (sysvar-based)</Description>
      </Node>

      <Node>
        <Name>Ambulance_Node</Name>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\Ambulance_Node.can</CAPLFile>
        <Description>Ambulance emergency broadcaster (sysvar-based)</Description>
      </Node>

      <Node>
        <Name>Civ_Node</Name>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\Civ_Node.can</CAPLFile>
        <Description>Arbiter core: resolves warning priority and outputs commands</Description>
      </Node>

      <Node>
        <Name>Ambient_ECU</Name>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\Ambient_ECU.can</CAPLFile>
        <Description>Ambient pattern executor</Description>
      </Node>

      <Node>
        <Name>Cluster_ECU</Name>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\Cluster_ECU.can</CAPLFile>
        <Description>Cluster warning message display</Description>
      </Node>
    </Nodes>
  </Simulation>

  <SystemVariablesFile>
    <Path>..\cfg\project.sysvars</Path>
  </SystemVariablesFile>
</CANoeConfiguration>
