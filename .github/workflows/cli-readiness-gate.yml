name: CLI Readiness Gate

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/run.py"
      - "scripts/gates/cli_readiness_gate.py"
      - "pyproject.toml"
      - ".github/workflows/cli-readiness-gate.yml"
  pull_request:
    paths:
      - "scripts/run.py"
      - "scripts/gates/cli_readiness_gate.py"
      - "pyproject.toml"
      - ".github/workflows/cli-readiness-gate.yml"

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run CLI readiness gate
        run: python scripts/run.py gate cli-readiness

      - name: Upload gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cli-readiness-report
          path: |
            canoe/tmp/reports/verification/cli_readiness_gate.json
            canoe/tmp/reports/verification/cli_readiness_gate.md
          if-no-files-found: error
