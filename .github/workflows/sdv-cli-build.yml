name: SDV CLI Build

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Build mode"
        type: choice
        required: true
        default: onefolder
        options:
          - onefolder
          - onefile

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build sdv cli
        run: |
          python scripts/run.py package build-exe --mode ${{ inputs.mode }} --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdv-cli-${{ inputs.mode }}
          path: dist/sdv_cli/
          if-no-files-found: error
