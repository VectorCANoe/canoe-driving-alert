name: Doc-Code Sync Gate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run doc-code sync gate
        run: python scripts/quality/doc_code_sync_gate.py

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doc-code-sync-report
          path: driving-situation-alert/tmp/reports/Doc_Code_Sync_Report.md
          if-no-files-found: error

      - name: Append GitHub Summary
        if: always()
        run: |
          echo "## Doc-Code Sync Gate Report" >> "$GITHUB_STEP_SUMMARY"
          cat driving-situation-alert/tmp/reports/Doc_Code_Sync_Report.md >> "$GITHUB_STEP_SUMMARY"
