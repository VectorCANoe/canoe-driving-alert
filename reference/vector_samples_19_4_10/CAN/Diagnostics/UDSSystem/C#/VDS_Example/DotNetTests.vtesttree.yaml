version: 2.2.0

test-tree:
  - dotnet-test-case: PerformAuthentication
    title: Perform Authentication
    description: Tries to authenticate with a specific role. The corresponding security source and security profile needs to be configured!
  - dotnet-test-case: ReadSerialNumber
    title: Read Serial Number
    description: Reads the serial number of an ECU and writes it into the test report.
  - dotnet-test-case: ReadSerialNumberFunctional
    title: Read Serial Number Functional
    description: Reads the serial numbers of the functional group and writes them into the test report.
  - dotnet-test-case: VariantCoding
    title: Variant Coding
    description: Unlocks the ECU, performs Variant Coding for it and writes the result into the test report.
  - dotnet-test-case: CheckFaultMemory
    title: Check Fault Memory
    description: Stores two faults in the ECU and then reads its fault memory.
  - dotnet-test-case: CheckFaultMemoryNew
    title: Check Fault Memory New
    description: Stores two faults in the ECU and then reads its fault memory.

