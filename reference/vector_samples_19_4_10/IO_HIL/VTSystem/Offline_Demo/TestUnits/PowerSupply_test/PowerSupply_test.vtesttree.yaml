version: 2.2.0

test-tree:
   - capl-test-case: PowerSupplyTest1
     title: Simulating an overvoltage at the ECU
     description: In this test case the VT2004's resistor decade is set to a very high resistance value. This should make the ECU turn on the cooling and turn off the heating unit. That behavior is then validated. After that the power supply is set to an overvoltage value. This should make the ECU and thus the cooling unit shut down. This behavior is then validated, too.
   - capl-test-case: PowerSupplyTest1
     title: Simulating an overvoltage at the ECU
     description: In this test case the VT2004's resistor decade is set to a very high resistance value. This should make the ECU turn on the cooling and turn off the heating unit. That behavior is then validated. After that the power supply is set to an undervoltage value. This should make the ECU and thus the cooling unit shut down. This behavior is then validated, too.
   - capl-test-case: DiagnosticsTest
     title: Diagnostic test on the ECU
     description: In this test case an over- and undervoltage are created. Afterwards the fault memory is checked for entries.     
     params: [10,2]  
   - capl-test-case: DiagnosticsTest
     title: Diagnostic test on the ECU
     description: In this test case an over- and undervoltage are created. Afterwards the fault memory is checked for entries.       
     params: [15,1]