version: 2.2.0

test-tree:
    - capl-test-case: VoltageGenerationAndMeasurementTest
      title: Voltage transfer test at 5V
      description: This test case uses two VT modules. It is assumed that the first channels of both modules are interconnected. While the VT7001 is configured to generate a constant voltage on channel 1 the VT1004 is configured for voltage measurement (also on channel 1). The test case then checks if the voltage generated by the VT7001 module can bemeasured at the VT1004's input
      params: [5]
