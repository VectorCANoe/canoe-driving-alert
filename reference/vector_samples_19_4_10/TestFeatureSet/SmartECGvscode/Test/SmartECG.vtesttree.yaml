version: 2.4.0

test-tree:
  - test-fixture: ECG Monitor Tests
    description: "Checks that the correct information is sent to the ECG Monitor."
    capl-preparation: SetupTestEnvironment
    capl-completion: StopTestEnvironmentSimulation
    elements:
      - dotnet-test-case: First_normal_heart_rhythm_then_sudden_emergency
        title: First normal heart rhythm then sudden emergency
      - dotnet-test-case: Emergency_stabilizing_to_normal_heart_rhythm
        title: Emergency stabilizing to normal heart rhythm
  - test-fixture: Test Local Alarms in Case of Sudden Emergency
    description: "Checks that sudden emergencies are correctly identified."
    capl-preparation: SetupTestEnvironment
    capl-completion: StopTestEnvironmentSimulation
    elements:
      - capl-test-case: TestLocalAlarms
        title: Test Local Alarms
  - test-fixture: Test (Averaged) Heart Rates
    description: "Checks that heart rates are correctly measured using different sample data records."
    elements:
      - python-test-case-list: test_averaged_heart_rates
        title: Database record tests
        test-case-title: "Database record number: {data_base_record_number}"
        param-values:
          - [0, 1, 2, 5]

