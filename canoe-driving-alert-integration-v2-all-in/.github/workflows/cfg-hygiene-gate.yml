name: CFG Hygiene Gate

on:
  workflow_dispatch:
  push:
    paths:
      - "canoe/**"
      - "scripts/quality/cfg_hygiene_gate.py"
      - ".github/workflows/cfg-hygiene-gate.yml"

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run CANoe text hygiene gate
        run: python scripts/quality/cfg_hygiene_gate.py
