<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f9f9fb"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="arr-o" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d35400"/>
    </marker>
  </defs>

  <style>
    .font-kr { font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
    .font-en { font-family: Menlo, Consolas, "SF Mono", monospace; }
  </style>

  <!-- ===== HEADER ===== -->
  <rect x="0" y="0" width="1280" height="68" fill="#1a252f"/>
  <text x="42" y="26" class="font-kr" font-size="13" fill="#f5b041">CGW (Core Gateway)</text>
  <text x="42" y="50" class="font-kr" font-size="22" font-weight="700" fill="#ffffff">CGW 경계 감독 및 Fail-Safe 중재 — CAPL 이벤트 패턴</text>
  <text x="1238" y="42" class="font-kr" font-size="13" fill="#aab7c4" text-anchor="end">on message · on timer · 상태 수집 및 Fail-Safe 전파</text>

  <!-- ===== SECTION HEADERS ===== -->
  <rect x="30" y="84" width="220" height="34" rx="6" fill="#873600"/>
  <text x="140" y="107" class="font-kr" font-size="13" font-weight="700" fill="#fdf2e9" text-anchor="middle">① 도메인 입력 수집</text>

  <rect x="280" y="84" width="220" height="34" rx="6" fill="#873600"/>
  <text x="390" y="107" class="font-kr" font-size="13" font-weight="700" fill="#fdf2e9" text-anchor="middle">② Backbone 전파</text>

  <rect x="530" y="84" width="220" height="34" rx="6" fill="#1a5276"/>
  <text x="640" y="107" class="font-kr" font-size="13" font-weight="700" fill="#eaf2f8" text-anchor="middle">③ Health / Timeout 감시</text>

  <rect x="780" y="84" width="220" height="34" rx="6" fill="#7b241c"/>
  <text x="890" y="107" class="font-kr" font-size="13" font-weight="700" fill="#fdedec" text-anchor="middle">④ Fail-Safe 판단</text>

  <rect x="1030" y="84" width="220" height="34" rx="6" fill="#1e8449"/>
  <text x="1140" y="107" class="font-kr" font-size="13" font-weight="700" fill="#eafaf1" text-anchor="middle">⑤ 유효 경고 (Effective) 라우팅</text>

  <!-- ===== FLOW COMPONENTS ===== -->
  
  <!-- Step 1: Input Collection -->
  <rect x="30" y="136" width="220" height="230" rx="10" fill="#fdf2e9" stroke="#d35400" stroke-width="2"/>
  <rect x="30" y="136" width="220" height="28" rx="10" fill="#d35400"/>
  <rect x="30" y="154" width="220" height="10" fill="#d35400"/>
  <text x="140" y="156" class="font-en" font-size="12" fill="#fff" text-anchor="middle">on message (CAN)</text>

  <text x="140" y="186" class="font-kr" font-size="12" font-weight="700" fill="#873600" text-anchor="middle">frmVehicleState (VCU)</text>
  <text x="140" y="204" class="font-kr" font-size="11" fill="#873600" text-anchor="middle">차속 · 조향각 · 기어</text>
  <line x1="60" y1="214" x2="220" y2="214" stroke="#d35400" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="140" y="234" class="font-kr" font-size="12" font-weight="700" fill="#873600" text-anchor="middle">frmADASState (ADAS)</text>
  <text x="140" y="252" class="font-kr" font-size="11" fill="#873600" text-anchor="middle">최종 경고 결정 (R_t)</text>
  <line x1="60" y1="262" x2="220" y2="262" stroke="#d35400" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="140" y="282" class="font-kr" font-size="12" font-weight="700" fill="#873600" text-anchor="middle">frmWiperLight (BCM)</text>
  <text x="140" y="300" class="font-kr" font-size="11" fill="#873600" text-anchor="middle">차체 기본 모드 수집</text>
  <line x1="60" y1="310" x2="220" y2="310" stroke="#d35400" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="140" y="330" class="font-kr" font-size="11" fill="#d35400" font-weight="700" text-anchor="middle">내부 상태 변수 업데이트</text>
  <text x="140" y="348" class="font-kr" font-size="10" fill="#873600" text-anchor="middle">차량 도메인 상태 정규화</text>

  <!-- Arrow 1->2 -->
  <line x1="250" y1="250" x2="280" y2="250" stroke="#444" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Step 2: Backbone Propagation -->
  <rect x="280" y="136" width="220" height="230" rx="10" fill="#fdf2e9" stroke="#d35400" stroke-width="2"/>
  <rect x="280" y="136" width="220" height="28" rx="10" fill="#e67e22"/>
  <rect x="280" y="154" width="220" height="10" fill="#e67e22"/>
  <text x="390" y="156" class="font-en" font-size="12" fill="#fff" text-anchor="middle">on timer (tx_cycle)</text>

  <rect x="300" y="186" width="180" height="60" rx="8" fill="#fff" stroke="#d35400" stroke-width="1.5"/>
  <text x="390" y="206" class="font-en" font-size="11" fill="#a04000" font-weight="700" text-anchor="middle">ethVehicleState</text>
  <text x="390" y="224" class="font-kr" font-size="11" fill="#a04000" text-anchor="middle">Backbone 공통 문맥 전파</text>
  <text x="390" y="238" class="font-kr" font-size="10" fill="#d35400" text-anchor="middle">AD/V2X 판단의 기준선 제공</text>

  <rect x="300" y="266" width="180" height="60" rx="8" fill="#fff" stroke="#d35400" stroke-width="1.5"/>
  <text x="390" y="286" class="font-en" font-size="11" fill="#a04000" font-weight="700" text-anchor="middle">ethGatewayStatus</text>
  <text x="390" y="304" class="font-kr" font-size="11" fill="#a04000" text-anchor="middle">System-wide 라우트 상태</text>

  <text x="390" y="348" class="font-kr" font-size="11" fill="#d35400" text-anchor="middle">"단순 Relay가 아닌 Context Shaping"</text>

  <!-- Step 3: Health & Timeout Monitoring -->
  <rect x="530" y="136" width="220" height="230" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="2"/>
  <rect x="530" y="136" width="220" height="28" rx="10" fill="#2980b9"/>
  <rect x="530" y="154" width="220" height="10" fill="#2980b9"/>
  <text x="640" y="156" class="font-en" font-size="12" fill="#fff" text-anchor="middle">on timer (Health Check)</text>

  <text x="640" y="186" class="font-kr" font-size="12" font-weight="700" fill="#154360" text-anchor="middle">메시지 Timeout 검사</text>
  <text x="640" y="204" class="font-kr" font-size="11" fill="#154360" text-anchor="middle">V2X 및 ADAS 상태 송신 지연</text>
  <line x1="560" y1="214" x2="720" y2="214" stroke="#2980b9" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="640" y="234" class="font-kr" font-size="12" font-weight="700" fill="#154360" text-anchor="middle">Data / CRC 무결성 검사</text>
  <text x="640" y="252" class="font-kr" font-size="11" fill="#154360" text-anchor="middle">경계 구간 데이터 오염 감시</text>
  <line x1="560" y1="262" x2="720" y2="262" stroke="#2980b9" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="640" y="282" class="font-kr" font-size="12" font-weight="700" fill="#154360" text-anchor="middle">Stale Data 판단</text>
  <text x="640" y="300" class="font-kr" font-size="11" fill="#154360" text-anchor="middle">의미 불일치 지속성 감지</text>

  <rect x="550" y="320" width="180" height="26" rx="6" fill="#2980b9" fill-opacity="0.15" stroke="#2980b9" stroke-width="1.2"/>
  <text x="640" y="337" class="font-kr" font-size="11" fill="#154360" font-weight="700" text-anchor="middle">오류 누적 시 → 강등 트리거</text>

  <!-- Arrow 3->4 -->
  <line x1="750" y1="250" x2="780" y2="250" stroke="#c0392b" stroke-width="1.8" marker-end="url(#arr-o)"/>
  <text x="765" y="244" class="font-en" font-size="10" fill="#c0392b" text-anchor="middle">Error</text>

  <!-- Step 4: Fail-Safe Handling -->
  <rect x="780" y="136" width="220" height="230" rx="10" fill="#fdedec" stroke="#c0392b" stroke-width="2"/>
  <rect x="780" y="136" width="220" height="28" rx="10" fill="#c0392b"/>
  <rect x="780" y="154" width="220" height="10" fill="#c0392b"/>
  <text x="890" y="156" class="font-en" font-size="12" fill="#fff" text-anchor="middle">evalFailSafe()</text>

  <rect x="800" y="186" width="180" height="60" rx="8" fill="#fff" stroke="#c0392b" stroke-width="1.5"/>
  <text x="890" y="206" class="font-en" font-size="11" fill="#7b241c" font-weight="700" text-anchor="middle">failSafeMode = 1</text>
  <text x="890" y="224" class="font-kr" font-size="11" fill="#7b241c" text-anchor="middle">경고 판단 무효화</text>
  <text x="890" y="238" class="font-kr" font-size="10" fill="#c0392b" text-anchor="middle">HMI 강제 차단 / 안전 모드</text>

  <rect x="800" y="266" width="180" height="60" rx="8" fill="#fff" stroke="#c0392b" stroke-width="1.5"/>
  <text x="890" y="286" class="font-en" font-size="11" fill="#7b241c" font-weight="700" text-anchor="middle">warningPathStatus = 0</text>
  <text x="890" y="304" class="font-kr" font-size="11" fill="#7b241c" text-anchor="middle">전달 경로 신뢰성 상실 알림</text>

  <text x="890" y="348" class="font-kr" font-size="11" fill="#c0392b" font-weight="700" text-anchor="middle">"비정상 입력 시 유효 경고 차단"</text>

  <!-- Step 5: Effective Route -->
  <rect x="1030" y="136" width="220" height="230" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <rect x="1030" y="136" width="220" height="28" rx="10" fill="#27ae60"/>
  <rect x="1030" y="154" width="220" height="10" fill="#27ae60"/>
  <text x="1140" y="156" class="font-en" font-size="12" fill="#fff" text-anchor="middle">publishEffective()</text>

  <text x="1140" y="186" class="font-kr" font-size="12" font-weight="700" fill="#145a32" text-anchor="middle">if (!failSafeMode) {</text>
  
  <rect x="1050" y="196" width="180" height="60" rx="8" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="1140" y="216" class="font-en" font-size="11" fill="#145a32" font-weight="700" text-anchor="middle">ethEffectiveAlertMsg</text>
  <text x="1140" y="234" class="font-kr" font-size="11" fill="#145a32" text-anchor="middle">ADAS 산출 경고 → HMI 전달</text>
  <text x="1140" y="248" class="font-kr" font-size="10" fill="#27ae60" text-anchor="middle">신뢰성 확보된 상태 패스</text>
  
  <text x="1140" y="278" class="font-kr" font-size="12" font-weight="700" fill="#145a32" text-anchor="middle">} else {</text>

  <rect x="1050" y="288" width="180" height="40" rx="8" fill="#fff" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="1140" y="306" class="font-kr" font-size="11" fill="#c0392b" text-anchor="middle">최소 경고 해제 (Clear)</text>
  <text x="1140" y="320" class="font-kr" font-size="10" fill="#c0392b" text-anchor="middle">오경보 방지 우선</text>

  <text x="1140" y="348" class="font-kr" font-size="12" font-weight="700" fill="#145a32" text-anchor="middle">}</text>

  <!-- Arrow 4->5 -->
  <line x1="1000" y1="250" x2="1030" y2="250" stroke="#444" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- ===== CAPL CODE HINT ===== -->
  <rect x="30" y="390" width="1220" height="150" rx="10" fill="#1e2328" stroke="#444" stroke-width="1.5"/>
  <text x="52" y="413" class="font-en" font-size="11" fill="#6aaf6a">// CGW.capl — 핵심 구조 요약</text>
  <text x="52" y="432" class="font-en" font-size="11" fill="#8be0f7">on timer</text>
  <text x="120" y="432" class="font-en" font-size="11" fill="#c8d8e8"> t_cgw_health_check {</text>
  <text x="52" y="450" class="font-en" font-size="11" fill="#c8d8e8">  if (checkTimeout(node_ADAS) || checkTimeout(node_V2X)) {</text>
  <text x="52" y="468" class="font-en" font-size="11" fill="#c0392b">    sysvar::CGW::failSafeMode = 1;</text>
  <text x="52" y="486" class="font-en" font-size="11" fill="#c0392b">    sysvar::CGW::warningPathStatus = 0;</text>
  <text x="52" y="504" class="font-en" font-size="11" fill="#c8d8e8">  } else { recoverNormalMode(); } }</text>
  <text x="520" y="432" class="font-en" font-size="11" fill="#8be0f7">on message</text>
  <text x="610" y="432" class="font-en" font-size="11" fill="#c8d8e8"> ethSelectedAlertMsg {</text>
  <text x="520" y="450" class="font-en" font-size="11" fill="#c8d8e8">  if (sysvar::CGW::failSafeMode == 0) {</text>
  <text x="520" y="468" class="font-en" font-size="11" fill="#27ae60">    publishEffectiveAlert(this.risk_level, this.type);</text>
  <text x="860" y="468" class="font-en" font-size="11" fill="#6aaf6a">// 정상 라우팅</text>
  <text x="520" y="486" class="font-en" font-size="11" fill="#c8d8e8">  } else {</text>
  <text x="520" y="504" class="font-en" font-size="11" fill="#c0392b">    clearEffectiveAlert();</text>
  <text x="860" y="504" class="font-en" font-size="11" fill="#6aaf6a">// 무효화 차단</text>
  <text x="520" y="520" class="font-en" font-size="11" fill="#c8d8e8">  } }</text>

  <!-- ===== BOTTOM SUMMARY ===== -->
  <rect x="30" y="546" width="1220" height="50" rx="10" fill="#eaf2ff" stroke="#2e86c1" stroke-width="1.5"/>
  <text x="640" y="567" class="font-kr" font-size="13" font-weight="700" fill="#1a5276" text-anchor="middle">설계 원칙</text>
  <text x="640" y="587" class="font-kr" font-size="12" fill="#2c3e50" text-anchor="middle">CGW는 단순한 신호 중계기가 아니다. 경계 간 데이터 무결성과 Timeout을 독립적으로 감시하고, 이상 발생 시 스스로 Fail-Safe 상태를 선언하여 HMI로 향하는 잘못된 경고를 차단하는 최후의 감독자 역할을 수행한다.</text>

  <!-- ===== TRACEABILITY NOTE ===== -->
  <rect x="30" y="612" width="1220" height="66" rx="8" fill="#f4f6f7" stroke="#808b96" stroke-width="1.5"/>
  <text x="640" y="634" class="font-kr" font-size="12" font-weight="700" fill="#2c3e50" text-anchor="middle">경계 간 추적성 (Traceability)</text>
  <text x="640" y="654" class="font-kr" font-size="11" fill="#555" text-anchor="middle">Req_058 (오류 파급 차단) · Req_059 (강등 조치) · Req_060 (정상 경로 복귀) 구조 직접 반영</text>
  <text x="640" y="671" class="font-kr" font-size="11" fill="#555" text-anchor="middle">CGW의 Fail-Safe 중재는 Diagnostic Console에 warningPathStatus 로컬 SysVar로 노출되어 시스템시험(ST) 과정 전반에 걸쳐 신뢰성 판정 기준으로 사용된다.</text>

</svg>
