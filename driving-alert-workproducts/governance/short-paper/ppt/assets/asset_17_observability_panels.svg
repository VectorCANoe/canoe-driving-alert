  <rect x="80" y="170" width="340" height="360" rx="12" fill="#fafafa" stroke="#777" stroke-width="2"/>
  <text x="250" y="220" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700">Panels</text>
  <text x="250" y="280" text-anchor="middle" font-family="Arial" font-size="18">Vehicle baseline</text>
  <text x="250" y="315" text-anchor="middle" font-family="Arial" font-size="18">V2X panel</text>
  <text x="250" y="350" text-anchor="middle" font-family="Arial" font-size="18">ADAS panel</text>
  <rect x="470" y="170" width="340" height="360" rx="12" fill="#fcfcfc" stroke="#777" stroke-width="2"/>
