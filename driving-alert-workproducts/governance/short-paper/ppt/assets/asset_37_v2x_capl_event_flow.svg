<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f9f9fb"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0392b"/>
    </marker>
    <marker id="arr-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2471a3"/>
    </marker>
  </defs>

  <style>
    .font-kr { font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
    .font-en { font-family: Menlo, Consolas, "SF Mono", monospace; }
  </style>

  <!-- ===== HEADER ===== -->
  <rect x="0" y="0" width="1280" height="68" fill="#1a252f"/>
  <text x="42" y="26" class="font-kr" font-size="13" fill="#7fb3d3">V2X</text>
  <text x="42" y="50" class="font-kr" font-size="22" font-weight="700" fill="#ffffff">V2X 긴급 이벤트 처리 — CAPL 이벤트 패턴</text>
  <text x="1238" y="42" class="font-kr" font-size="13" fill="#aab7c4" text-anchor="end">on message · on timer · 이벤트 기반 정규화</text>

  <!-- ===== SECTION LABELS ===== -->
  <!-- Col headers -->
  <rect x="30" y="84" width="210" height="34" rx="6" fill="#2e4057"/>
  <text x="135" y="107" class="font-kr" font-size="14" font-weight="700" fill="#eaf0fb" text-anchor="middle">① 이벤트 수신</text>

  <rect x="268" y="84" width="210" height="34" rx="6" fill="#2e4057"/>
  <text x="373" y="107" class="font-kr" font-size="14" font-weight="700" fill="#eaf0fb" text-anchor="middle">② 후보 풀 갱신</text>

  <rect x="506" y="84" width="210" height="34" rx="6" fill="#2e4057"/>
  <text x="611" y="107" class="font-kr" font-size="14" font-weight="700" fill="#eaf0fb" text-anchor="middle">③ 선택 규칙 적용</text>

  <rect x="744" y="84" width="210" height="34" rx="6" fill="#2e4057"/>
  <text x="849" y="107" class="font-kr" font-size="14" font-weight="700" fill="#eaf0fb" text-anchor="middle">④ 활성 이벤트 발행</text>

  <rect x="982" y="84" width="268" height="34" rx="6" fill="#7d3c98" fill-opacity="0.85"/>
  <text x="1116" y="107" class="font-kr" font-size="14" font-weight="700" fill="#f5eef8" text-anchor="middle">⑤ Timeout Clear</text>

  <!-- ===== MAIN FLOW ROW ===== -->

  <!-- Box 1: on message -->
  <rect x="30" y="136" width="210" height="110" rx="10" fill="#eaf4fc" stroke="#2980b9" stroke-width="2"/>
  <rect x="30" y="136" width="210" height="30" rx="10" fill="#2980b9"/>
  <rect x="30" y="156" width="210" height="10" fill="#2980b9"/>
  <text x="135" y="157" class="font-en" font-size="13" fill="#ffffff" text-anchor="middle">on message</text>
  <text x="135" y="178" class="font-en" font-size="12" fill="#154360" text-anchor="middle">ETH_EmergencyAlert</text>
  <text x="135" y="200" class="font-kr" font-size="12" fill="#1a5276" text-anchor="middle">· 차량 유형 (type)</text>
  <text x="135" y="218" class="font-kr" font-size="12" fill="#1a5276" text-anchor="middle">· 도달 예상시간 (ETA)</text>
  <text x="135" y="236" class="font-kr" font-size="12" fill="#1a5276" text-anchor="middle">· 발신 식별자 (SourceID)</text>

  <!-- Arrow 1→2 -->
  <line x1="240" y1="191" x2="268" y2="191" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 2: candidate pool -->
  <rect x="268" y="136" width="210" height="110" rx="10" fill="#f0f9ff" stroke="#5dade2" stroke-width="2"/>
  <rect x="268" y="136" width="210" height="30" rx="10" fill="#5dade2"/>
  <rect x="268" y="156" width="210" height="10" fill="#5dade2"/>
  <text x="373" y="157" class="font-en" font-size="13" fill="#ffffff" text-anchor="middle">candidate pool[ ]</text>
  <text x="373" y="180" class="font-kr" font-size="12" fill="#1a5276" text-anchor="middle">활성 후보 배열 갱신</text>
  <text x="373" y="200" class="font-kr" font-size="12" fill="#555" text-anchor="middle">후보 A: ambulance / ETA 4</text>
  <text x="373" y="218" class="font-kr" font-size="12" fill="#555" text-anchor="middle">후보 B: police / ETA 3</text>
  <text x="373" y="236" class="font-kr" font-size="12" fill="#555" text-anchor="middle">후보 C: ambulance / ETA 6</text>

  <!-- Arrow 2→3 -->
  <line x1="478" y1="191" x2="506" y2="191" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 3: selection rule -->
  <rect x="506" y="136" width="210" height="110" rx="10" fill="#fef9e7" stroke="#f0b429" stroke-width="2"/>
  <rect x="506" y="136" width="210" height="30" rx="10" fill="#f0b429"/>
  <rect x="506" y="156" width="210" height="10" fill="#f0b429"/>
  <text x="611" y="157" class="font-en" font-size="13" fill="#fff" text-anchor="middle">selectBestEvent()</text>
  <text x="611" y="180" class="font-kr" font-size="12" fill="#7d6608" text-anchor="middle">① type 우선순위</text>
  <text x="611" y="198" class="font-kr" font-size="12" fill="#7d6608" text-anchor="middle">구급차 &gt; 경찰차</text>
  <text x="611" y="218" class="font-kr" font-size="12" fill="#7d6608" text-anchor="middle">② 동일 유형 → ETA 짧은 것</text>
  <text x="611" y="236" class="font-kr" font-size="12" fill="#7d6608" text-anchor="middle">③ 동점 → SourceID 작은 것</text>

  <!-- Arrow 3→4 -->
  <line x1="716" y1="191" x2="744" y2="191" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 4: publish active -->
  <rect x="744" y="136" width="210" height="110" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <rect x="744" y="136" width="210" height="30" rx="10" fill="#27ae60"/>
  <rect x="744" y="156" width="210" height="10" fill="#27ae60"/>
  <text x="849" y="157" class="font-en" font-size="13" fill="#fff" text-anchor="middle">CoreState (activeEvent)</text>
  <text x="849" y="180" class="font-kr" font-size="12" fill="#145a32" text-anchor="middle">활성 이벤트 1개 확정</text>
  <text x="849" y="200" class="font-kr" font-size="12" fill="#1e8449" text-anchor="middle">→ ADAS 입력으로 전달</text>
  <text x="849" y="220" class="font-kr" font-size="12" fill="#1e8449" text-anchor="middle">→ HMI 참조 가능 상태</text>
  <text x="849" y="238" class="font-kr" font-size="12" fill="#555" text-anchor="middle">비교 가능한 정규화 완료</text>

  <!-- ===== TIMEOUT CLEAR PATH ===== -->
  <!-- Separator -->
  <line x1="978" y1="84" x2="978" y2="680" stroke="#ccc" stroke-width="1.2" stroke-dasharray="6,4"/>

  <!-- Timer registration note -->
  <rect x="982" y="136" width="268" height="56" rx="8" fill="#f9ebea" stroke="#c0392b" stroke-width="1.8"/>
  <text x="1116" y="158" class="font-en" font-size="12" fill="#922b21" text-anchor="middle">setTimer(t_v2x_timeout, 1000)</text>
  <text x="1116" y="178" class="font-kr" font-size="12" fill="#7b241c" text-anchor="middle">이벤트 수신 시 타이머 재등록</text>

  <!-- Timer fire box -->
  <rect x="982" y="216" width="268" height="80" rx="8" fill="#fdedec" stroke="#c0392b" stroke-width="2"/>
  <rect x="982" y="216" width="268" height="28" rx="8" fill="#c0392b"/>
  <rect x="982" y="234" width="268" height="10" fill="#c0392b"/>
  <text x="1116" y="234" class="font-en" font-size="12" fill="#fff" text-anchor="middle">on timer t_v2x_timeout</text>
  <text x="1116" y="260" class="font-kr" font-size="12" fill="#7b241c" text-anchor="middle">1000 ms 무갱신 감지</text>
  <text x="1116" y="278" class="font-kr" font-size="12" fill="#922b21" font-weight="700" text-anchor="middle">→ timeout clear 발생</text>

  <!-- Timeout result box -->
  <rect x="982" y="318" width="268" height="70" rx="8" fill="#f4f6f7" stroke="#808b96" stroke-width="1.8"/>
  <text x="1116" y="345" class="font-kr" font-size="13" fill="#2c3e50" font-weight="700" text-anchor="middle">activeEvent 초기화</text>
  <text x="1116" y="366" class="font-kr" font-size="12" fill="#555" text-anchor="middle">경고 해제 → 복귀 규칙 적용</text>
  <text x="1116" y="384" class="font-kr" font-size="12" fill="#555" text-anchor="middle">정상 주행 상태로 안전 복귀</text>

  <!-- Arrows in timeout column -->
  <line x1="1116" y1="192" x2="1116" y2="216" stroke="#c0392b" stroke-width="1.8" marker-end="url(#arr-red)"/>
  <line x1="1116" y1="296" x2="1116" y2="318" stroke="#c0392b" stroke-width="1.8" marker-end="url(#arr-red)"/>

  <!-- ===== LOWER SECTION: on signal path ===== -->
  <rect x="30" y="290" width="920" height="36" rx="8" fill="#2e4057" fill-opacity="0.9"/>
  <text x="42" y="314" class="font-kr" font-size="14" font-weight="700" fill="#85c1e9">2. 이벤트 종료 / 해제 경로 (on signal / isTimerActive 조합)</text>

  <!-- Step: on signal check -->
  <rect x="30" y="344" width="280" height="90" rx="10" fill="#fdfefe" stroke="#85929e" stroke-width="1.8"/>
  <rect x="30" y="344" width="280" height="28" rx="10" fill="#909497"/>
  <rect x="30" y="362" width="280" height="10" fill="#909497"/>
  <text x="170" y="363" class="font-en" font-size="12" fill="#fff" text-anchor="middle">on signal / on message (갱신)</text>
  <text x="170" y="390" class="font-kr" font-size="12" fill="#333" text-anchor="middle">이벤트 갱신 수신 시</text>
  <text x="170" y="408" class="font-kr" font-size="12" fill="#333" text-anchor="middle">isTimerActive() 확인 후 재등록</text>
  <text x="170" y="426" class="font-krr" font-size="11" fill="#666" text-anchor="middle">중복 타이머 방지</text>

  <!-- Arrow -->
  <line x1="310" y1="390" x2="348" y2="390" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step: condition check -->
  <rect x="348" y="344" width="260" height="90" rx="10" fill="#fdfefe" stroke="#85929e" stroke-width="1.8"/>
  <rect x="348" y="344" width="260" height="28" rx="10" fill="#909497"/>
  <rect x="348" y="362" width="260" height="10" fill="#909497"/>
  <text x="478" y="363" class="font-en" font-size="12" fill="#fff" text-anchor="middle">조건 검증</text>
  <text x="478" y="390" class="font-kr" font-size="12" fill="#333" text-anchor="middle">type · ETA · SourceID 유효성 확인</text>
  <text x="478" y="408" class="font-kr" font-size="12" fill="#333" text-anchor="middle">후보 풀 재정렬</text>
  <text x="478" y="426" class="font-kr" font-size="11" fill="#666" text-anchor="middle">조건 미달 시 return</text>

  <!-- Arrow -->
  <line x1="608" y1="390" x2="646" y2="390" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step: internal state update -->
  <rect x="646" y="344" width="264" height="90" rx="10" fill="#fdfefe" stroke="#85929e" stroke-width="1.8"/>
  <rect x="646" y="344" width="264" height="28" rx="10" fill="#909497"/>
  <rect x="646" y="362" width="264" height="10" fill="#909497"/>
  <text x="778" y="363" class="font-en" font-size="12" fill="#fff" text-anchor="middle">내부 상태 업데이트</text>
  <text x="778" y="390" class="font-kr" font-size="12" fill="#333" text-anchor="middle">CoreState 갱신</text>
  <text x="778" y="408" class="font-kr" font-size="12" fill="#333" text-anchor="middle">activeEvent 재결정</text>
  <text x="778" y="426" class="font-kr" font-size="11" fill="#666" text-anchor="middle">CAN/ETH 메시지 송신</text>

  <!-- ===== BOTTOM SUMMARY ===== -->
  <rect x="30" y="470" width="920" height="50" rx="10" fill="#eaf2ff" stroke="#2e86c1" stroke-width="1.5"/>
  <text x="470" y="491" class="font-kr" font-size="13" font-weight="700" fill="#1a5276" text-anchor="middle">설계 원칙</text>
  <text x="470" y="511" class="font-kr" font-size="12" fill="#2c3e50" text-anchor="middle">V2X는 이벤트를 그대로 전달하지 않는다. 다수 후보를 type → ETA → SourceID 규칙으로 단일 활성 이벤트로 정규화하고, 1000ms 무갱신 시 안전 해제한다.</text>

  <!-- ===== CAPL CODE HINT ===== -->
  <rect x="30" y="540" width="920" height="150" rx="10" fill="#1e2328" stroke="#444" stroke-width="1.5"/>
  <text x="52" y="563" class="font-en" font-size="11" fill="#6aaf6a">// V2X.can — 핵심 구현 요약</text>
  <text x="52" y="584" class="font-en" font-size="11" fill="#8be0f7">on timer</text>
  <text x="110" y="584" class="font-en" font-size="11" fill="#c8d8e8"> tRxCycle {</text>
  <text x="52" y="601" class="font-en" font-size="11" fill="#c8d8e8">  if (isHigherPriority(newType, newEta, newSourceId, activeType, activeEta, activeId)) {</text>
  <text x="52" y="618" class="font-en" font-size="11" fill="#c8d8e8">    gActiveEmergencyType = newType; publishActiveEmergencyToV2X();</text>
  <text x="52" y="635" class="font-en" font-size="11" fill="#c8d8e8">    setTimeoutClear(0);</text>
  <text x="52" y="652" class="font-en" font-size="11" fill="#c8d8e8">    setTimer(tWatchdog, 1000);</text>
  <text x="600" y="652" class="font-en" font-size="11" fill="#6aaf6a">// 1000ms 무갱신 시 clear</text>
  <text x="52" y="669" class="font-en" font-size="11" fill="#c8d8e8">  } }</text>

  <!-- Arrows linking timeout area to flow -->
  <line x1="982" y1="191" x2="950" y2="191" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="945" y="187" class="font-kr" font-size="10" fill="#c0392b" text-anchor="end">타이머 등록</text>

</svg>
