  <rect x="80" y="603" width="1120" height="58" rx="8" fill="#f7f7f7" stroke="#888" stroke-width="1.5"/>
  <text x="110" y="627" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#333">기호</text>
  <text x="160" y="627" font-family="Arial, sans-serif" font-size="15" fill="#444">S_sel: 정상 선택 시나리오 수 / T_v2x: 전체 V2X 선택 시나리오 수 / S_int: 정상 통합 경고 시나리오 수 / T_int: 전체 통합 시나리오 수 / S_rec: 정상 복귀 시나리오 수 / T_rec: 전체 복귀 시나리오 수</text>
