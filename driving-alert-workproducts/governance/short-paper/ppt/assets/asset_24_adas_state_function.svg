<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>

  <text x="640" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#222">ADAS 경고 상태 통합 구조</text>
  <text x="640" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#555">구간 맥락, 긴급 접근, 객체 위험, 서비스 상태를 하나의 경고 상태로 중재</text>

  <rect x="86" y="134" width="218" height="82" rx="10" fill="#fafafa" stroke="#666" stroke-width="2"/>
  <text x="195" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#222">V<tspan baseline-shift="sub" font-size="13">t</tspan></text>
  <text x="195" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">차량 상태</text>

  <rect x="86" y="242" width="218" height="82" rx="10" fill="#fafafa" stroke="#666" stroke-width="2"/>
  <text x="195" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#222">C<tspan baseline-shift="sub" font-size="13">t</tspan></text>
  <text x="195" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">구간 맥락</text>

  <rect x="86" y="350" width="218" height="82" rx="10" fill="#fafafa" stroke="#666" stroke-width="2"/>
  <text x="195" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#222">E<tspan baseline-shift="sub" font-size="13">t</tspan></text>
  <text x="195" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">긴급 접근 정보</text>

  <rect x="86" y="458" width="218" height="82" rx="10" fill="#fafafa" stroke="#666" stroke-width="2"/>
  <text x="195" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#222">O<tspan baseline-shift="sub" font-size="13">t</tspan></text>
  <text x="195" y="518" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">객체 기반 위험</text>

  <rect x="86" y="566" width="218" height="82" rx="10" fill="#fafafa" stroke="#666" stroke-width="2"/>
  <text x="195" y="598" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#222">S<tspan baseline-shift="sub" font-size="13">t</tspan></text>
  <text x="195" y="626" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">서비스 가용성</text>

  <rect x="430" y="212" width="420" height="350" rx="14" fill="#fcfcfc" stroke="#555" stroke-width="2.5"/>
  <text x="640" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#222">ADAS Arbitration</text>
  <text x="640" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#333">W<tspan baseline-shift="sub" font-size="13">t</tspan> = f(V<tspan baseline-shift="sub" font-size="13">t</tspan>, C<tspan baseline-shift="sub" font-size="13">t</tspan>, E<tspan baseline-shift="sub" font-size="13">t</tspan>, O<tspan baseline-shift="sub" font-size="13">t</tspan>, S<tspan baseline-shift="sub" font-size="13">t</tspan>)</text>

  <rect x="492" y="324" width="296" height="64" rx="10" fill="#ffffff" stroke="#777" stroke-width="1.8"/>
  <text x="640" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#222">단일 경고 선택</text>
  <text x="640" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#444">구간 / 긴급 / TTC 위험을 하나의 상태로 중재</text>

  <rect x="492" y="406" width="296" height="56" rx="10" fill="#ffffff" stroke="#777" stroke-width="1.8"/>
  <text x="640" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#222">감속 보조 / 출력 결정</text>
  <text x="640" y="449" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#444">selected alert + decel assist request</text>

  <rect x="492" y="480" width="296" height="56" rx="10" fill="#ffffff" stroke="#777" stroke-width="1.8"/>
  <text x="640" y="503" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#222">Fail-Safe / Stale 처리</text>
  <text x="640" y="523" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#444">timeout clear, degraded state, recovery</text>

  <line x1="304" y1="175" x2="430" y2="270" stroke="#666" stroke-width="2.2"/>
  <polygon points="430,270 419,268 424,259" fill="#666"/>
  <line x1="304" y1="283" x2="430" y2="318" stroke="#666" stroke-width="2.2"/>
  <polygon points="430,318 419,320 422,310" fill="#666"/>
  <line x1="304" y1="391" x2="430" y2="387" stroke="#666" stroke-width="2.2"/>
  <polygon points="430,387 419,392 419,382" fill="#666"/>
  <line x1="304" y1="499" x2="430" y2="456" stroke="#666" stroke-width="2.2"/>
  <polygon points="430,456 420,463 417,454" fill="#666"/>
  <line x1="304" y1="607" x2="430" y2="505" stroke="#666" stroke-width="2.2"/>
  <polygon points="430,505 425,515 418,507" fill="#666"/>

  <rect x="960" y="196" width="226" height="82" rx="10" fill="#ffffff" stroke="#666" stroke-width="2"/>
  <text x="1073" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#222">W<tspan baseline-shift="sub" font-size="13">t</tspan></text>
  <text x="1073" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">최종 경고 상태</text>

  <rect x="960" y="330" width="226" height="82" rx="10" fill="#ffffff" stroke="#666" stroke-width="2"/>
  <text x="1073" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#222">decelAssistReq</text>
  <text x="1073" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">감속 보조 요청</text>

  <rect x="960" y="464" width="226" height="82" rx="10" fill="#ffffff" stroke="#666" stroke-width="2"/>
  <text x="1073" y="496" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#222">warningPathStatus</text>
  <text x="1073" y="524" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">Fail-Safe / 복귀 상태</text>

  <line x1="850" y1="278" x2="960" y2="237" stroke="#444" stroke-width="2.3"/>
  <polygon points="960,237 950,245 946,236" fill="#444"/>
  <line x1="850" y1="438" x2="960" y2="371" stroke="#444" stroke-width="2.3"/>
  <polygon points="960,371 950,378 946,369" fill="#444"/>
  <line x1="850" y1="508" x2="960" y2="505" stroke="#444" stroke-width="2.3"/>
  <polygon points="960,505 949,510 949,500" fill="#444"/>

  <rect x="168" y="668" width="944" height="34" rx="8" fill="#f7f7f7" stroke="#888" stroke-width="1.2"/>
  <text x="640" y="690" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#444">입력 상태 집합을 ADAS가 하나의 경고 상태 W<tspan baseline-shift="sub" font-size="10">t</tspan>로 중재하고, 동시에 출력·Fail-Safe·복귀 정책까지 결정하는 구조</text>
</svg>
