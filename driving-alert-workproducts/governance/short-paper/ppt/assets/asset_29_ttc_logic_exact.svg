<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>

  <text x="640" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#222">TTC 계산 로직</text>
  <text x="640" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#555">CAPL 구현 기준: 유효성 판단 → TTC 산출 → 0~10000 ms 정규화</text>

  <rect x="110" y="150" width="220" height="88" rx="10" fill="#fafafa" stroke="#666" stroke-width="1.8"/>
  <text x="220" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#222">입력</text>
  <text x="220" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#444">d = objectRange</text>
  <text x="220" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#444">v<tspan baseline-shift="sub" font-size="10">rel</tspan> = objectRelSpeed</text>

  <rect x="390" y="150" width="500" height="88" rx="10" fill="#fcfcfc" stroke="#666" stroke-width="1.8"/>
  <text x="640" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#222">1. 유효성 판단</text>
  <text x="640" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">if (v<tspan baseline-shift="sub" font-size="10">rel</tspan> ≥ 0) or (d ≤ 0) → TTC = 10000 ms</text>
  <text x="640" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#555">비접근 객체 또는 무효 거리 입력은 최대 TTC로 처리</text>

  <rect x="950" y="150" width="220" height="88" rx="10" fill="#fafafa" stroke="#666" stroke-width="1.8"/>
  <text x="1060" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#222">예외 출력</text>
  <text x="1060" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">TTC = 10000 ms</text>

  <line x1="330" y1="194" x2="390" y2="194" stroke="#444" stroke-width="2"/>
  <polygon points="390,194 381,189 381,199" fill="#444"/>
  <line x1="890" y1="194" x2="950" y2="194" stroke="#444" stroke-width="2"/>
  <polygon points="950,194 941,189 941,199" fill="#444"/>

  <rect x="260" y="302" width="760" height="88" rx="10" fill="#ffffff" stroke="#666" stroke-width="1.8"/>
  <text x="640" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#222">2. closing speed 계산</text>
  <text x="640" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#333">closingKph = −v<tspan baseline-shift="sub" font-size="10">rel</tspan></text>
  <text x="640" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#555">if (closingKph ≤ 0) → TTC = 10000 ms</text>

  <rect x="260" y="436" width="760" height="126" rx="10" fill="#fcfcfc" stroke="#666" stroke-width="1.8"/>
  <text x="640" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#222">3. TTC 산출</text>
  <text x="526" y="514" text-anchor="end" font-family="Arial, sans-serif" font-size="18" fill="#333">TTC =</text>
  <text x="676" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#333">3600 · d</text>
  <line x1="616" y1="510" x2="736" y2="510" stroke="#333" stroke-width="1.6"/>
  <text x="676" y="534" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#333">|v<tspan baseline-shift="sub" font-size="11">rel</tspan>|</text>
  <text x="640" y="552" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#555">구현상 ttcMs = (objectRange × 3600) / closingKph</text>

  <rect x="260" y="606" width="760" height="60" rx="10" fill="#ffffff" stroke="#666" stroke-width="1.8"/>
  <text x="640" y="631" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#222">4. 최종 정규화</text>
  <text x="640" y="652" text-anchor="middle" font-family="Arial, sans-serif" font-size="12.5" fill="#444">0 ms 이하 → 0, 10000 ms 이상 → 10000 ms 로 clamp → objectTtcMin</text>

  <line x1="640" y1="238" x2="640" y2="302" stroke="#555" stroke-width="2"/>
  <polygon points="640,302 634,292 646,292" fill="#555"/>
  <line x1="640" y1="390" x2="640" y2="436" stroke="#555" stroke-width="2"/>
  <polygon points="640,436 634,426 646,426" fill="#555"/>
  <line x1="640" y1="562" x2="640" y2="606" stroke="#555" stroke-width="2"/>
  <polygon points="640,606 634,596 646,596" fill="#555"/>
</svg>
