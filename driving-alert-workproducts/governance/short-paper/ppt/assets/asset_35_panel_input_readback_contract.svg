<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="780" viewBox="0 0 1600 780">
  <rect width="1600" height="780" fill="#ffffff"/>

  <style>
    .title { font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; font-size: 34px; font-weight: 700; fill: #111111; }
    .subtitle { font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; font-size: 17px; fill: #555555; }
    .section { font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; font-size: 22px; font-weight: 700; fill: #111111; }
    .label { font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; font-size: 16px; fill: #333333; }
    .small { font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; font-size: 14px; fill: #555555; }
    .mono { font-family: Menlo, Consolas, "SF Mono", monospace; font-size: 16px; fill: #222222; }
    .box { fill: #fafafa; stroke: #5d5d5d; stroke-width: 1.6; rx: 12; ry: 12; }
    .root { fill: #f5f5f5; stroke: #333333; stroke-width: 2; rx: 12; ry: 12; }
    .arrow { stroke: #5d5d5d; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    .dashed { stroke: #7a7a7a; stroke-width: 2; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow); }
  </style>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#5d5d5d"/>
    </marker>
  </defs>

  <text x="800" y="56" text-anchor="middle" class="title">패널 입력 및 상태 확인 계약</text>
  <text x="800" y="84" text-anchor="middle" class="subtitle">입력 콘솔 → 명령 / 주입 / 시험 → 담당 ECU → 상태 / 확인값</text>

  <rect x="70" y="190" width="220" height="160" class="root"/>
  <text x="180" y="238" text-anchor="middle" class="section">입력 콘솔</text>
  <text x="180" y="274" text-anchor="middle" class="label">패널 입력 페이지</text>
  <text x="180" y="306" text-anchor="middle" class="mono">Drive / Nav / Emergency</text>
  <text x="180" y="334" text-anchor="middle" class="mono">Verification / Console</text>

  <rect x="390" y="120" width="280" height="120" class="box"/>
  <text x="415" y="156" class="section">명령 입력</text>
  <text x="415" y="188" class="mono">Chassis::*</text>
  <text x="415" y="214" class="mono">Infotainment::*</text>

  <rect x="390" y="270" width="280" height="120" class="box"/>
  <text x="415" y="306" class="section">주입 입력</text>
  <text x="415" y="338" class="mono">Test::compatEmergency*</text>
  <text x="415" y="364" class="small">dispatch compatibility input</text>

  <rect x="390" y="420" width="280" height="140" class="box"/>
  <text x="415" y="456" class="section">시험 입력</text>
  <text x="415" y="488" class="mono">Test::testScenario</text>
  <text x="415" y="514" class="mono">Test::scenarioCommand</text>
  <text x="415" y="540" class="mono">Test::forceFailSafe</text>

  <rect x="770" y="170" width="320" height="300" class="root"/>
  <text x="930" y="212" text-anchor="middle" class="section">담당 ECU</text>
  <text x="930" y="252" text-anchor="middle" class="mono">VCU / IVI</text>
  <text x="930" y="282" text-anchor="middle" class="mono">V2X / ADAS / CGW</text>
  <text x="930" y="312" text-anchor="middle" class="mono">TEST_SCN</text>
  <text x="930" y="350" text-anchor="middle" class="label">입력 namespace를 소비하고</text>
  <text x="930" y="378" text-anchor="middle" class="label">런타임 상태와 결과를 생성</text>
  <text x="930" y="418" text-anchor="middle" class="small">패널은 담당 ECU 내부 alias나 g*에 직접 연결하지 않음</text>

  <rect x="1190" y="120" width="330" height="430" class="root"/>
  <text x="1355" y="160" text-anchor="middle" class="section">상태 / 확인값</text>
  <text x="1220" y="208" class="label">Product outputs</text>
  <text x="1220" y="236" class="mono">Body::*</text>
  <text x="1220" y="262" class="mono">Cluster::*</text>

  <text x="1220" y="318" class="label">Runtime mirrors</text>
  <text x="1220" y="346" class="mono">Core::*</text>
  <text x="1220" y="372" class="mono">CoreState::*</text>

  <text x="1220" y="428" class="label">Verification / diagnostics</text>
  <text x="1220" y="456" class="mono">Test::*</text>
  <text x="1220" y="482" class="mono">Diag::*</text>
  <text x="1220" y="508" class="mono">UiRender::*</text>

  <path d="M 290 270 L 390 180" class="arrow"/>
  <path d="M 290 270 L 390 330" class="arrow"/>
  <path d="M 290 270 L 390 490" class="arrow"/>

  <path d="M 670 180 L 770 230" class="arrow"/>
  <path d="M 670 330 L 770 320" class="arrow"/>
  <path d="M 670 490 L 770 410" class="arrow"/>

  <path d="M 1090 320 L 1190 320" class="arrow"/>
  <path d="M 1190 570 C 1020 660, 570 690, 220 610" class="dashed"/>

  <text x="340" y="132" class="small">패널 쓰기 경로</text>
  <text x="1114" y="302" class="small">state publish</text>
  <text x="740" y="690" text-anchor="middle" class="small">패널은 관측과 증빙을 위해 안정된 상태 확인용 변수만 읽는다</text>
</svg>
