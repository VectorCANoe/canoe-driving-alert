  <text x="445" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-style="italic">N<tspan baseline-shift="sub" font-size="11">3</tspan> = (S<tspan baseline-shift="sub" font-size="11">rec</tspan> / T<tspan baseline-shift="sub" font-size="11">rec</tspan>) × 100</text>
