  <text x="1112" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700">90.8 %</text>

  <rect x="90" y="380" width="1100" height="96" fill="#fff" stroke="#666" stroke-width="1.5"/>
  <line x1="290" y1="380" x2="290" y2="476" stroke="#666" stroke-width="1.5"/>
  <line x1="600" y1="380" x2="600" y2="476" stroke="#666" stroke-width="1.5"/>
  <line x1="840" y1="380" x2="840" y2="476" stroke="#666" stroke-width="1.5"/>
