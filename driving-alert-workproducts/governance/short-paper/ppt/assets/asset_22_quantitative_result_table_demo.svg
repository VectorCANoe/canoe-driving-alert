    <tspan x="938" dy="0">IT_009, ST_035</tspan>
    <tspan x="938" dy="17">ST_036, ST_045, ST_046</tspan>
  </text>
  <text x="1112" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700">93.9 %</text>

  <rect x="90" y="516" width="1100" height="108" rx="8" fill="#f7f7f7" stroke="#888" stroke-width="1.5"/>
  <text x="120" y="542" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#333">기호</text>
  <text x="170" y="542" font-family="Arial, sans-serif" font-size="12.5" fill="#444">S_sel: 정상 선택 수 / T_v2x: 전체 V2X 선택 수 / S_int: 정상 통합 경고 수 / T_int: 전체 통합 시나리오 수</text>
  <text x="170" y="566" font-family="Arial, sans-serif" font-size="12.5" fill="#444">S_rec: 정상 복귀 수 / T_rec: 전체 복귀 시나리오 수</text>
  <text x="120" y="596" font-family="Arial, sans-serif" font-size="13" fill="#444">집계 기준: XML export 및 scenario verdict 결과</text>
