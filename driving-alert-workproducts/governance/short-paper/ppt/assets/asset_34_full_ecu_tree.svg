  <rect x="520" y="244" width="340" height="420" class="box"/>
  <text x="540" y="276" class="domain">Body</text>
  <text x="840" y="276" text-anchor="end" class="count">24 nodes</text>
  <text x="540" y="312" class="tree">├─ BCM        ├─ MIR</text>
  <text x="540" y="336" class="tree">├─ DATC       ├─ RATC</text>
  <text x="540" y="360" class="tree">├─ SMK        ├─ SRF</text>
  <text x="540" y="384" class="tree">├─ AFLS       ├─ HLM</text>
  <text x="540" y="408" class="tree">├─ WIP        ├─ CSM</text>
  <text x="540" y="432" class="tree">├─ BSEC       ├─ AHLS</text>
  <text x="540" y="456" class="tree">├─ DOOR_FL    ├─ ADM</text>
  <text x="540" y="480" class="tree">├─ DOOR_FR    ├─ PTG</text>
  <text x="540" y="504" class="tree">├─ DOOR_RL    ├─ BIO</text>
