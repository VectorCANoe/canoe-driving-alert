<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1320" viewBox="0 0 1600 1320">
  <rect width="1600" height="1320" fill="#ffffff"/>

  <style>
    .title { font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; font-size: 34px; font-weight: 700; fill: #111111; }
    .subtitle { font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; font-size: 16px; fill: #555555; }
    .domain { font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; font-size: 21px; font-weight: 700; fill: #111111; }
    .count { font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; font-size: 14px; fill: #666666; }
    .tree { font-family: Menlo, Consolas, "SF Mono", monospace; font-size: 15px; fill: #222222; }
    .box { fill: #fafafa; stroke: #5a5a5a; stroke-width: 1.6; rx: 10; ry: 10; }
    .rootbox { fill: #f7f7f7; stroke: #333333; stroke-width: 2; rx: 10; ry: 10; }
    .line { stroke: #6a6a6a; stroke-width: 1.6; fill: none; }
  </style>

  <text x="800" y="54" text-anchor="middle" class="title">Driving Alert Active Baseline ECU Tree</text>
  <text x="800" y="82" text-anchor="middle" class="subtitle">ECU nodes only · current visible import bank</text>

  <rect x="610" y="104" width="380" height="74" class="rootbox"/>
  <text x="800" y="136" text-anchor="middle" class="domain">Project ECU Nodes</text>
  <text x="800" y="160" text-anchor="middle" class="count">Root → Domain → ECU node</text>

  <!-- connectors -->
  <path d="M 800 178 L 800 220" class="line"/>
  <path d="M 220 220 L 1380 220" class="line"/>
  <path d="M 220 220 L 220 244" class="line"/>
  <path d="M 690 220 L 690 244" class="line"/>
  <path d="M 1160 220 L 1160 244" class="line"/>
  <path d="M 220 682 L 220 706" class="line"/>
  <path d="M 690 682 L 690 706" class="line"/>
  <path d="M 1160 682 L 1160 706" class="line"/>

  <!-- Chassis -->
  <rect x="50" y="244" width="340" height="420" class="box"/>
  <text x="70" y="276" class="domain">Chassis</text>
  <text x="370" y="276" text-anchor="end" class="count">15 nodes</text>
  <text x="70" y="312" class="tree">├─ VCU</text>
  <text x="70" y="336" class="tree">├─ ESC</text>
  <text x="70" y="360" class="tree">├─ MDPS</text>
  <text x="70" y="384" class="tree">├─ ABS</text>
  <text x="70" y="408" class="tree">├─ EPB</text>
  <text x="70" y="432" class="tree">├─ TPMS</text>
  <text x="70" y="456" class="tree">├─ SAS</text>
  <text x="70" y="480" class="tree">├─ VSM</text>
  <text x="70" y="504" class="tree">├─ EHB</text>
  <text x="70" y="528" class="tree">├─ ECS</text>
  <text x="70" y="552" class="tree">├─ CDC</text>
  <text x="70" y="576" class="tree">├─ ASM</text>
  <text x="70" y="600" class="tree">├─ RWS</text>
  <text x="70" y="624" class="tree">├─ ACU</text>
  <text x="70" y="648" class="tree">└─ ODS</text>

