  <text x="70" y="1062" class="tree">├─ INVERTER</text>
  <text x="70" y="1086" class="tree">└─ CPC</text>

  <!-- ETH Backbone -->
  <rect x="520" y="706" width="340" height="500" class="box"/>
  <text x="540" y="738" class="domain">ETH Backbone</text>
  <text x="840" y="738" text-anchor="end" class="count">9 nodes</text>
  <text x="540" y="774" class="tree">├─ CGW</text>
  <text x="540" y="798" class="tree">├─ V2X</text>
  <text x="540" y="822" class="tree">├─ SGW</text>
  <text x="540" y="846" class="tree">├─ IBOX</text>
  <text x="540" y="870" class="tree">├─ DCM</text>
  <text x="540" y="894" class="tree">├─ EDR</text>
  <text x="540" y="918" class="tree">├─ ETHB</text>
  <text x="540" y="942" class="tree">├─ TEST_SCN</text>
  <text x="540" y="966" class="tree">└─ TEST_BAS</text>

  <!-- ADAS -->
  <rect x="990" y="706" width="500" height="500" class="box"/>
  <text x="1010" y="738" class="domain">ADAS</text>
  <text x="1470" y="738" text-anchor="end" class="count">26 nodes</text>
  <text x="1010" y="774" class="tree">├─ ADAS         ├─ SRR_FL       ├─ PKM</text>
  <text x="1010" y="798" class="tree">├─ SCC          ├─ SRR_FR       ├─ RPC</text>
  <text x="1010" y="822" class="tree">├─ LDWS_LKAS    ├─ SRR_RL       ├─ RRM</text>
  <text x="1010" y="846" class="tree">├─ FCA          ├─ SRR_RR       ├─ SPM</text>
  <text x="1010" y="870" class="tree">├─ BCW          ├─ PUS          ├─ HWP</text>
  <text x="1010" y="894" class="tree">├─ LCA          ├─ DMS          ├─ LDR</text>
  <text x="1010" y="918" class="tree">├─ SPAS         ├─ OMS          └─ TRM</text>
  <text x="1010" y="942" class="tree">├─ RSPA         ├─ AEB</text>
  <text x="1010" y="966" class="tree">├─ AVM          ├─ FCAM</text>
  <text x="1010" y="990" class="tree">└─ FRADAR</text>

</svg>
