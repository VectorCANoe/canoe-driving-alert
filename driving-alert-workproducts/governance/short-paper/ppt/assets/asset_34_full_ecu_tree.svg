  <text x="1010" y="336" class="tree">├─ CLU</text>
  <text x="1010" y="360" class="tree">├─ HUD</text>
  <text x="1010" y="384" class="tree">├─ AMP</text>
  <text x="1010" y="408" class="tree">├─ VCS</text>
  <text x="1010" y="432" class="tree">├─ TMU</text>
  <text x="1010" y="456" class="tree">├─ NAV</text>
  <text x="1010" y="480" class="tree">├─ OTA</text>
  <text x="1010" y="504" class="tree">├─ DKEY</text>
  <text x="1010" y="528" class="tree">├─ RSE</text>
