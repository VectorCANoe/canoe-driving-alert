<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f9f9fb"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1e8449"/>
    </marker>
    <marker id="arr-o" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d68910"/>
    </marker>
  </defs>

  <style>
    .font-kr { font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; }
    .font-en { font-family: Menlo, Consolas, "SF Mono", monospace; }
  </style>

  <!-- ===== HEADER ===== -->
  <rect x="0" y="0" width="1280" height="68" fill="#1a252f"/>
  <text x="42" y="26" class="font-kr" font-size="13" fill="#82e0aa">ADAS</text>
  <text x="42" y="50" class="font-kr" font-size="22" font-weight="700" fill="#ffffff">ADAS 위험도 산정 및 경고 중재 — CAPL 이벤트 패턴</text>
  <text x="1238" y="42" class="font-kr" font-size="13" fill="#aab7c4" text-anchor="end">on message · on timer · R_emg / R_obj → R_t → 출력</text>

  <!-- ===== SECTION HEADERS ===== -->
  <!-- Row 1: input triggers -->
  <rect x="30" y="84" width="180" height="34" rx="6" fill="#1a5276"/>
  <text x="120" y="107" class="font-kr" font-size="13" font-weight="700" fill="#d6eaf8" text-anchor="middle">① 이벤트 트리거</text>

  <rect x="236" y="84" width="200" height="34" rx="6" fill="#1a5276"/>
  <text x="336" y="107" class="font-kr" font-size="13" font-weight="700" fill="#d6eaf8" text-anchor="middle">② 긴급 위험도 R_emg</text>

  <rect x="462" y="84" width="200" height="34" rx="6" fill="#1a5276"/>
  <text x="562" y="107" class="font-kr" font-size="13" font-weight="700" fill="#d6eaf8" text-anchor="middle">③ 객체 위험도 R_obj</text>

  <rect x="688" y="84" width="190" height="34" rx="6" fill="#7d6608"/>
  <text x="783" y="107" class="font-kr" font-size="13" font-weight="700" fill="#fef9e7" text-anchor="middle">④ 최종 위험도 R_t</text>

  <rect x="904" y="84" width="180" height="34" rx="6" fill="#1e8449"/>
  <text x="994" y="107" class="font-kr" font-size="13" font-weight="700" fill="#eafaf1" text-anchor="middle">⑤ 출력 · 복귀</text>

  <rect x="1110" y="84" width="140" height="34" rx="6" fill="#7b241c"/>
  <text x="1180" y="107" class="font-kr" font-size="13" font-weight="700" fill="#fadbd8" text-anchor="middle">⑥ Hysteresis</text>

  <!-- ===== INPUT TRIGGERS ===== -->
  <!-- on message: V2X activeEvent -->
  <rect x="30" y="136" width="180" height="72" rx="8" fill="#eaf4fc" stroke="#2980b9" stroke-width="2"/>
  <rect x="30" y="136" width="180" height="24" rx="8" fill="#2980b9"/>
  <rect x="30" y="150" width="180" height="10" fill="#2980b9"/>
  <text x="120" y="153" class="font-en" font-size="11" fill="#fff" text-anchor="middle">on message</text>
  <text x="120" y="174" class="font-en" font-size="10" fill="#154360" text-anchor="middle">ETH_activeEvent</text>
  <text x="120" y="192" class="font-kr" font-size="11" fill="#1a5276" text-anchor="middle">V2X 정규화 결과 수신</text>

  <!-- on message: object risk -->
  <rect x="30" y="220" width="180" height="72" rx="8" fill="#eaf4fc" stroke="#2980b9" stroke-width="2"/>
  <rect x="30" y="220" width="180" height="24" rx="8" fill="#2980b9"/>
  <rect x="30" y="234" width="180" height="10" fill="#2980b9"/>
  <text x="120" y="237" class="font-en" font-size="11" fill="#fff" text-anchor="middle">on message</text>
  <text x="120" y="258" class="font-en" font-size="10" fill="#154360" text-anchor="middle">ObjectRiskMsg</text>
  <text x="120" y="276" class="font-kr" font-size="11" fill="#1a5276" text-anchor="middle">객체 거리·속도·신뢰도</text>

  <!-- on timer: polling -->
  <rect x="30" y="304" width="180" height="72" rx="8" fill="#eaf4fc" stroke="#2980b9" stroke-width="2"/>
  <rect x="30" y="304" width="180" height="24" rx="8" fill="#5dade2"/>
  <rect x="30" y="318" width="180" height="10" fill="#5dade2"/>
  <text x="120" y="321" class="font-en" font-size="11" fill="#fff" text-anchor="middle">on timer (50ms)</text>
  <text x="120" y="342" class="font-kr" font-size="11" fill="#1a5276" text-anchor="middle">주기적 위험도 재산정</text>
  <text x="120" y="360" class="font-kr" font-size="10" fill="#666" text-anchor="middle">상태 지속 감시</text>

  <!-- Arrows 1→2 -->
  <line x1="210" y1="173" x2="236" y2="210" stroke="#444" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="210" y1="257" x2="236" y2="280" stroke="#444" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="210" y1="340" x2="236" y2="350" stroke="#444" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- ===== R_emg CALCULATION ===== -->
  <rect x="236" y="136" width="200" height="250" rx="10" fill="#fef5e7" stroke="#d4ac0d" stroke-width="2"/>
  <rect x="236" y="136" width="200" height="28" rx="10" fill="#d4ac0d"/>
  <rect x="236" y="154" width="200" height="10" fill="#d4ac0d"/>
  <text x="336" y="156" class="font-en" font-size="12" fill="#fff" text-anchor="middle">calcRiskEmg()</text>

  <text x="336" y="187" class="font-en" font-size="11" fill="#7d6608" text-anchor="middle">etaScore</text>
  <text x="336" y="203" class="font-kr" font-size="10" fill="#856404" text-anchor="middle">ETA ↓ → 점수 ↑</text>
  <line x1="280" y1="216" x2="390" y2="216" stroke="#d4ac0d" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="336" y="228" class="font-en" font-size="11" fill="#7d6608" text-anchor="middle">speedScore</text>
  <text x="336" y="244" class="font-kr" font-size="10" fill="#856404" text-anchor="middle">자차 속도 → 제동 여유 반영</text>
  <line x1="280" y1="256" x2="390" y2="256" stroke="#d4ac0d" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="336" y="268" class="font-en" font-size="11" fill="#7d6608" text-anchor="middle">directionScore</text>
  <text x="336" y="284" class="font-kr" font-size="10" fill="#856404" text-anchor="middle">전방 접근 → 가중치 ↑</text>
  <line x1="280" y1="296" x2="390" y2="296" stroke="#d4ac0d" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="336" y="308" class="font-en" font-size="11" fill="#7d6608" text-anchor="middle">typeBias</text>
  <text x="336" y="324" class="font-kr" font-size="10" fill="#856404" text-anchor="middle">구급차 &gt; 경찰차 보정</text>
  <line x1="280" y1="336" x2="390" y2="336" stroke="#d4ac0d" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Formula -->
  <rect x="252" y="348" width="168" height="34" rx="6" fill="#7d6608" fill-opacity="0.15" stroke="#856404" stroke-width="1.2"/>
  <text x="336" y="362" class="font-en" font-size="11" fill="#7d6608" font-weight="700" text-anchor="middle">R_emg = 0.55·eta + spd</text>
  <text x="336" y="376" class="font-en" font-size="11" fill="#7d6608" font-weight="700" text-anchor="middle">+ dir + bias</text>

  <!-- ===== R_obj CALCULATION ===== -->
  <rect x="462" y="136" width="200" height="250" rx="10" fill="#f0f9ff" stroke="#5dade2" stroke-width="2"/>
  <rect x="462" y="136" width="200" height="28" rx="10" fill="#2980b9"/>
  <rect x="462" y="154" width="200" height="10" fill="#2980b9"/>
  <text x="562" y="156" class="font-en" font-size="12" fill="#fff" text-anchor="middle">calcRiskObj()</text>

  <text x="562" y="187" class="font-en" font-size="11" fill="#1a5276" text-anchor="middle">TTC 계산</text>
  <text x="562" y="203" class="font-kr" font-size="10" fill="#1a5276" text-anchor="middle">TTC = 3600·d / |v_rel|</text>
  <line x1="502" y1="216" x2="622" y2="216" stroke="#5dade2" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="562" y="228" class="font-en" font-size="11" fill="#1a5276" text-anchor="middle">baseRisk</text>
  <text x="562" y="244" class="font-kr" font-size="10" fill="#1a5276" text-anchor="middle">TTC 구간별 기본 위험도</text>
  <line x1="502" y1="256" x2="622" y2="256" stroke="#5dade2" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="562" y="268" class="font-en" font-size="11" fill="#1a5276" text-anchor="middle">rangeBias + confidenceBias</text>
  <text x="562" y="284" class="font-kr" font-size="10" fill="#1a5276" text-anchor="middle">거리·신뢰도 보정</text>
  <line x1="502" y1="296" x2="622" y2="296" stroke="#5dade2" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="562" y="308" class="font-en" font-size="11" fill="#1a5276" text-anchor="middle">scenarioBias</text>
  <text x="562" y="324" class="font-kr" font-size="10" fill="#1a5276" text-anchor="middle">교차로·합류구간 시나리오 보정</text>
  <line x1="502" y1="336" x2="622" y2="336" stroke="#5dade2" stroke-width="0.8" stroke-dasharray="4,3"/>

  <rect x="478" y="348" width="168" height="34" rx="6" fill="#2980b9" fill-opacity="0.15" stroke="#2980b9" stroke-width="1.2"/>
  <text x="562" y="362" class="font-en" font-size="11" fill="#1a5276" font-weight="700" text-anchor="middle">R_obj = base + range</text>
  <text x="562" y="376" class="font-en" font-size="11" fill="#1a5276" font-weight="700" text-anchor="middle">+ conf + scn</text>

  <!-- Arrows 2→3, 3→4 -->
  <line x1="436" y1="260" x2="462" y2="260" stroke="#444" stroke-width="1.8" marker-end="url(#arr)"/>

  <line x1="662" y1="260" x2="688" y2="260" stroke="#444" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="436" y1="362" x2="688" y2="362" stroke="#444" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#arr)"/>


  <!-- ===== R_t SELECTION ===== -->
  <rect x="688" y="136" width="190" height="250" rx="10" fill="#fefbd8" stroke="#d68910" stroke-width="2.2"/>
  <rect x="688" y="136" width="190" height="28" rx="10" fill="#d68910"/>
  <rect x="688" y="154" width="190" height="10" fill="#d68910"/>
  <text x="783" y="156" class="font-en" font-size="12" fill="#fff" text-anchor="middle">selectFinalRisk()</text>

  <rect x="708" y="182" width="150" height="44" rx="8" fill="#fff" stroke="#d68910" stroke-width="1.5"/>
  <text x="783" y="200" class="font-en" font-size="11" fill="#7d4e00" font-weight="700" text-anchor="middle">R_t = max(R_emg, R_obj)</text>
  <text x="783" y="218" class="font-kr" font-size="10" fill="#7d4e00" text-anchor="middle">긴급·객체 중 높은 위험 선택</text>

  <text x="783" y="254" class="font-kr" font-size="11" fill="#7d4e00" text-anchor="middle">▶ 경고 레벨 결정</text>
  <text x="783" y="272" class="font-kr" font-size="10" fill="#856404" text-anchor="middle">LOW / MID / HIGH / CRITICAL</text>
  <line x1="728" y1="278" x2="858" y2="278" stroke="#d68910" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="783" y="298" class="font-kr" font-size="11" fill="#7d4e00" text-anchor="middle">▶ 경고 유형 선택</text>
  <text x="783" y="316" class="font-kr" font-size="10" fill="#856404" text-anchor="middle">ZONE / EMG / OBJ / COMBINED</text>
  <line x1="728" y1="322" x2="858" y2="322" stroke="#d68910" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="783" y="342" class="font-kr" font-size="11" fill="#7d4e00" text-anchor="middle">▶ 감속 보조 요청 판단</text>
  <text x="783" y="360" class="font-kr" font-size="10" fill="#856404" text-anchor="middle">decelAssistReq → Hysteresis</text>

  <!-- ===== OUTPUT ===== -->
  <rect x="904" y="136" width="180" height="250" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <rect x="904" y="136" width="180" height="28" rx="10" fill="#27ae60"/>
  <rect x="904" y="154" width="180" height="10" fill="#27ae60"/>
  <text x="994" y="156" class="font-en" font-size="12" fill="#fff" text-anchor="middle">publishWarning()</text>

  <text x="994" y="188" class="font-kr" font-size="11" fill="#145a32" font-weight="700" text-anchor="middle">ethSelectedAlertMsg</text>
  <text x="994" y="206" class="font-kr" font-size="10" fill="#1e8449" text-anchor="middle">→ CGW → BCM / CLU / HUD / AMP</text>
  <line x1="924" y1="212" x2="1064" y2="212" stroke="#27ae60" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="994" y="232" class="font-kr" font-size="11" fill="#145a32" font-weight="700" text-anchor="middle">Ambient 채널</text>
  <text x="994" y="250" class="font-kr" font-size="10" fill="#1e8449" text-anchor="middle">색상 · 패턴 · 강조 모드</text>
  <line x1="924" y1="256" x2="1064" y2="256" stroke="#27ae60" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="994" y="276" class="font-kr" font-size="11" fill="#145a32" font-weight="700" text-anchor="middle">Cluster / HUD 채널</text>
  <text x="994" y="294" class="font-kr" font-size="10" fill="#1e8449" text-anchor="middle">경고 문구 · 방향 · 팝업</text>
  <line x1="924" y1="300" x2="1064" y2="300" stroke="#27ae60" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="994" y="320" class="font-kr" font-size="11" fill="#145a32" font-weight="700" text-anchor="middle">Audio 채널</text>
  <text x="994" y="338" class="font-kr" font-size="10" fill="#1e8449" text-anchor="middle">포커스 · 감쇄 정책</text>
  <line x1="924" y1="344" x2="1064" y2="344" stroke="#27ae60" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="994" y="364" class="font-kr" font-size="11" fill="#145a32" font-weight="700" text-anchor="middle">감속 보조 요청</text>
  <text x="994" y="380" class="font-kr" font-size="10" fill="#1e8449" text-anchor="middle">decelAssistReq → ESC</text>

  <!-- Arrows 4→5 -->
  <line x1="878" y1="260" x2="904" y2="260" stroke="#1e8449" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- ===== HYSTERESIS ===== -->
  <rect x="1110" y="136" width="140" height="250" rx="10" fill="#fdedec" stroke="#c0392b" stroke-width="2"/>
  <rect x="1110" y="136" width="140" height="28" rx="10" fill="#c0392b"/>
  <rect x="1110" y="154" width="140" height="10" fill="#c0392b"/>
  <text x="1180" y="156" class="font-en" font-size="11" fill="#fff" text-anchor="middle">Hysteresis</text>

  <text x="1180" y="186" class="font-kr" font-size="11" fill="#922b21" font-weight="700" text-anchor="middle">ON 조건</text>
  <text x="1180" y="204" class="font-en" font-size="10" fill="#7b241c" text-anchor="middle">R_t ≥ T_on</text>
  <line x1="1122" y1="210" x2="1248" y2="210" stroke="#c0392b" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="1180" y="230" class="font-kr" font-size="11" fill="#922b21" font-weight="700" text-anchor="middle">OFF 조건</text>
  <text x="1180" y="248" class="font-en" font-size="10" fill="#7b241c" text-anchor="middle">R_t ≤ T_off</text>
  <line x1="1122" y1="254" x2="1248" y2="254" stroke="#c0392b" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="1180" y="274" class="font-kr" font-size="11" fill="#922b21" font-weight="700" text-anchor="middle">중간 구간</text>
  <text x="1180" y="292" class="font-kr" font-size="10" fill="#7b241c" text-anchor="middle">이전 상태 유지</text>
  <text x="1180" y="310" class="font-kr" font-size="10" fill="#7b241c" text-anchor="middle">On/Off 흔들림 방지</text>
  <line x1="1122" y1="316" x2="1248" y2="316" stroke="#c0392b" stroke-width="0.8" stroke-dasharray="4,3"/>

  <text x="1180" y="340" class="font-kr" font-size="10" fill="#7b241c" text-anchor="middle">교차로·합류구간에서</text>
  <text x="1180" y="358" class="font-kr" font-size="10" fill="#7b241c" text-anchor="middle">불필요한 감속 반복 차단</text>

  <!-- Arrow 5→6 -->
  <line x1="1084" y1="330" x2="1110" y2="330" stroke="#c0392b" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="1097" y="324" class="font-en" font-size="9" fill="#c0392b" text-anchor="middle">decelReq</text>

  <!-- ===== CAPL CODE HINT ===== -->
  <rect x="30" y="420" width="1220" height="136" rx="10" fill="#1e2328" stroke="#444" stroke-width="1.5"/>
  <text x="52" y="443" class="font-en" font-size="11" fill="#6aaf6a">// ADAS.capl — 핵심 구조 요약 (의사 코드)</text>
  <text x="52" y="462" class="font-en" font-size="11" fill="#8be0f7">on message</text>
  <text x="140" y="462" class="font-en" font-size="11" fill="#c8d8e8"> ethActiveEvent { activeEvent = this; setTimer(t_adas_arbitration, 50); }</text>
  <text x="52" y="480" class="font-en" font-size="11" fill="#8be0f7">on timer</text>
  <text x="120" y="480" class="font-en" font-size="11" fill="#c8d8e8"> t_adas_arbitration {</text>
  <text x="52" y="498" class="font-en" font-size="11" fill="#c8d8e8">  R_emg = 0.55*calcEtaScore() + calcSpeedScore() + calcDirScore() + typeBias;</text>
  <text x="52" y="516" class="font-en" font-size="11" fill="#c8d8e8">  R_obj = calcBaseRisk(TTC) + rangeBias + confidenceBias + scenarioBias;</text>
  <text x="52" y="534" class="font-en" font-size="11" fill="#c8d8e8">  R_t   = max(R_emg, R_obj);   </text>
  <text x="330" y="534" class="font-en" font-size="11" fill="#6aaf6a">// 최종 위험도: 긴급 vs 객체 중 높은 쪽</text>
  <text x="52" y="552" class="font-en" font-size="11" fill="#c8d8e8">  if (R_t &gt;= T_on &amp;&amp; !decelOn) { decelOn = 1; } }</text>
  <text x="520" y="552" class="font-en" font-size="11" fill="#6aaf6a">// Hysteresis ON</text>

  <!-- ===== BOTTOM SUMMARY ===== -->
  <rect x="30" y="572" width="1220" height="50" rx="10" fill="#eaf2ff" stroke="#2e86c1" stroke-width="1.5"/>
  <text x="640" y="593" class="font-kr" font-size="13" font-weight="700" fill="#1a5276" text-anchor="middle">설계 원칙</text>
  <text x="640" y="613" class="font-kr" font-size="12" fill="#2c3e50" text-anchor="middle">ADAS는 단순 위험 계산기가 아니라 V2X 정규화 결과와 객체 TTC 위험을 R_t = max(R_emg, R_obj)로 통합하고, Hysteresis로 안정화하여 단일 경고 정책으로 수렴시키는 중재 계층이다.</text>

  <!-- ===== FAIL-SAFE NOTE ===== -->
  <rect x="30" y="636" width="580" height="66" rx="8" fill="#f4f6f7" stroke="#808b96" stroke-width="1.5"/>
  <text x="50" y="658" class="font-kr" font-size="12" font-weight="700" fill="#2c3e50">복귀 규칙 (fail-safe)</text>
  <text x="50" y="678" class="font-kr" font-size="11" fill="#555">전달 경계 이상 감지 시 → CGW: warningPathStatus / failSafeMode 발행</text>
  <text x="50" y="695" class="font-kr" font-size="11" fill="#555">정상 복구 시 → 최소 경고 해제 → effective alert 경로 복귀</text>

  <rect x="640" y="636" width="610" height="66" rx="8" fill="#f4f6f7" stroke="#808b96" stroke-width="1.5"/>
  <text x="660" y="658" class="font-kr" font-size="12" font-weight="700" fill="#2c3e50">추적성 (Traceability)</text>
