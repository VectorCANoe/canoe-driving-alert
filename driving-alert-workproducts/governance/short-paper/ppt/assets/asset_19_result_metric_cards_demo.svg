<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="640" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#222">핵심 정량 결과 지표</text>
  <text x="640" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555">정량 결과 요약</text>

  <rect x="90" y="152" width="330" height="368" rx="12" fill="#fafafa" stroke="#666" stroke-width="2"/>
  <text x="255" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#222">N1</text>
  <text x="255" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#222">V2X 긴급 이벤트 선택 정확도</text>
  <text x="255" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#111">95.7 %</text>
  <text x="255" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">정상 선택 시나리오 수 / 전체 V2X 선택 시나리오 수</text>
  <text x="255" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#444">대표 시험: IT_006, ST_016, ST_017</text>
  <text x="255" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">유형 &gt; ETA &gt; SourceID 규칙 준수율</text>

  <rect x="475" y="152" width="330" height="368" rx="12" fill="#fcfcfc" stroke="#666" stroke-width="2"/>
  <text x="640" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#222">N2</text>
  <text x="640" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#222">교차로·합류구간 통합 경고 성공률</text>
  <text x="640" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#111">90.8 %</text>
  <text x="640" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">정상 통합 경고 시나리오 수 / 전체 교차로·합류 시나리오 수</text>
  <text x="640" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#444">대표 시험: IT_018, ST_022, ST_023</text>
  <text x="640" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">긴급 접근 정보와 TTC 기반 위험의 단일 경고 수렴율</text>

  <rect x="860" y="152" width="330" height="368" rx="12" fill="#ffffff" stroke="#666" stroke-width="2"/>
  <text x="1025" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#222">N3</text>
  <text x="1025" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#222">복귀 안정성 준수율</text>
  <text x="1025" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#111">93.9 %</text>
  <text x="1025" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">정상 복귀 시나리오 수 / 전체 복귀 시나리오 수</text>
  <text x="1025" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#444">대표 시험: IT_009, ST_035, ST_036, ST_045, ST_046</text>
  <text x="1025" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#666">timeout clear, fail-safe, 정상 복귀 기준 준수율</text>

  <rect x="110" y="566" width="1060" height="86" rx="10" fill="#f7f7f7" stroke="#888" stroke-width="1.5"/>
  <text x="140" y="598" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#333">결과 집계 기준</text>
  <text x="140" y="624" font-family="Arial, sans-serif" font-size="14" fill="#444">V2X 선택, 통합 경고, 복귀 안정성 시나리오의 verdict 집계 기준으로 정리</text>
</svg>
