<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="640" y="60" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700">Automation and Result Aggregation Pipeline</text>
  <text x="640" y="95" text-anchor="middle" font-family="Arial" font-size="16" fill="#555">The product is already built; the next step is repeated execution, controlled variation, and metric stabilization.</text>

  <rect x="80" y="250" width="180" height="110" rx="12" fill="#fafafa" stroke="#777" stroke-width="2"/>
  <text x="170" y="300" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700">CANoe Run</text>
  <text x="170" y="332" text-anchor="middle" font-family="Arial" font-size="18">Test / Trace / Report</text>

  <rect x="310" y="250" width="180" height="110" rx="12" fill="#fafafa" stroke="#777" stroke-width="2"/>
  <text x="400" y="300" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700">XML Export</text>
  <text x="400" y="332" text-anchor="middle" font-family="Arial" font-size="18">Structured Result Data</text>

  <rect x="540" y="250" width="200" height="110" rx="12" fill="#fcfcfc" stroke="#777" stroke-width="2"/>
  <text x="640" y="300" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700">Aggregation</text>
  <text x="640" y="332" text-anchor="middle" font-family="Arial" font-size="18">Scenario / KPI / Verdict</text>

  <rect x="790" y="250" width="180" height="110" rx="12" fill="#fcfcfc" stroke="#777" stroke-width="2"/>
  <text x="880" y="300" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700">CLI Console</text>
  <text x="880" y="332" text-anchor="middle" font-family="Arial" font-size="18">Run / Review / Closeout</text>

  <rect x="1020" y="250" width="180" height="110" rx="12" fill="#ffffff" stroke="#777" stroke-width="2"/>
  <text x="1110" y="300" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700">Result Use</text>
  <text x="1110" y="332" text-anchor="middle" font-family="Arial" font-size="18">Repeat / Compare / Stabilize</text>

  <line x1="260" y1="305" x2="310" y2="305" stroke="#666" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="490" y1="305" x2="540" y2="305" stroke="#666" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="740" y1="305" x2="790" y2="305" stroke="#666" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="970" y1="305" x2="1020" y2="305" stroke="#666" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="220" y="480" width="840" height="120" rx="12" fill="#fcfcfc" stroke="#888" stroke-width="2"/>
  <text x="640" y="528" text-anchor="middle" font-family="Arial" font-size="20">Controlled factors: speed, ETA, TTC, timeout, route context, ECU update before/after</text>
  <text x="640" y="565" text-anchor="middle" font-family="Arial" font-size="20">Output use: repeated trials, environment variation, statistical stabilization of N1/N2/N3</text>
</svg>
