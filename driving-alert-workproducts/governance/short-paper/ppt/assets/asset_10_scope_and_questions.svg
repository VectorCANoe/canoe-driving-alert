<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#fff"/>
  <text x="640" y="58" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700">Scope and Core Questions</text>
  <rect x="90" y="150" width="470" height="420" rx="14" fill="#fafafa" stroke="#777" stroke-width="2"/>
  <text x="325" y="200" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700">Project Scope</text>
  <text x="150" y="260" font-family="Arial" font-size="20">• Vehicle state, route context, emergency ingress</text>
  <text x="150" y="300" font-family="Arial" font-size="20">• TTC-based object risk</text>
  <text x="150" y="340" font-family="Arial" font-size="20">• CANoe SIL, CAN + Ethernet, CAPL ECU logic</text>
  <text x="150" y="380" font-family="Arial" font-size="20">• Output surfaces and decel assist</text>
  <text x="150" y="450" font-family="Arial" font-size="20">Excluded:</text>
  <text x="180" y="490" font-family="Arial" font-size="18">• Physical hardware / HIL</text>
  <text x="180" y="522" font-family="Arial" font-size="18">• Commercial UDS stack / production timing guarantee</text>
  <rect x="700" y="150" width="490" height="420" rx="14" fill="#fcfcfc" stroke="#777" stroke-width="2"/>
  <text x="945" y="200" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700">Core Questions</text>
  <text x="770" y="280" font-family="Arial" font-size="22">1. Which warning should be finally selected?</text>
  <text x="770" y="350" font-family="Arial" font-size="22">2. When should the warning be safely cleared?</text>
  <text x="770" y="420" font-family="Arial" font-size="22">3. Do design, code, tests, and operation</text>
  <text x="800" y="455" font-family="Arial" font-size="22">share the same baseline?</text>
</svg>
