<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker></defs>
  <rect width="1280" height="720" fill="#fff"/>
  <text x="640" y="58" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700">Integrated Warning Concept</text>
  <text x="640" y="92" text-anchor="middle" font-family="Arial" font-size="16" fill="#555">Distributed contexts are interpreted by one policy and delivered through one coherent output meaning.</text>
  <rect x="80" y="230" width="240" height="170" rx="12" fill="#fafafa" stroke="#777" stroke-width="2"/>
  <text x="200" y="285" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700">Input Contexts</text>
  <text x="200" y="325" text-anchor="middle" font-family="Arial" font-size="18">Zone / emergency / object risk</text>
  <text x="200" y="356" text-anchor="middle" font-family="Arial" font-size="18">Vehicle state / route context</text>
  <rect x="470" y="210" width="340" height="210" rx="12" fill="#fcfcfc" stroke="#777" stroke-width="2"/>
  <text x="640" y="275" text-anchor="middle" font-family="Arial" font-size="26" font-weight="700">One Warning Policy</text>
  <text x="640" y="320" text-anchor="middle" font-family="Arial" font-size="18">V2X normalization</text>
  <text x="640" y="350" text-anchor="middle" font-family="Arial" font-size="18">ADAS risk calculation</text>
  <text x="640" y="380" text-anchor="middle" font-family="Arial" font-size="18">Alert arbitration and recovery</text>
  <rect x="960" y="230" width="240" height="170" rx="12" fill="#ffffff" stroke="#777" stroke-width="2"/>
  <text x="1080" y="285" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700">Output Surfaces</text>
  <text x="1080" y="325" text-anchor="middle" font-family="Arial" font-size="18">Ambient / cluster / HUD / audio</text>
  <text x="1080" y="356" text-anchor="middle" font-family="Arial" font-size="18">Decel assist request</text>
  <line x1="320" y1="315" x2="470" y2="315" stroke="#666" stroke-width="3" marker-end="url(#a)"/>
  <line x1="810" y1="315" x2="960" y2="315" stroke="#666" stroke-width="3" marker-end="url(#a)"/>
</svg>
