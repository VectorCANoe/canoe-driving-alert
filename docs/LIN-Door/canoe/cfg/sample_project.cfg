[Configuration]
; ============================================================
; sample_project.cfg — CANoe Configuration File
; 프로젝트: CANoe IVI OTA — Fault Detection → Gateway → UDS → OTA
; 생성일: 2026-02-19
; CANoe 버전: 17.0 이상 권장
; ============================================================

; ----------------------------------------------------------
; 프로젝트 정보
; ----------------------------------------------------------
[ProjectInfo]
Name=CANoe IVI OTA Sample Project
Version=1.0
Description=Fault Detection → Gateway Routing → UDS Diagnostics → OTA Update E2E 검증
Author=PBL Team
Date=2026-02-19

; ----------------------------------------------------------
; 네트워크 채널 설정
; ----------------------------------------------------------
[Networks]
; CAN-LS: BCM, Gateway (수신), Tester, OTA_Server — 125kbps
Network1=CAN-LS
Network1_Bitrate=125000
Network1_Nodes=BCM,CGW,Tester,OTA_Server

; CAN-HS: Gateway (송신), Cluster — 500kbps
Network2=CAN-HS
Network2_Bitrate=500000
Network2_Nodes=CGW,Cluster

; Ethernet: DoIP (OTA Server ↔ Gateway)
Network3=Ethernet_DoIP
Network3_Type=Ethernet
Network3_Nodes=OTA_Server,CGW

; ----------------------------------------------------------
; DBC 데이터베이스 연결
; ----------------------------------------------------------
[Databases]
DB1=databases/sample_project.dbc
DB1_Network=CAN-LS
DB2=databases/sample_project.dbc
DB2_Network=CAN-HS

; ----------------------------------------------------------
; CAPL 노드 연결
; ----------------------------------------------------------
[Nodes]
; BCM — CAN-LS 채널
Node1_Name=BCM
Node1_File=nodes/BCM.can
Node1_Network=CAN-LS

; Gateway — CAN-LS(수신) + CAN-HS(송신) 브리지
Node2_Name=CGW
Node2_File=nodes/Gateway.can
Node2_Network=CAN-LS,CAN-HS

; Tester — CAN-LS 채널 (UDS 요청)
Node3_Name=Tester
Node3_File=nodes/Tester.can
Node3_Network=CAN-LS

; OTA Server — Ethernet(DoIP) + CAN-LS(UDS)
Node4_Name=OTA_Server
Node4_File=nodes/OTA_Server.can
Node4_Network=CAN-LS,Ethernet_DoIP

; Cluster — CAN-HS 채널 (경고등 수신)
Node5_Name=Cluster
Node5_File=nodes/Cluster.can
Node5_Network=CAN-HS

; ----------------------------------------------------------
; System Variables 정의
; ----------------------------------------------------------
[SystemVariables]
; BCM 관련
SysVar1=BCM::overcurrentDetected  Type=uint32  Init=0  Min=0  Max=1
SysVar2=BCM::faultActive          Type=uint32  Init=0  Min=0  Max=1
SysVar3=BCM::currentAmps          Type=double  Init=0  Min=0  Max=100

; Gateway 관련
SysVar4=Gateway::routingActive    Type=uint32  Init=0  Min=0  Max=1
SysVar5=Gateway::routingDelayMs   Type=double  Init=0  Min=0  Max=100
SysVar6=Gateway::doipSessionActive Type=uint32 Init=0  Min=0  Max=1
SysVar7=Gateway::busOffDetected   Type=uint32  Init=0  Min=0  Max=1

; UDS 관련
SysVar8=UDS::currentSession       Type=uint32  Init=1  Min=1  Max=3
SysVar9=UDS::lastServiceID        Type=uint32  Init=0  Min=0  Max=255
SysVar10=UDS::lastResponseCode    Type=uint32  Init=0  Min=0  Max=255
SysVar11=UDS::dtcCleared          Type=uint32  Init=0  Min=0  Max=1

; OTA 관련
SysVar12=OTA::otaInProgress       Type=uint32  Init=0  Min=0  Max=1
SysVar13=OTA::blockSequenceCounter Type=uint32 Init=0  Min=0  Max=255
SysVar14=OTA::crcMatch            Type=uint32  Init=0  Min=0  Max=1
SysVar15=OTA::rollbackTriggered   Type=uint32  Init=0  Min=0  Max=1

; Cluster 관련
SysVar16=Cluster::warnLampRed     Type=uint32  Init=0  Min=0  Max=1

; ----------------------------------------------------------
; Panel 설정 (CANoe Desktop Panel)
; ----------------------------------------------------------
[Panels]
; Fault Injection Panel
Panel1_Name=Fault_Injection
Panel1_Controls=BCM::overcurrentDetected(Switch),BCM::faultActive(Indicator),BCM::currentAmps(Numeric)

; UDS Control Panel
Panel2_Name=UDS_Control
Panel2_Controls=UDS::lastServiceID(Switch),UDS::currentSession(Indicator),UDS::lastResponseCode(Indicator),UDS::dtcCleared(Indicator)

; OTA Control Panel
Panel3_Name=OTA_Control
Panel3_Controls=OTA::otaInProgress(Switch),OTA::blockSequenceCounter(Numeric),OTA::crcMatch(Indicator),OTA::rollbackTriggered(Indicator)

; Status Panel
Panel4_Name=System_Status
Panel4_Controls=Gateway::routingActive(Indicator),Gateway::routingDelayMs(Numeric),Gateway::doipSessionActive(Indicator),Gateway::busOffDetected(Indicator),Cluster::warnLampRed(Indicator)

; ----------------------------------------------------------
; 측정 설정 (Logging)
; ----------------------------------------------------------
[Logging]
LogFile=logging/sample_project_%Y%m%d_%H%M%S.blf
LogFormat=BLF
LogTrigger=Start
LogChannels=CAN-LS,CAN-HS

; ----------------------------------------------------------
; 테스트 모듈 연결
; ----------------------------------------------------------
[TestModules]
TM1=../test_modules/TC_F_Fault_Detection
TM2=../test_modules/TC_G_Gateway_Routing
TM3=../test_modules/TC_D_UDS_Diagnostics
TM4=../test_modules/TC_O_OTA_Programming
TM5=../test_modules/TC_E2E_Master_Scenario
