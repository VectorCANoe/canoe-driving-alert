<?xml version="1.0" encoding="utf-8"?>
<CANoeConfiguration Version="17.0">
  <General>
    <Name>Emergency Alert System — V2V 긴급차량 + 구간 인식 앰비언트</Name>
    <Author>Hyundai Mobis Bootcamp — Sunghyun</Author>
    <Description>
      SDV 기반 차량 경험 플랫폼 — 특화층 D (성현 파트)

      주행상황 연동 실시간 경고 시스템:
        - 구간 인식 (스쿨존 / 고속도로 / IC출구): Context_Manager → Vehicle_Context CAN
        - V2V 긴급차량 감지 (경찰차 / 구급차): Police_Node + Ambulance_Node → sysvar 브로드캐스트
        - Alert Arbiter 우선순위 중재: Civ_Node → Ambient_Control + Cluster_Warning CAN
        - 앰비언트 패턴 실행 (RGB 타이머): Ambient_ECU → sysvar R/G/B_Value
        - 클러스터 경고 문구 표시: Cluster_ECU

      Alert Arbiter 우선순위:
        1순위: Ambulance_Active == 1  → RED/WHITE 150ms 교차 점멸 (Req_029)
        2순위: Police_Active == 1     → RED/BLUE  150ms 교차 점멸
        3순위: WarningLevel > 0       → SCHOOL_WARN (RED 200ms) / HWY_ALERT (ORANGE 500ms)
        4순위: gRoadZone 기본 앰비언트 → NORMAL / SCHOOL_AMB / IC_LEFT / IC_RIGHT
    </Description>
    <Version>1.0.0</Version>
    <Date>2026-02-25</Date>
  </General>

  <!-- ============================================================
       데이터베이스
       ============================================================ -->
  <Databases>
    <Database>
      <Path>..\databases\emergency_system.dbc</Path>
      <Type>CAN</Type>
      <Channel>1</Channel>
      <Enabled>1</Enabled>
      <Description>
        CAN 메시지 정의:
          0x100  Vehicle_Context   (10ms, Context_Manager 송신)
          0x220  Ambient_Control   (이벤트, Civ_Node 송신)
          0x221  Cluster_Warning   (이벤트, Civ_Node 송신)
      </Description>
    </Database>
  </Databases>

  <!-- ============================================================
       System Variables
       CANoe: File > Load System Variables > cfg/project.sysvars
       ============================================================ -->
  <SystemVariablesFile>
    <Path>..\cfg\project.sysvars</Path>
    <Description>
      Namespaces:
        Navigation:: — gRoadZone, gVehicleSpeed, gSteeringInput, gNavDirection, gWarningLevel
        V2V::        — Police_Active/Direction/ETA, Ambulance_Active/Direction/ETA
        Arbiter::    — gArbiterMode, gAmbientPattern, gEmergencyType, gWarningLevel
        Ambient::    — R_Value, G_Value, B_Value, BlinkState, AnimStep
    </Description>
  </SystemVariablesFile>

  <!-- ============================================================
       네트워크 (단일 CAN-HS 500kbps)
       ============================================================ -->
  <Simulation>
    <Networks>
      <Network>
        <Name>CAN1</Name>
        <Type>CAN</Type>
        <Baudrate>500000</Baudrate>
        <Channel>1</Channel>
        <Description>CAN-HS 500kbps — 모든 내부 노드 단일 버스</Description>
        <FDEnabled>0</FDEnabled>
      </Network>
      <!-- Ethernet V2V는 sysvar 경유 시뮬. 별도 Ethernet 채널 불필요.
           실제 배포 시: UdpSocket::SendTo("255.255.255.255", 5000) 로 대체. -->
    </Networks>

    <!-- ============================================================
         노드 목록 (6개)
         모두 CAN1 연결. Ethernet은 sysvar 이벤트로 시뮬.
         ============================================================ -->
    <Nodes>

      <!-- 1. 구간 인식 + Vehicle_Context 브로드캐스트 (10ms) -->
      <Node>
        <Name>Context_Manager</Name>
        <FullName>Context Manager — Road Zone &amp; Warning Evaluator</FullName>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\Context_Manager.can</CAPLFile>
        <Description>
          Panel sysvar (Navigation::) 수신 → 경고 조건 평가 → Vehicle_Context CAN (0x100) 10ms 주기 브로드캐스트.
          gRoadZone 4단계: 0=일반(80) 1=스쿨존(30) 2=고속도로(110) 3=IC출구근접.
          고속도로 조향 없음 10초 → WarningLevel=1 (Req_011).
        </Description>
      </Node>

      <!-- 2. V2V 경찰차 긴급 출동 시뮬 (ETH 브로드캐스트 → sysvar) -->
      <Node>
        <Name>Police_Node</Name>
        <FullName>Police Vehicle — V2V Emergency Broadcaster</FullName>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\Police_Node.can</CAPLFile>
        <Description>
          Panel [긴급 출동] 버튼 → V2V::Police_Active=1 → 500ms keepAlive 브로드캐스트 시뮬.
          Civ_Node가 on sysvar V2V::Police_Active 이벤트로 수신.
        </Description>
      </Node>

      <!-- 3. V2V 구급차 긴급 출동 시뮬 (ETH 브로드캐스트 → sysvar) -->
      <Node>
        <Name>Ambulance_Node</Name>
        <FullName>Ambulance Vehicle — V2V Emergency Broadcaster (최고 우선순위)</FullName>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\Ambulance_Node.can</CAPLFile>
        <Description>
          Panel [긴급 출동] 버튼 → V2V::Ambulance_Active=1 → 500ms keepAlive 브로드캐스트 시뮬.
          우선순위 최고: Ambulance > Police (Req_029).
        </Description>
      </Node>

      <!-- 4. 수신 차량 — Alert Arbiter 핵심 로직 (주노드) -->
      <Node>
        <Name>Civ_Node</Name>
        <FullName>Civilian Vehicle — Alert Arbiter (CORE NODE)</FullName>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\Civ_Node.can</CAPLFile>
        <Description>
          Vehicle_Context CAN 수신 + V2V sysvar 수신 → runArbiter() 우선순위 중재.
          결과: Ambient_Control CAN (0x220) + Cluster_Warning CAN (0x221) 송신.
          Ambulance(1순위) > Police(2순위) > ZoneWarn(3순위) > Base(4순위).
          Req_025~034 중재 요구사항 전체 구현.
        </Description>
        <Priority>High</Priority>
      </Node>

      <!-- 5. 앰비언트 패턴 실행 (RGB 타이머/애니메이션) -->
      <Node>
        <Name>Ambient_ECU</Name>
        <FullName>Ambient Light ECU — Pattern Executor</FullName>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\Ambient_ECU.can</CAPLFile>
        <Description>
          Ambient_Control CAN (0x220) 수신 → 패턴별 타이머/RGB 실행.
          tBlink(150/200ms): POLICE/AMBULANCE/SCHOOL_WARN 점멸.
          tPulse(500/800ms): HWY_ALERT/SCHOOL_AMB 파동.
          tIcAnim(400ms):   IC 출구 방향 유도 (초록→분홍→빨강).
          @Ambient::R/G/B_Value → Panel LED 인디케이터 실시간 반영.
        </Description>
      </Node>

      <!-- 6. 클러스터 경고 문구 표시 -->
      <Node>
        <Name>Cluster_ECU</Name>
        <FullName>Instrument Cluster ECU — Warning Display</FullName>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\Cluster_ECU.can</CAPLFile>
        <Description>
          Cluster_Warning CAN (0x221) 수신 → 경고 종류별 텍스트 출력.
          긴급차량: 차종 + 방향 + 양보 유도 문구 (Req_019~021).
          구간 경고: 제한속도 / 조향 확인 / IC 안내 문구.
        </Description>
      </Node>

    </Nodes>
  </Simulation>

  <!-- ============================================================
       로깅
       ============================================================ -->
  <Logging>
    <LogFile>
      <Name>emergency_system.blf</Name>
      <Path>..\logs</Path>
      <Enabled>1</Enabled>
      <TriggerMode>Auto</TriggerMode>
      <Description>CAN 메시지 로그 (BLF 형식) — Trace 창과 병행</Description>
    </LogFile>
  </Logging>

  <!-- ============================================================
       패널 구성 가이드 (CANoe Panel Editor)
       Panel Editor에서 직접 배치 필요 — cfg로 자동 생성 불가
       ============================================================ -->
  <Comments>
    ================================================================
    패널 구성 방법 (CANoe Panel Editor 수동 설정):
    ================================================================

    [Navigation 그룹] — Context_Manager 제어
      버튼 4개:
        [일반도로]  → Navigation::gRoadZone = 0
        [스쿨존]    → Navigation::gRoadZone = 1
        [고속도로]  → Navigation::gRoadZone = 2
        [IC출구]    → Navigation::gRoadZone = 3
      TrackBar:
        차속 (0~150 km/h) → Navigation::gVehicleSpeed
      버튼:
        [조향 있음/없음] 토글 → Navigation::gSteeringInput (0/1)
        [좌측출구/우측출구] → Navigation::gNavDirection (0/1)

    [V2V 그룹] — 긴급차량 시뮬
      버튼:
        [경찰차 출동] → V2V::Police_Active = 1
        [경찰차 해제] → V2V::Police_Active = 0
        [구급차 출동] → V2V::Ambulance_Active = 1
        [구급차 해제] → V2V::Ambulance_Active = 0
      TrackBar:
        경찰차 ETA (0~999s) → V2V::Police_ETA
        구급차 ETA (0~999s) → V2V::Ambulance_ETA
      DropDown:
        경찰차 방향 (0=전방 1=좌 2=우 3=후) → V2V::Police_Direction
        구급차 방향                           → V2V::Ambulance_Direction

    [Arbiter 상태] — Civ_Node 기록 (읽기 전용)
      Text: Arbiter::gArbiterMode   (0~3)
      Text: Arbiter::gAmbientPattern (0~8)
      Text: Arbiter::gEmergencyType  (0~2)

    [Ambient LED] — Ambient_ECU 출력 (읽기 전용)
      LED R: Ambient::R_Value (0~255)
      LED G: Ambient::G_Value (0~255)
      LED B: Ambient::B_Value (0~255)
      Text:  Ambient::BlinkState / AnimStep

    ================================================================
    CANoe 프로젝트 로드 순서:
    ================================================================
      1. File > New Configuration
      2. Database 탭 → emergency_system.dbc 로드 (Channel 1)
      3. System Variables → project.sysvars 로드
      4. Nodes 탭 → nodes/*.can 파일 6개 추가 (모두 CAN1 연결)
      5. Panel Editor → 위 패널 구성 참고하여 배치
      6. F9 (Start) → Trace 창에서 0x100/0x220/0x221 메시지 확인

    ================================================================
    시뮬레이션 검증 체크리스트:
    ================================================================
      [ ] [스쿨존] 버튼 → 차속 35 km/h → SCHOOL_WARN (RED 200ms 점멸)
      [ ] [경찰차 출동] → RED/BLUE 150ms 교차 점멸
      [ ] [구급차 출동] → RED/WHITE 150ms 교차 점멸 (경찰차보다 우선)
      [ ] [경찰차 해제] → 구급차 패턴 유지 (Arbiter 강등 없음)
      [ ] [구급차 해제] → 구간 기본 앰비언트 복귀
      [ ] [IC출구] + 좌측출구 → 초록→분홍→빨강 400ms 순환
  </Comments>

</CANoeConfiguration>
