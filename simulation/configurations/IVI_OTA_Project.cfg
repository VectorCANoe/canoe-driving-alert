<?xml version="1.0" encoding="utf-8"?>
<CANoeConfiguration Version="19.0">
  <General>
    <Name>IVI-OTA Project - Ambient Lighting & UDS Diagnostics</Name>
    <Author>Hyundai Mobis Bootcamp with Vector Korea</Author>
    <Description>
      IVI-based control system simulation with ambient lighting, HVAC control,
      ADAS integration, and virtual diagnostics with OTA capability.

      Features:
      - IVI Ambient Lighting Control (RGB + 11 Themes)
      - UX Lighting with ADAS Event Coordination
      - HVAC/Window/Seat Control Simulation
      - Reverse Parking Detection
      - UDS-based Diagnostics
      - Virtual OTA via vVIRTUALtarget
    </Description>
    <Version>1.0.0</Version>
    <Date>2026-02-12</Date>
  </General>

  <Databases>
    <Database>
      <Path>..\databases\vehicle_system.dbc</Path>
      <Type>CAN</Type>
      <Enabled>1</Enabled>
    </Database>
  </Databases>

  <Simulation>
    <Networks>
      <!-- CAN-HS #1 (500 kbps) - Powertrain, Chassis, Safety -->
      <Network>
        <Name>CAN1</Name>
        <Type>CAN</Type>
        <Baudrate>500000</Baudrate>
        <Channel>1</Channel>
        <Description>CAN-HS #1 - Safety-Critical Network (ASIL-D)</Description>
        <FDEnabled>0</FDEnabled>
      </Network>

      <!-- CAN-HS #2 (500 kbps) - ADAS, Infotainment -->
      <Network>
        <Name>CAN2</Name>
        <Type>CAN</Type>
        <Baudrate>500000</Baudrate>
        <Channel>2</Channel>
        <Description>CAN-HS #2 - User Interface Network (IVI, ADAS)</Description>
        <FDEnabled>0</FDEnabled>
      </Network>

      <!-- CAN-LS (125 kbps) - Body Control -->
      <Network>
        <Name>CAN3</Name>
        <Type>CAN</Type>
        <Baudrate>125000</Baudrate>
        <Channel>3</Channel>
        <Description>CAN-LS - Comfort Network (Body Control)</Description>
        <FDEnabled>0</FDEnabled>
      </Network>
    </Networks>

    <Nodes>
      <!-- ========================================
           Powertrain Domain (CAN-HS #1)
           ======================================== -->
      <Node>
        <Name>EMS</Name>
        <FullName>Engine Management System</FullName>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\EMS.can</CAPLFile>
        <Description>Engine control, fuel injection, ignition timing</Description>
      </Node>

      <Node>
        <Name>TCU</Name>
        <FullName>Transmission Control Unit</FullName>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\TCU.can</CAPLFile>
        <Description>Gear shifting and torque converter management</Description>
      </Node>

      <!-- ========================================
           Chassis Domain (CAN-HS #1)
           ======================================== -->
      <Node>
        <Name>ESP</Name>
        <FullName>Electronic Stability Program</FullName>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\ESP.can</CAPLFile>
        <Description>ABS, TCS, ESC, vehicle dynamics control</Description>
      </Node>

      <Node>
        <Name>MDPS</Name>
        <FullName>Motor Driven Power Steering</FullName>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\MDPS.can</CAPLFile>
        <Description>Electric power steering with LKA actuation</Description>
      </Node>

      <!-- ========================================
           ADAS Domain (CAN-HS #2)
           ======================================== -->
      <Node>
        <Name>Camera</Name>
        <FullName>Front Camera ECU</FullName>
        <Network>CAN2</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\Camera.can</CAPLFile>
        <Description>LDW, AEB, FCW, traffic sign recognition</Description>
      </Node>

      <Node>
        <Name>Rear_Camera</Name>
        <FullName>Rear Camera ECU</FullName>
        <Network>CAN2</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\Rear_Camera.can</CAPLFile>
        <Description>Rear object detection, parking assistance</Description>
      </Node>

      <Node>
        <Name>Radar</Name>
        <FullName>Blind Spot Detection Radar</FullName>
        <Network>CAN2</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\Radar.can</CAPLFile>
        <Description>BSD, RCTA, blind spot monitoring</Description>
      </Node>

      <Node>
        <Name>SCC</Name>
        <FullName>Smart Cruise Control</FullName>
        <Network>CAN2</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\SCC.can</CAPLFile>
        <Description>Adaptive cruise control, speed limit assist</Description>
      </Node>

      <!-- ========================================
           Infotainment Domain (CAN-HS #2)
           ======================================== -->
      <Node>
        <Name>IVI</Name>
        <FullName>In-Vehicle Infotainment</FullName>
        <Network>CAN2</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\IVI.can</CAPLFile>
        <Description>PROJECT MAIN NODE - Ambient lighting, multimedia, navigation</Description>
        <Priority>High</Priority>
      </Node>

      <Node>
        <Name>Cluster</Name>
        <FullName>Instrument Cluster</FullName>
        <Network>CAN2</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\Cluster.can</CAPLFile>
        <Description>Speedometer, tachometer, warning lights, ADAS status</Description>
      </Node>

      <!-- ========================================
           Body Domain (CAN-LS)
           ======================================== -->
      <Node>
        <Name>BCM</Name>
        <FullName>Body Control Module</FullName>
        <Network>CAN3</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\BCM.can</CAPLFile>
        <Description>PROJECT MAIN NODE - Lighting control, door locks, sensors</Description>
        <Priority>High</Priority>
      </Node>

      <Node>
        <Name>HVAC</Name>
        <FullName>HVAC Control Unit</FullName>
        <Network>CAN3</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\HVAC.can</CAPLFile>
        <Description>Climate control, cabin temperature management</Description>
      </Node>

      <!-- ========================================
           Gateway (All Networks)
           ======================================== -->
      <Node>
        <Name>CGW</Name>
        <FullName>Central Gateway</FullName>
        <Network>CAN1</Network>
        <Type>Simulated</Type>
        <CAPLFile>..\nodes\CGW.can</CAPLFile>
        <Description>PROJECT MAIN NODE - Network routing, diagnostics, OTA coordination</Description>
        <Priority>Critical</Priority>
        <AdditionalNetworks>
          <Network>CAN2</Network>
          <Network>CAN3</Network>
        </AdditionalNetworks>
      </Node>
    </Nodes>

    <EnvironmentVariables>
      <!-- Project Configuration -->
      <EnvVar Name="ProjectMode" Type="int" InitValue="0" Description="0=Dev, 1=Test, 2=Production"/>
      <EnvVar Name="SimulationSpeed" Type="float" InitValue="1.0" Description="Simulation speed multiplier"/>

      <!-- IVI Ambient Lighting Control -->
      <EnvVar Name="IVI_Theme_Selected" Type="int" InitValue="0" Description="Current theme (0-10)"/>
      <EnvVar Name="IVI_Brightness" Type="int" InitValue="50" Description="Brightness 0-100%"/>
      <EnvVar Name="IVI_RGB_R" Type="int" InitValue="255" Description="Red 0-255"/>
      <EnvVar Name="IVI_RGB_G" Type="int" InitValue="255" Description="Green 0-255"/>
      <EnvVar Name="IVI_RGB_B" Type="int" InitValue="255" Description="Blue 0-255"/>

      <!-- Vehicle State -->
      <EnvVar Name="Vehicle_Speed" Type="float" InitValue="0.0" Description="Current speed km/h"/>
      <EnvVar Name="Engine_RPM" Type="int" InitValue="0" Description="Engine RPM"/>
      <EnvVar Name="Gear_Position" Type="int" InitValue="0" Description="0=P, 1=R, 2=N, 3=D"/>

      <!-- ADAS Events -->
      <EnvVar Name="ADAS_LDW_Active" Type="int" InitValue="0" Description="Lane departure warning"/>
      <EnvVar Name="ADAS_AEB_Active" Type="int" InitValue="0" Description="Emergency braking"/>
      <EnvVar Name="ADAS_BSD_Left" Type="int" InitValue="0" Description="Blind spot left"/>
      <EnvVar Name="ADAS_BSD_Right" Type="int" InitValue="0" Description="Blind spot right"/>

      <!-- Diagnostics & OTA -->
      <EnvVar Name="UDS_Active" Type="int" InitValue="0" Description="UDS diagnostic active"/>
      <EnvVar Name="OTA_Active" Type="int" InitValue="0" Description="OTA update active"/>
      <EnvVar Name="DTC_Count" Type="int" InitValue="0" Description="Diagnostic trouble code count"/>
    </EnvironmentVariables>

    <SystemVariables>
      <!-- Network Statistics -->
      <SysVar Namespace="Network" Name="BusLoad_CAN1" Type="float" Description="CAN-HS #1 bus load %"/>
      <SysVar Namespace="Network" Name="BusLoad_CAN2" Type="float" Description="CAN-HS #2 bus load %"/>
      <SysVar Namespace="Network" Name="BusLoad_CAN3" Type="float" Description="CAN-LS bus load %"/>

      <!-- Simulation Control -->
      <SysVar Namespace="Simulation" Name="Time" Type="float" Description="Simulation time (s)"/>
      <SysVar Namespace="Simulation" Name="Running" Type="int" Description="Simulation running flag"/>
    </SystemVariables>
  </Simulation>

  <Logging>
    <LogFile>
      <Name>IVI_OTA_Project.blf</Name>
      <Path>..\logs</Path>
      <Enabled>1</Enabled>
      <TriggerMode>Auto</TriggerMode>
    </LogFile>
  </Logging>

  <TestSetup>
    <TestEnvironment>
      <Name>IVI_Ambient_Lighting_Tests</Name>
      <Path>..\tests\IVI_Ambient_Lighting</Path>
      <Description>Test cases for IVI ambient lighting control and theme switching</Description>
    </TestEnvironment>

    <TestEnvironment>
      <Name>ADAS_Integration_Tests</Name>
      <Path>..\tests\ADAS_Integration</Path>
      <Description>Test cases for ADAS event coordination with UX lighting</Description>
    </TestEnvironment>

    <TestEnvironment>
      <Name>UDS_Diagnostics_Tests</Name>
      <Path>..\tests\UDS_Diagnostics</Path>
      <Description>Test cases for UDS diagnostic services and DTC validation</Description>
    </TestEnvironment>
  </TestSetup>

  <Comments>
    Project: CANoe-IVI-OTA
    Organization: VectorCANoe (Hyundai Mobis Bootcamp)
    Partner: Vector Korea Co., Ltd.

    Phase 1: IVI-Based Control System Simulation
    - Ambient lighting with 11 theme packages
    - HVAC/Window/Seat CAPL simulation
    - UX lighting with ADAS event coordination
    - Reverse parking and lighting control

    Phase 2: Virtual Diagnostics & Reprogramming
    - Fault injection into BDC logic
    - UDS-based DTC generation and verification
    - Virtual OTA process via vVIRTUALtarget

    Network Architecture:
    - CAN-HS #1 (500 kbps): Powertrain, Chassis, Safety (ASIL-D)
    - CAN-HS #2 (500 kbps): ADAS, Infotainment (ASIL-B/QM)
    - CAN-LS (125 kbps): Body Control (QM)

    Total: 13 ECUs, 20 CAN messages, 3 networks
  </Comments>
</CANoeConfiguration>
