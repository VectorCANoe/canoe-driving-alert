site_name: CANoe Test Verification Console
site_description: Dev2 verification console documentation
site_dir: site
use_directory_urls: true

docs_dir: docs-src

theme:
  name: material
  language: ko
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - 소개: index.md
  - 빠른 시작: quickstart.md
  - 명령 가이드: commands.md
  - 결과 해석: results.md
  - CI / Jenkins 연계: ci-bridge.md
  - 패키징 계약: packaging.md
  - 저장소 표면: repo-surfaces.md
  - 유지보수: maintenance.md
