site_name: SDV Operator
site_description: Dev2 verification console documentation
site_dir: site
use_directory_urls: true

docs_dir: docs-src

theme:
  name: material
  language: ko
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - 개요: index.md
  - 빠른 시작: quickstart.md
  - 저장소 표면: repo-surfaces.md
  - 명령 체계: commands.md
  - 결과 해석: results.md
  - 패키징 범위: packaging.md
  - 유지보수 경계: maintenance.md
